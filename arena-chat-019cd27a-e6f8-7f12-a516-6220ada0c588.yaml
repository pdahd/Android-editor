 (() => {
 const NAME = 'Arena-ChatExportXML';
 const VERSION = 'v1.0.0';
 
 function clean(s) {
 return (s || '')
 .replace(/\u00a0/g, ' ')
 .replace(/[ \t]+\n/g, '\n')
 .replace(/\n[ \t]+/g, '\n')
 .replace(/\n{3,}/g, '\n\n')
 .trim();
 }
 
 function esc(s) {
 return String(s)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;')
 .replace(/'/g, '&apos;');
 }
 
 function md(node) {
 if (!node) return '';
 if (node.nodeType === 3) return node.nodeValue || '';
 if (node.nodeType !== 1) return '';
 
 const el = node;
 const tag = el.tagName;
 
 if (el.classList?.contains('hidden')) return '';
 if (el.getAttribute?.('aria-hidden') === 'true') return '';
 if (el.getAttribute?.('role') === 'button') return '';
 if (/^(BUTTON|SVG|SCRIPT|STYLE|NOSCRIPT|INPUT|TEXTAREA)$/.test(tag)) return '';
 
 if (tag === 'BR') return '\n';
 if (tag === 'HR') return '\n\n---\n\n';
 
 if (tag === 'PRE') {
 const code = (el.innerText || el.textContent || '').replace(/^\n+|\n+$/g, '');
 const cls = [el.className, el.querySelector('code')?.className || ''].join(' ');
 const lang = (cls.match(/language-([a-z0-9_+-]+)/i) || [])[1] || '';
 return `\n\n\`\`\`${lang}\n${code}\n\`\`\`\n\n`;
 }
 
 let children = [...el.childNodes].map(md).join('');
 
 if (tag === 'CODE' && !el.closest('PRE')) {
 const t = clean(children);
 return t ? '`' + t.replace(/`/g, '\\`') + '`' : '';
 }
 
 if (tag === 'A') {
 const href = el.getAttribute('href') || '';
 const text = clean(children) || href;
 return href ? `[${text}](${href})` : text;
 }
 
 if (tag === 'STRONG' || tag === 'B') {
 const t = clean(children);
 return t ? `**${t}**` : '';
 }
 
 if (tag === 'EM' || tag === 'I') {
 const t = clean(children);
 return t ? `*${t}*` : '';
 }
 
 if (/^H[1-6]$/.test(tag)) {
 return `\n\n${'#'.repeat(+tag[1])} ${clean(children)}\n\n`;
 }
 
 if (tag === 'P') return `\n\n${clean(children)}\n\n`;
 
 if (tag === 'BLOCKQUOTE') {
