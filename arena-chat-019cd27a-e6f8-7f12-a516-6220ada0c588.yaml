 content: |-
 我看到了。截图里右边是空白预览区，显示 `No preview available`，但它还占着大半屏；左边聊天区被压得很窄。右上这套控件看起来是“预览 / 代码”切换，不是“折叠”，所以这更像是平板布局适配问题。
 
 我觉得你这个思路是对的：先用书签脚本临时折叠右侧，再决定要不要做成长期方案。
 
 而且这类界面通常就是 `flex` 或 `grid` 的双栏布局，先看 DOM 结构比盲猜快得多。安卓上也确实更推荐用 Kiwi 去调，Chrome 手机版对书签脚本和调试都不太顺手。
 
 ## 先试一个临时脚本
 
 先在 Kiwi 的开发者工具 Console 里执行这段。它是按你截图里的 `No preview available` 去找右侧预览面板，然后把它隐藏，并尽量让左侧聊天区撑满。
 
 ```
 JavaScript
 (() => {
 const tip = [...document.querySelectorAll('body *')]
 .find(el => el.childElementCount === 0 && /No preview available/i.test((el.textContent || '').trim()));
 
 if (!tip) {
 alert('没找到右侧空白预览提示。当前右侧如果不是空白页，就需要手动定位面板。');
 return;
 }
 
 let previewPane = tip;
 while (previewPane && previewPane !== document.body) {
 const r = previewPane.getBoundingClientRect();
 if (r.width > innerWidth * 0.28 && r.height > innerHeight * 0.4 && r.left > innerWidth * 0.2) {
 break;
 }
 previewPane = previewPane.parentElement;
 }
 
 if (!previewPane || previewPane === document.body) {
 alert('没定位到右侧预览面板。');
 return;
 }
 
 let split = previewPane.parentElement;
 while (split && split !== document.body) {
 const style = getComputedStyle(split);
 const kids = [...split.children].filter(el => el.offsetWidth > 0 && el.offsetHeight > 0);
 if ((style.display.includes('flex') || style.display.includes('grid')) && kids.length >= 2) {
 break;
 }
 split = split.parentElement;
 }
 
 previewPane.style.setProperty('display', 'none', 'important');
 previewPane.style.setProperty('width', '0', 'important');
 previewPane.style.setProperty('min-width', '0', 'important');
 
 if (split && split !== document.body) {
 split.style.setProperty('overflow', 'hidden', 'important');
 split.style.setProperty('grid-template-columns', 'minmax(0,1fr) 0px', 'important');
 
 const leftPane = [...split.children]
 .filter(el => el !== previewPane)
 .sort((a, b) => b.getBoundingClientRect().width - a.getBoundingClientRect().width)[0];
 
 if (leftPane) {
 leftPane.style.setProperty('flex', '1 1 auto', 'important');
 leftPane.style.setProperty('width', '100%', 'important');
 leftPane.style.setProperty('max-width', '100%', 'important');
 leftPane.style.setProperty('min-width', '0', 'important');
 }
 }
 })();
 ```
 
 这个版本更适合先验证。确认有效后，再压成一行做书签。
 
 ## 调试从这里开始
 
 1. 在 DevTools 里点中 `No preview available` 这行文字。
 
 2. 一路往上找父元素，直到找到“刚好占右半屏”的那个大容器，那就是预览 pane。
 
 3. 看它的父元素是 `flex` 还是 `grid`。
 
 4. 现场改样式验证：
 
 如果父元素是 `flex`，通常这样改：
 
 ```
 CSS
 /* 右侧预览 */
 display: none !important;
 width: 0 !important;
 min-width: 0 !important;
 
 /* 左侧聊天 */
 flex: 1 1 auto !important;
 width: 100% !important;
 max-width: 100% !important;
 min-width: 0 !important;
 ```
 
 如果父元素是 `grid`，重点改父元素：
 
 ```
 CSS
 grid-template-columns: minmax(0, 1fr) 0 !important;
 ```
 
 ## 要不要用 Kiwi 去探索结构
 
 要。
 
 而且这是最值得做的一步，因为你现在的问题，大概率不是“右侧不能隐藏”，而是“你还没找到真正控制分栏的那个父容器”。
 
 还有一个更轻的办法：直接注入 Eruda，在手机上看 DOM。若站点 CSP 不拦，这样很省事：
 
 ```
 JavaScript
 javascript:(function(){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/eruda';document.body.appendChild(s);s.onload=function(){eruda.init()}})();
 ```
 
 等你把右侧 pane 和它父容器那一小段 DOM 截出来后，我再给你收成一个更稳的书签脚本。
