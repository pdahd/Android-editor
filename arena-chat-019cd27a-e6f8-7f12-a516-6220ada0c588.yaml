 (() => {
 const NAME = 'Arena-ChatExport-Scout';
 const VERSION = 'v0.1.0';
 
 const url = [...new Set(
 performance.getEntriesByType('resource')
 .map(e => e.name)
 .filter(u => /\/api\/evaluation\/webdev\//i.test(u))
 )].pop();
 
 if (!url) {
 alert('没找到 /api/evaluation/webdev/ 请求。先刷新页面，或先发一条消息后再执行。');
 return;
 }
 
 const cut = (v, n = 180) =>
 typeof v === 'string' && v.length > n ? v.slice(0, n) + '…' : v;
 
 const brief = (v, depth = 2) => {
 if (depth < 0) return typeof v;
 if (v == null || typeof v === 'number' || typeof v === 'boolean') return v;
 if (typeof v === 'string') return cut(v);
 if (Array.isArray(v)) return v.slice(0, 2).map(x => brief(x, depth - 1));
 if (typeof v === 'object') {
 const o = {};
 Object.keys(v).slice(0, 12).forEach(k => o[k] = brief(v[k], depth - 1));
 return o;
 }
 return String(v);
 };
 
 const scoreItem = (o) => {
 let s = 0;
 if (!o || typeof o !== 'object' || Array.isArray(o)) return s;
 if ('role' in o) s += 5;
 if ('content' in o) s += 5;
 if ('text' in o) s += 4;
 if ('message' in o) s += 4;
 if ('parts' in o) s += 4;
 if ('prompt' in o) s += 3;
 if ('response' in o) s += 3;
 if ('author' in o) s += 3;
 if ('id' in o) s += 1;
 if ('createdAt' in o || 'updatedAt' in o || 'timestamp' in o) s += 1;
 if (o.author && typeof o.author === 'object' && 'role' in o.author) s += 5;
 return s;
 };
 
 const seen = new WeakSet();
 const candidates = [];
 
 const walk = (node, path) => {
 if (!node || typeof node !== 'object' || seen.has(node)) return;
 seen.add(node);
 
 if (Array.isArray(node)) {
 const objs = node.filter(x => x && typeof x === 'object' && !Array.isArray(x));
 if (objs.length) {
