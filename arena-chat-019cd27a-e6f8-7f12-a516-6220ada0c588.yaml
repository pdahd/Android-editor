 content: |-
 对你这个用途来说，XML 不是唯一“最佳”，但已经是很强的方案了。
 
 你现在的目标不是“给人读着舒服”，而是：
 
 把多轮对话稳定地交给另一个 AI，
 
 让它一眼分清谁说的、顺序是什么、每条内容边界在哪。
 
 在这个目标下，XML 的优点很明显：
 
 角色、序号、时间、来源这类元信息很好挂；
 
 层级清楚，不容易串行；
 
 AI 一般也很擅长读这种标签结构。
 
 但它也有一个缺点：
 
 对代码内容不够友好。
 
 因为代码、尖括号、引号都会被转义，读起来会变脏，例如 `&lt;div&gt;` 这种。
 
 所以我的判断是：
 
 对于“发给 AI 看”，最佳形态不是普通纯文本，也不是单纯 Markdown，
 
 而是“结构化 XML + 内容尽量少转义”。
 
 更具体一点，你现在这套思路是对的，但还可以再进一小步：
 
 把 `<content>` 改成 `CDATA` 风格，会比现在更适合代码对话。
 
 例如：
 
 ```
 XML
 <message index="2" role="assistant" emoji="🤖" format="markdown">
 <content><![CDATA[
 这里是原始 markdown / 代码
 <div>Hello</div>
 ```js
 console.log(1)
 ```
 
 ]]></content>
 
 </message>
 
 ```
 text
 
 这样有两个好处：
 AI 读内容时更自然；
 代码不会被 `&lt; &gt; &amp;` 弄得很吵。
 
 所以结论是：
 
 你现在用 XML，方向很好。
 但对“代码聊天记录”来说，带 `CDATA` 的 XML 会比当前转义版 XML 更好。
 
 我建议下一版就升级成这个方向。
