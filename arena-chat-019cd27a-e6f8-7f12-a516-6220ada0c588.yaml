 ## Arena-ReplyCopy-Scout v0.1.0
 
 在“文字聊天页”打开 DevTools 的 Console，执行：
 
 ```
 JavaScript
 (() => {
 const buttons = [...document.querySelectorAll('button,[role="button"]')];
 
 const btn = buttons.find(el => {
 const s = [
 el.getAttribute('aria-label') || '',
 el.getAttribute('title') || '',
 el.textContent || ''
 ].join(' ').trim();
 return /copy|复制/i.test(s);
 });
 
 if (!btn) {
 alert('没找到官方复制按钮。请先切到“文字聊天页”的一条 AI 回复附近再执行。');
 return;
 }
 
 const findActionBar = (start) => {
 let el = start;
 while (el && el !== document.body) {
 const count = el.querySelectorAll('button,[role="button"]').length;
 if (count >= 2) return el;
 el = el.parentElement;
 }
 return null;
 };
 
 const findMessageBox = (start) => {
 let el = start;
 while (el && el !== document.body) {
 const r = el.getBoundingClientRect();
 if (r.width > 180 && r.height > 80) return el;
 el = el.parentElement;
 }
 return null;
 };
 
 const actionBar = findActionBar(btn);
 const messageBox = findMessageBox(actionBar || btn);
 
 const data = {
 version: 'Arena-ReplyCopy-Scout v0.1.0',
 buttonText: (btn.textContent || '').trim(),
 buttonAriaLabel: btn.getAttribute('aria-label'),
 buttonTitle: btn.getAttribute('title'),
 buttonClass: btn.className,
 buttonHTML: btn.outerHTML,
 actionBarClass: actionBar ? actionBar.className : null,
 actionBarHTML: actionBar ? actionBar.outerHTML : null,
 messageBoxClass: messageBox ? messageBox.className : null,
 messageBoxHTML: messageBox ? messageBox.outerHTML.slice(0, 4000) : null,
 };
 
 console.log(data);
 
 const text = JSON.stringify(data, null, 2);
 if (navigator.clipboard?.writeText) {
 navigator.clipboard.writeText(text).then(() => {
 console.log('已复制 data 到剪贴板');
 }).catch(() => {});
 }
 })();
 ```
 
