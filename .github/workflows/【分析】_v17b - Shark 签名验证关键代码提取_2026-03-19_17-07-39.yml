name: 【分析】_v17b - Shark 签名验证关键代码提取_2026-03-19_17-07-39

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. ApkSignUtil 完整代码（最关键）"
        run: |
          {
            f="decoded/smali_classes10/com/vega/util/ApkSignUtil.smali"
            if [ -f "$f" ]; then
              echo "=== $f ($(wc -l < "$f") lines) ==="
              cat "$f"
            else
              echo "NOT FOUND at expected path, searching..."
              find decoded/ -name "ApkSignUtil.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "ApkSignUtil.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/01_apk_sign_util.txt

      - name: "2. SigHashLoader 完整代码"
        run: |
          {
            f="decoded/smali_classes9/com/bytedance/bdinstall/loader/SigHashLoader.smali"
            if [ -f "$f" ]; then
              echo "=== $f ($(wc -l < "$f") lines) ==="
              cat "$f"
            else
              echo "NOT FOUND, searching..."
              find decoded/ -name "SigHashLoader.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "SigHashLoader.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/02_sig_hash_loader.txt

      - name: "3. SharkManager 完整代码"
        run: |
          {
            echo "========== SharkManager.smali =========="
            f="decoded/smali_classes9/com/vega/core/shark/SharkManager.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at smali_classes9, searching..."
              find decoded/ -name "SharkManager.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "SharkManager.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi

            echo ""
            echo "========== SharkManager 内部类 =========="
            find decoded/ -name "SharkManager*" -name "*.smali" -type f 2>/dev/null | sort
            for f in $(find decoded/ -name "SharkManager\$*" -name "*.smali" -type f 2>/dev/null | sort); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/03_shark_manager.txt

      - name: "4. RetrofitHeaderInterceptor - sign 签名计算部分"
        run: |
          {
            f="decoded/smali_classes9/com/vega/launcher/network/interceptors/RetrofitHeaderInterceptor.smali"
            if [ -f "$f" ]; then
              echo "=== sign 相关代码（行1020-1120）==="
              sed -n '1020,1120p' "$f"

              echo ""
              echo "=== tdid 相关代码（行1000-1060）==="
              sed -n '1000,1060p' "$f"

              echo ""
              echo "=== appid 相关代码（行1140-1210）==="
              sed -n '1140,1210p' "$f"

              echo ""
              echo "=== sign 值的来源追踪 ==="
              grep -n "sign\|Sign\|SIGN\|hash\|Hash\|digest\|Digest\|crypto\|Crypto" "$f" | head -30
            fi
          } 2>&1 | tee logs/04_header_sign.txt

      - name: "5. ApkSignUtil 的调用者（谁使用签名值）"
        run: |
          {
            echo "========== ApkSignUtil 的所有引用 =========="
            rg -rn "ApkSignUtil" decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== SigHashLoader 的所有引用 =========="
            rg -rn "SigHashLoader" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== PackageLoader 完整代码 =========="
            f="decoded/smali_classes9/com/bytedance/bdinstall/loader/PackageLoader.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              if [ $(wc -l < "$f") -lt 300 ]; then
                cat "$f"
              else
                grep -n "^\.method\|^\.field\|const-string\|sign\|hash\|digest" "$f" | head -40
              fi
            fi
          } 2>&1 | tee logs/05_sign_callers.txt

      - name: "6. 官方 APK 签名信息提取"
        run: |
          {
            echo "========== 从官方 APK 提取签名证书指纹 =========="
            APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f 2>/dev/null | sort -V | tail -1)
            KEYTOOL=$(which keytool 2>/dev/null || echo "")

            if [ -n "$APKSIGNER" ]; then
              echo "--- apksigner verify ---"
              "$APKSIGNER" verify --print-certs official.apk 2>&1

              echo ""
              echo "--- apksigner lineage ---"
              "$APKSIGNER" verify -v --print-certs official.apk 2>&1 | grep -iE "signer|certificate|digest|SHA|MD5|fingerprint"
            fi

            echo ""
            echo "--- 使用 openssl 提取 ---"
            unzip -o official.apk "META-INF/*.RSA" "META-INF/*.DSA" "META-INF/*.EC" -d /tmp/cert_extract/ 2>/dev/null || true
            for cert in /tmp/cert_extract/META-INF/*.RSA /tmp/cert_extract/META-INF/*.DSA /tmp/cert_extract/META-INF/*.EC; do
              if [ -f "$cert" ]; then
                echo "--- Certificate: $cert ---"
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | openssl x509 -fingerprint -sha256 -noout 2>/dev/null
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | openssl x509 -fingerprint -sha1 -noout 2>/dev/null
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | openssl x509 -fingerprint -md5 -noout 2>/dev/null
              fi
            done

            echo ""
            echo "--- 签名证书原始 DER 的 SHA-256 ---"
            for cert in /tmp/cert_extract/META-INF/*.RSA /tmp/cert_extract/META-INF/*.DSA; do
              if [ -f "$cert" ]; then
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | \
                  openssl x509 -outform DER 2>/dev/null | sha256sum
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | \
                  openssl x509 -outform DER 2>/dev/null | sha1sum
                openssl pkcs7 -in "$cert" -inform DER -print_certs 2>/dev/null | \
                  openssl x509 -outform DER 2>/dev/null | md5sum
              fi
            done
          } 2>&1 | tee logs/06_official_signature.txt

      - name: "7. DRSpecialLoader 和 bdinstall 初始化"
        run: |
          {
            echo "========== DRSpecialLoader.smali =========="
            f="decoded/smali_classes9/com/bytedance/bdinstall/loader/DRSpecialLoader.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              if [ $(wc -l < "$f") -lt 400 ]; then
                cat "$f"
              else
                grep -n "^\.method\|^\.field\|const-string\|sign\|hash\|digest\|package\|cert" "$f" | head -40
              fi
            fi

            echo ""
            echo "========== bdinstall 包下所有文件 =========="
            find decoded/ -path "*/bdinstall/*" -name "*.smali" -type f 2>/dev/null | sort | head -30
          } 2>&1 | tee logs/07_bdinstall.txt

      - name: "8. SafeRetrofitHeaderInterceptor（安全版请求头）"
        run: |
          {
            f="decoded/smali_classes9/com/vega/launcher/safemode/SafeRetrofitHeaderInterceptor.smali"
            if [ -f "$f" ]; then
              echo "=== $f ($(wc -l < "$f") lines) ==="
              if [ $(wc -l < "$f") -lt 500 ]; then
                cat "$f"
              else
                echo "--- Methods ---"
                grep -n "^\.method" "$f"
                echo ""
                echo "--- const-string ---"
                grep -n "const-string" "$f" | head -30
                echo ""
                echo "--- sign/hash/package references ---"
                grep -n "sign\|hash\|package\|cert\|digest" "$f" | head -20
              fi
            fi
          } 2>&1 | tee logs/08_safe_header.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v17b-shark-critical-code
          path: logs/
          retention-days: 7
