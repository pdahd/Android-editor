name: v20a-主构建-Shark狸猫换太子

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip python3
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile DEX (skip resources)
        run: |
          java -jar apktool.jar d -f -r official.apk -o smali_work > /dev/null 2>&1 || true
          echo "smali directories: $(ls -d smali_work/smali_classes* 2>/dev/null | wc -l)"

      - name: "Patch 1-14: Base Unlock Patches (From v12a)"
        run: |
          # 1. CrackingInterceptor (skip-all + keep native)
          python3 << 'PYEOF'
          import re, sys
          filepath = "smali_work/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor.smali"
          with open(filepath, "r") as f: content = f.read()
          pat_a = re.search(r'\.method public final a\(Ljava/lang/String;\)Z.*?\.end method', content, re.DOTALL)
          new_a = ".method public final a(Ljava/lang/String;)Z\n    .locals 1\n    const/4 v0, 0x1\n    return v0\n.end method"
          if pat_a: content = content[:pat_a.start()] + new_a + content[pat_a.end():]
          pat_b = re.search(r'\.method public final b\(I\)V.*?\.end method', content, re.DOTALL)
          new_b = ".method public final b(I)V\n    .locals 0\n    return-void\n.end method"
          if pat_b: content = content[:pat_b.start()] + new_b + content[pat_b.end():]
          with open(filepath, "w") as f: f.write(content)
          PYEOF

          # 2. showGlobalSecurityDialog -> Unit
          filepath="smali_work/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor\$showGlobalSecurityDialog\$1.smali"
          python3 << 'PYEOF'
          import re, sys
          with open("smali_work/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor$showGlobalSecurityDialog$1.smali", "r") as f: content = f.read()
          pat = re.search(r'# virtual methods\s*\.method public final invoke\(\)Ljava/lang/Object;.*?\.end method', content, re.DOTALL)
          new_m = "# virtual methods\n.method public final invoke()Ljava/lang/Object;\n    .locals 1\n    sget-object v0, Lkotlin/Unit;->INSTANCE:Lkotlin/Unit;\n    return-object v0\n.end method"
          if pat: content = content[:pat.start()] + new_m + content[pat.end():]
          with open("smali_work/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor$showGlobalSecurityDialog$1.smali", "w") as f: f.write(content)
          PYEOF

          # 4. Kill TransLynxActivity popup
          python3 << 'PYEOF'
          import re
          fp = "smali_work/smali_classes15/com/vega/main/TransLynxActivity.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public final onCreate\(Landroid/os/Bundle;\)V.*?\.end method', c, re.DOTALL)
          new_m = ".method public final onCreate(Landroid/os/Bundle;)V\n    .locals 0\n    invoke-super {p0, p1}, Lcom/vega/main/LynxActivity;->onCreate(Landroid/os/Bundle;)V\n    invoke-virtual {p0}, Landroid/app/Activity;->finish()V\n    return-void\n.end method"
          if pat: c = c[:pat.start()] + new_m + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

          # 10. VipManager.b()Z -> true
          python3 << 'PYEOF'
          import re
          fp = "smali_work/smali_classes8/com/vega/subscriptionapi/legacy/VipManager.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public static b\(\)Z.*?\.end method', c, re.DOTALL)
          new_m = ".method public static b()Z\n    .locals 1\n    const/4 v0, 0x1\n    return v0\n.end method"
          if pat: c = c[:pat.start()] + new_m + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

          # 11. Watermark Bypass
          python3 << 'PYEOF'
          import re
          fp = "smali_work/smali_classes8/com/vega/subscription/biz/function/WatermarkBusinessFunction$doUseFunction$1.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public final invokeSuspend\(Ljava/lang/Object;\)Ljava/lang/Object;.*?\.end method', c, re.DOTALL)
          new_m = ".method public final invokeSuspend(Ljava/lang/Object;)Ljava/lang/Object;\n    .locals 4\n    invoke-static {p1}, Lkotlin/ResultKt;->throwOnFailure(Ljava/lang/Object;)V\n    iget-object v0, p0, Lcom/vega/subscription/biz/function/WatermarkBusinessFunction$doUseFunction$1;->s:Lkotlin/jvm/functions/Function1;\n    sget-object v1, Lcom/vega/subscriptionapi/core/Result;->d:Lcom/vega/subscriptionapi/core/Result$Companion;\n    const/4 v2, 0x0\n    const-string v3, \"local verify success\"\n    const/4 p1, 0x1\n    invoke-static {v1, v2, v3, p1}, Lcom/vega/subscriptionapi/core/Result$Companion;->c(Lcom/vega/subscriptionapi/core/Result$Companion;Ljava/util/Map;Ljava/lang/String;I)Lcom/vega/subscriptionapi/core/Result;\n    move-result-object v1\n    invoke-interface {v0, v1}, Lkotlin/jvm/functions/Function1;->invoke(Ljava/lang/Object;)Ljava/lang/Object;\n    sget-object v0, Lkotlin/Unit;->INSTANCE:Lkotlin/Unit;\n    return-object v0\n.end method"
          if pat: c = c[:pat.start()] + new_m + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

          # 12. Resolution Bypass
          python3 << 'PYEOF'
          import re
          fp = "smali_work/smali_classes8/com/vega/subscription/biz/function/ResolutionBusinessFunction$doUseFunction$1.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public final invokeSuspend\(Ljava/lang/Object;\)Ljava/lang/Object;.*?\.end method', c, re.DOTALL)
          new_m = ".method public final invokeSuspend(Ljava/lang/Object;)Ljava/lang/Object;\n    .locals 6\n    invoke-static {p1}, Lkotlin/ResultKt;->throwOnFailure(Ljava/lang/Object;)V\n    iget-object v1, p0, Lcom/vega/subscription/biz/function/ResolutionBusinessFunction$doUseFunction$1;->q:Lcom/vega/subscription/biz/function/ResolutionBusinessFunction;\n    iget-object v0, p0, Lcom/vega/subscription/biz/function/ResolutionBusinessFunction$doUseFunction$1;->r:Lcom/vega/subscriptionapi/biz/function/ResolutionBusinessParam;\n    iget v0, v0, Lcom/vega/subscriptionapi/biz/function/ResolutionBusinessParam;->a:I\n    invoke-virtual {v1}, Ljava/lang/Object;->getClass()Ljava/lang/Class;\n    invoke-static {v0}, Lcom/vega/subscription/biz/function/ResolutionBusinessFunction;->n4(I)Lcom/lemon/lv/clipmonetize/wrapper/BenefitResource;\n    move-result-object v1\n    const/4 v5, 0x1\n    const/4 v4, 0x0\n    if-nez v1, :cond_pro\n    iget-object v2, p0, Lcom/vega/subscription/biz/function/ResolutionBusinessFunction$doUseFunction$1;->s:Lkotlin/jvm/functions/Function1;\n    sget-object v1, Lcom/vega/subscriptionapi/core/Result;->d:Lcom/vega/subscriptionapi/core/Result$Companion;\n    const-string v0, \"resolution no benefit\"\n    invoke-static {v1, v4, v0, v5}, Lcom/vega/subscriptionapi/core/Result$Companion;->c(Lcom/vega/subscriptionapi/core/Result$Companion;Ljava/util/Map;Ljava/lang/String;I)Lcom/vega/subscriptionapi/core/Result;\n    move-result-object v0\n    invoke-interface {v2, v0}, Lkotlin/jvm/functions/Function1;->invoke(Ljava/lang/Object;)Ljava/lang/Object;\n    goto :goto_done\n    :cond_pro\n    iget-object v2, p0, Lcom/vega/subscription/biz/function/ResolutionBusinessFunction$doUseFunction$1;->s:Lkotlin/jvm/functions/Function1;\n    sget-object v1, Lcom/vega/subscriptionapi/core/Result;->d:Lcom/vega/subscriptionapi/core/Result$Companion;\n    const-string v0, \"local verify success\"\n    invoke-static {v1, v4, v0, v5}, Lcom/vega/subscriptionapi/core/Result$Companion;->c(Lcom/vega/subscriptionapi/core/Result$Companion;Ljava/util/Map;Ljava/lang/String;I)Lcom/vega/subscriptionapi/core/Result;\n    move-result-object v0\n    invoke-interface {v2, v0}, Lkotlin/jvm/functions/Function1;->invoke(Ljava/lang/Object;)Ljava/lang/Object;\n    :goto_done\n    sget-object v0, Lkotlin/Unit;->INSTANCE:Lkotlin/Unit;\n    return-object v0\n.end method"
          if pat: c = c[:pat.start()] + new_m + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

          # 13. Multi-layer VIP Export
          python3 << 'PYEOF'
          import re, sys
          fp = "smali_work/smali_classes8/com/vega/subscription/biz/function/base/BaseVipExportBusinessFunction.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public final H1\(Z\)Z.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public final H1(Z)Z\n    .locals 1\n    const/4 v0, 0x0\n    return v0\n.end method" + c[pat.end():]
          pat = re.search(r'\.method public final X2\(\)Z.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public final X2()Z\n    .locals 1\n    const/4 v0, 0x0\n    return v0\n.end method" + c[pat.end():]
          with open(fp, "w") as f: f.write(c)

          fp = "smali_work/smali_classes8/com/vega/subscriptionapi/ext/VipStatusExtKt.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public static final c\(Lcom/vega/middlebridge/swig/LVVEVipStatus;\)Z.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public static final c(Lcom/vega/middlebridge/swig/LVVEVipStatus;)Z\n    .locals 1\n    const/4 v0, 0x0\n    return v0\n.end method" + c[pat.end():]
          pat = re.search(r'\.method public static final d\(Lcom/vega/middlebridge/swig/LVVEVipStatus;\)Z.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public static final d(Lcom/vega/middlebridge/swig/LVVEVipStatus;)Z\n    .locals 1\n    const/4 v0, 0x0\n    return v0\n.end method" + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

          # 14. ExportConfigPanel.d() AI UHD bypass
          python3 << 'PYEOF'
          import re
          filepath = "smali_work/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
          with open(filepath, "r") as f: c = f.read()
          pat = re.search(r'\.method public final d\(Lkotlin/jvm/functions/Function1;\)Z.*?\.end method', c, re.DOTALL)
          new_m = ".method public final d(Lkotlin/jvm/functions/Function1;)Z\n    .locals 1\n    const/4 v0, 0x1\n    return v0\n.end method"
          if pat: c = c[:pat.start()] + new_m + c[pat.end():]
          with open(filepath, "w") as f: f.write(c)
          PYEOF

      - name: "Patch 15: Java Layer Signature Spoofing"
        run: |
          python3 << 'PYEOF'
          import re
          fp = "smali_work/smali_classes9/com/ss/android/deviceregister/base/RegistrationHeaderHelper.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public static getSigHash\(Landroid/content/Context;\)Ljava/lang/String;.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public static getSigHash(Landroid/content/Context;)Ljava/lang/String;\n    .locals 1\n    const-string v0, \"0f435afa8d7b4363510a365c1d7457be\"\n    sput-object v0, Lcom/ss/android/deviceregister/base/RegistrationHeaderHelper;->sSigHash:Ljava/lang/String;\n    return-object v0\n.end method" + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          
          fp = "smali_work/smali_classes10/com/vega/util/ApkSignUtil.smali"
          with open(fp, "r") as f: c = f.read()
          pat = re.search(r'\.method public static b\(\[B\)Ljava/lang/String;.*?\.end method', c, re.DOTALL)
          if pat: c = c[:pat.start()] + ".method public static b([B)Ljava/lang/String;\n    .locals 1\n    const-string v0, \"52cd573ef0aaff4c188a726d37401a73df7eb06d\"\n    return-object v0\n.end method" + c[pat.end():]
          with open(fp, "w") as f: f.write(c)
          PYEOF

      - name: "Patch 20: 狸猫换太子 (Metasec Native Signature Bypass)"
        run: |
          set -e
          
          # 1. 编写 Java 层劫持类 MetasecSpoofer
          cat > MetasecSpoofer.java << 'JAVAEOF'
          package com.vega;
          import android.content.Context;
          import android.content.pm.ApplicationInfo;
          import java.io.File;
          import java.io.InputStream;
          import java.io.FileOutputStream;
          import android.util.Log;

          public class MetasecSpoofer {
              public static void init(final Context ctx) {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              File target = new File(ctx.getFilesDir(), "official_base.apk");
                              if (target.exists() && target.length() > 1000000) return;
                              Log.i("Spoofer", "Copying official APK for Metasec in background...");
                              InputStream is = ctx.getAssets().open("official_base.apk");
                              FileOutputStream fos = new FileOutputStream(target);
                              byte[] buffer = new byte[131072];
                              int len;
                              while ((len = is.read(buffer)) > 0) {
                                  fos.write(buffer, 0, len);
                              }
                              fos.flush(); fos.close(); is.close();
                              Log.i("Spoofer", "Official APK copied successfully!");
                          } catch (Exception e) {
                              Log.e("Spoofer", "Failed to copy APK", e);
                          }
                      }
                  }).start();
              }

              private static boolean isMetasecCaller() {
                  StackTraceElement[] stack = Thread.currentThread().getStackTrace();
                  if (stack.length <= 8) {
                      String bottom = stack[stack.length - 1].getClassName();
                      if (!bottom.contains("Zygote") && !bottom.contains("ActivityThread")) return true;
                  }
                  for (StackTraceElement elem : stack) {
                      String cls = elem.getClassName().toLowerCase();
                      if (cls.contains("metasec") || cls.contains("sec") || 
                          cls.contains("helios") || cls.contains("bds") || 
                          cls.contains("bytedance") || cls.contains("mobsec")) {
                          return true;
                      }
                  }
                  return false;
              }

              public static ApplicationInfo getSpoofedInfo(ApplicationInfo orig, Context ctx) {
                  try {
                      if (orig != null && isMetasecCaller()) {
                          ApplicationInfo spoofed = new ApplicationInfo(orig);
                          String fakePath = new File(ctx.getFilesDir(), "official_base.apk").getAbsolutePath();
                          spoofed.sourceDir = fakePath;
                          spoofed.publicSourceDir = fakePath;
                          Log.w("Spoofer", "Intercepted getApplicationInfo() -> " + fakePath);
                          return spoofed;
                      }
                  } catch (Exception e) {}
                  return orig;
              }

              public static String getSpoofedPath(String orig, Context ctx) {
                  try {
                      if (orig != null && isMetasecCaller()) {
                          return new File(ctx.getFilesDir(), "official_base.apk").getAbsolutePath();
                      }
                  } catch (Exception e) {}
                  return orig;
              }
          }
          JAVAEOF

          # 2. 编译并生成 Dex
          ANDROID_JAR=$(find "$ANDROID_HOME/platforms" -name "android.jar" | sort -V | tail -n 1)
          echo "Using Android JAR: $ANDROID_JAR"
          javac -source 8 -target 8 -bootclasspath "$ANDROID_JAR" MetasecSpoofer.java
          D8=$(find "$ANDROID_HOME/build-tools" -name d8 -type f | sort -V | tail -1)
          "$D8" --release --output . MetasecSpoofer.class

          # 3. 使用 Baksmali 安全转换为 Smali (修复了之前 apktool d classes.dex 导致的退出码 1 错误)
          curl -fL --retry 5 -o baksmali.jar https://github.com/JesusFreke/smali/releases/download/v2.5.2/baksmali-2.5.2.jar
          java -jar baksmali.jar d classes.dex -o spoofer_smali/smali
          mkdir -p smali_work/smali_classes15/com/vega/
          cp -r spoofer_smali/smali/com/vega/MetasecSpoofer.smali smali_work/smali_classes15/com/vega/

          # 4. 自动寻找主 Application 类 (使用 aapt 精准提取，绝对不报错)
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          APP_CLASS=$("$AAPT" dump xmltree official.apk AndroidManifest.xml | grep -A20 "E: application " | grep "A: android:name" | head -1 | grep -o 'Raw: "[^"]*"' | cut -d'"' -f2)
          PKG_NAME=$("$AAPT" dump badging official.apk | grep "package: name=" | cut -d"'" -f2)
          if [[ "$APP_CLASS" == .* ]]; then
              APP_CLASS="${PKG_NAME}${APP_CLASS}"
          fi
          echo "Main App Class to Patch: $APP_CLASS"

          # 5. 注入主 Application
          cat > patch_app.py << 'PYEOF'
          import os, re, glob, sys
          app_class = sys.argv[1]
          class_path = "smali_work/smali*/" + app_class.replace('.', '/') + ".smali"
          files = glob.glob(class_path)
          if not files:
              print("FAIL: Could not find smali file for " + app_class)
              sys.exit(1)
              
          filepath = files[0]
          with open(filepath, 'r') as f: content = f.read()

          pat_super = re.search(r'\.super\s+(L[^;]+;)', content)
          super_cls = pat_super.group(1) if pat_super else "Landroid/app/Application;"

          if "Lcom/vega/MetasecSpoofer;->init" not in content:
              content = re.sub(
                  r'(\.method public onCreate\(\)V.*?\.locals \d+)',
                  r'\1\n    # PATCHED: Metasec Spoof Init\n    invoke-static {p0}, Lcom/vega/MetasecSpoofer;->init(Landroid/content/Context;)V\n',
                  content, flags=re.DOTALL
              )

          new_methods = f"""
          .method public getApplicationInfo()Landroid/content/pm/ApplicationInfo;
              .locals 2
              invoke-super {{p0}}, {super_cls}->getApplicationInfo()Landroid/content/pm/ApplicationInfo;
              move-result-object v0
              invoke-static {{v0, p0}}, Lcom/vega/MetasecSpoofer;->getSpoofedInfo(Landroid/content/pm/ApplicationInfo;Landroid/content/Context;)Landroid/content/pm/ApplicationInfo;
              move-result-object v0
              return-object v0
          .end method

          .method public getPackageCodePath()Ljava/lang/String;
              .locals 2
              invoke-super {{p0}}, {super_cls}->getPackageCodePath()Ljava/lang/String;
              move-result-object v0
              invoke-static {{v0, p0}}, Lcom/vega/MetasecSpoofer;->getSpoofedPath(Ljava/lang/String;Landroid/content/Context;)Ljava/lang/String;
              move-result-object v0
              return-object v0
          .end method

          .method public getPackageResourcePath()Ljava/lang/String;
              .locals 2
              invoke-super {{p0}}, {super_cls}->getPackageResourcePath()Ljava/lang/String;
              move-result-object v0
              invoke-static {{v0, p0}}, Lcom/vega/MetasecSpoofer;->getSpoofedPath(Ljava/lang/String;Landroid/content/Context;)Ljava/lang/String;
              move-result-object v0
              return-object v0
          .end method
          """
          if "getApplicationInfo" not in content:
              content += "\n" + new_methods.strip() + "\n"

          with open(filepath, 'w') as f: f.write(content)
          print("OK: Main Application class patched with Spoofer.")
          PYEOF
          
          python3 patch_app.py "$APP_CLASS"

      - name: Recompile patched DEX files
        run: |
          java -jar apktool.jar b smali_work -o temp_dex.apk > /dev/null 2>&1 || true
          
          mkdir -p patched_dex
          unzip -o temp_dex.apk "classes*.dex" -d patched_dex/ 2>/dev/null || true
          ls -la patched_dex/

      - name: "Patch 5: Binary modify Manifest (debuggable + allowBackup + sort)"
        run: |
          mkdir -p work
          unzip -o official.apk AndroidManifest.xml -d work/
          
          python3 << 'PYEOF'
          import struct, sys
          
          RESID_DEBUGGABLE = 0x0101000f
          
          with open("work/AndroidManifest.xml", "rb") as f:
              data = bytearray(f.read())
          
          SP = 8
          sp_chunk_size = struct.unpack_from('<I', data, SP + 4)[0]
          sp_str_count = struct.unpack_from('<I', data, SP + 8)[0]
          sp_hdr_sz = struct.unpack_from('<H', data, SP + 2)[0]
          sp_flags = struct.unpack_from('<I', data, SP + 16)[0]
          sp_str_start = struct.unpack_from('<I', data, SP + 20)[0]
          is_utf8 = bool(sp_flags & 0x100)
          
          OFF_BASE = SP + sp_hdr_sz
          STR_BASE = SP + sp_str_start
          
          str_info = {}
          for i in range(sp_str_count):
              rel = struct.unpack_from('<I', data, OFF_BASE + i * 4)[0]
              pos = STR_BASE + rel
              try:
                  p = pos
                  cc = struct.unpack_from('<H', data, p)[0]; p += 2
                  if cc & 0x8000:
                      cc = ((cc & 0x7FFF) << 16) | struct.unpack_from('<H', data, p)[0]; p += 2
                  s = data[p:p+cc*2].decode('utf-16-le')
                  str_info[i] = (s, pos, p + cc * 2 + 2)
              except:
                  str_info[i] = ("<error>", pos, pos)
          
          native_heap_idx = -1
          allow_backup_idx = -1
          for idx, (s, _, _) in str_info.items():
              if s == "allowNativeHeapPointerTagging":
                  native_heap_idx = idx
              elif s == "allowBackup":
                  allow_backup_idx = idx
          
          if native_heap_idx < 0:
              print("FAIL allowNativeHeapPointerTagging not found!"); sys.exit(1)
          
          RID_START = SP + sp_chunk_size
          rid_chunk_size = struct.unpack_from('<I', data, RID_START + 4)[0]
          rid_count = (rid_chunk_size - 8) // 4
          
          rid_table = {}
          for i in range(rid_count):
              rid = struct.unpack_from('<I', data, RID_START + 8 + i * 4)[0]
              rid_table[i] = rid
          
          if native_heap_idx < rid_count:
              old_rid = rid_table[native_heap_idx]
              struct.pack_into('<I', data, RID_START + 8 + native_heap_idx * 4, RESID_DEBUGGABLE)
              rid_table[native_heap_idx] = RESID_DEBUGGABLE
              print(f"OK ResID[{native_heap_idx}]: 0x{old_rid:08X} -> 0x{RESID_DEBUGGABLE:08X}")
          
          s, start, end = str_info[native_heap_idx]
          new_name = "debuggable"
          wp = start
          new_u = new_name.encode('utf-16-le')
          struct.pack_into('<H', data, wp, len(new_name)); wp += 2
          for j, b in enumerate(new_u):
              data[wp + j] = b
          wp += len(new_u)
          struct.pack_into('<H', data, wp, 0); wp += 2
          while wp < end:
              data[wp] = 0; wp += 1
          print(f"OK String: '{s}' -> '{new_name}'")
          
          pos = RID_START + rid_chunk_size
          app_found = False
          
          while pos < len(data) - 8:
              c_type = struct.unpack_from('<H', data, pos)[0]
              c_size = struct.unpack_from('<I', data, pos + 4)[0]
              if c_size < 8 or pos + c_size > len(data):
                  break
              if c_type == 0x0102:
                  elem_name_idx = struct.unpack_from('<I', data, pos + 20)[0]
                  attr_start_off = struct.unpack_from('<H', data, pos + 24)[0]
                  attr_size = struct.unpack_from('<H', data, pos + 26)[0]
                  attr_count = struct.unpack_from('<H', data, pos + 28)[0]
                  if attr_size == 0:
                      attr_size = 20
                  elem_name_str = str_info.get(elem_name_idx, ("<?>",))[0]
                  a_base = pos + 16 + attr_start_off
                  if elem_name_str == "application":
                      app_found = True
                      for ai in range(attr_count):
                          ao = a_base + ai * attr_size
                          if ao + 20 > len(data): break
                          a_name = struct.unpack_from('<I', data, ao + 4)[0]
                          a_type = data[ao + 15]
                          a_val = struct.unpack_from('<i', data, ao + 16)[0]
                          if a_name == native_heap_idx and a_type == 0x12:
                              struct.pack_into('<i', data, ao + 16, -1)
                              print("OK debuggable -> true")
                          if a_name == allow_backup_idx and a_type == 0x12 and a_val == 0:
                              struct.pack_into('<i', data, ao + 16, -1)
                              print("OK allowBackup -> true")
                      attr_blocks = []
                      for ai in range(attr_count):
                          ao = a_base + ai * attr_size
                          block = bytes(data[ao:ao + attr_size])
                          name_idx = struct.unpack_from('<I', block, 4)[0]
                          rid = rid_table.get(name_idx, 0xFFFFFFFF)
                          attr_blocks.append((rid, block))
                      attr_blocks.sort(key=lambda x: x[0])
                      for ai, (rid, block) in enumerate(attr_blocks):
                          ao = a_base + ai * attr_size
                          data[ao:ao + attr_size] = block
                      print(f"OK {attr_count} attributes sorted by ResID")
                  pos += c_size
          
          if not app_found:
              print("FAIL <application> not found!"); sys.exit(1)
          
          with open("work/AndroidManifest.xml", "wb") as f:
              f.write(data)
          print("DONE Manifest modification complete")
          PYEOF

      - name: Assemble patched APK and Inject Official Base
        run: |
          cp official.apk capcut_v20a.apk
          zip -d capcut_v20a.apk "META-INF/*" 2>/dev/null || true
          
          # 更新 Manifest
          cd work
          zip -0 ../capcut_v20a.apk AndroidManifest.xml
          cd ..
          
          # 更新所有被重新编译过的 DEX
          cd patched_dex
          zip -0 ../capcut_v20a.apk classes*.dex
          cd ..
          
          # ✨ 把官方的原版包塞进 assets 里，供狸猫换太子使用！✨
          mkdir -p inject_assets/assets
          cp official.apk inject_assets/assets/official_base.apk
          cd inject_assets
          zip -0 ../capcut_v20a.apk assets/official_base.apk
          cd ..
          
          echo "=== Patched APK ==="
          ls -la capcut_v20a.apk

      - name: Align and Sign APK
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)
          
          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks
          
          "$ZIPALIGN" -p -f 4 capcut_v20a.apk aligned.apk
          
          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 23 \
            --out capcut_v20a_signed.apk \
            aligned.apk
            
          echo "=== Signature verification ==="
          "$APKSIGNER" verify -v capcut_v20a_signed.apk | head -10
          ls -la capcut_v20a_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: capcut-v20a-shark-spoofed
          path: capcut_v20a_signed.apk
          retention-days: 7
