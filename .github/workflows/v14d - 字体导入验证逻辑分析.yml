name: v14d - 字体导入验证逻辑分析

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. 字体导入入口和验证逻辑"
        run: |
          {
            echo "========== My Fonts / Add Font 相关类 =========="
            find decoded/ -iname "*MyFont*" -o -iname "*AddFont*" -o -iname "*ImportFont*" -o -iname "*LocalFont*" | grep "\.smali$" | head -20

            echo ""
            echo "========== font_path / font_file / font_import 字符串 =========="
            rg -rn '"font_path"\|"font_file"\|"import_font"\|"add_font"\|"local_font"\|"my_font"' decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== 字体格式检查关键词 =========="
            rg -rn 'format.*not.*support\|unsupported.*format\|invalid.*font\|font.*check\|font.*valid\|font.*verify\|checkFont\|validateFont\|isFontValid\|parseFontFile' decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== FreeType / OpenType / WOFF 引用 =========="
            rg -rn 'FreeType\|OpenType\|woff\|sfnt\|cmap\|glyph.*table' decoded/ 2>/dev/null | head -15

            echo ""
            echo "========== Couldn't / format / not supported 错误字符串 =========="
            rg -rn "Couldn.*t.*font\|format.*not.*support\|font.*format\|not.*valid.*font\|invalid.*font.*file" decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/01_font_import_entry.txt

      - name: "2. FontManager / FontHelper / FontUtils"
        run: |
          {
            echo "========== FontManager 类 =========="
            find decoded/ -iname "*FontManager*" -name "*.smali" -type f 2>/dev/null | head -10
            for f in $(find decoded/ -iname "*FontManager*" -name "*.smali" -not -name "*\$*" -type f 2>/dev/null | head -3); do
              echo "--- $f ---"
              grep -n "\.method\|check\|valid\|import\|add\|parse\|verify\|format\|support" "$f" | head -30
              echo ""
            done

            echo ""
            echo "========== FontHelper / FontUtils =========="
            find decoded/ -iname "*FontHelper*" -o -iname "*FontUtil*" -o -iname "*FontValidator*" | grep "\.smali$" | head -10
            for f in $(find decoded/ -iname "*FontHelper*" -o -iname "*FontUtil*" -o -iname "*FontValidator*" 2>/dev/null | grep "\.smali$" | grep -v '\$' | head -5); do
              echo "--- $f ---"
              grep -n "\.method\|check\|valid\|format\|support\|parse\|ttf\|otf\|woff" "$f" | head -20
              echo ""
            done
          } 2>&1 | tee logs/02_font_manager.txt

      - name: "3. 字体文件解析/验证逻辑"
        run: |
          {
            echo "========== 搜索字体文件头检查（magic bytes）=========="
            rg -rn '0x00010000\|0x4F54544F\|0x74727565\|0x74746366\|OTTO\|true\|ttcf\|wOFF\|wOF2' decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 MIME type 检查 =========="
            rg -rn 'font/ttf\|font/otf\|font/sfnt\|font/woff\|application/font\|application/x-font\|font/opentype\|font/truetype\|font/collection' decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索文件扩展名检查 =========="
            rg -rn '\.ttf\|\.otf\|\.ttc\|\.woff\|endsWith\|extension\|suffix.*font\|font.*suffix' decoded/smali_classes*/com/vega/ 2>/dev/null | head -30

            echo ""
            echo "========== Typeface.createFromFile 调用 =========="
            rg -rn 'Typeface;->createFromFile\|Typeface;->create\|Typeface;->Builder' decoded/smali_classes*/com/vega/ 2>/dev/null | head -15
          } 2>&1 | tee logs/03_font_validation.txt

      - name: "4. 字体导入 ViewModel/UseCase"
        run: |
          {
            echo "========== 搜索 importFont / addFont 方法 =========="
            rg -rn "importFont\|addFont\|addLocal\|importLocal\|saveFont\|onFontSelected\|onFontPicked" decoded/smali_classes*/com/vega/ 2>/dev/null | head -30

            echo ""
            echo "========== 搜索 font picker / file chooser =========="
            rg -rn "font.*picker\|file.*chooser\|ACTION_OPEN_DOCUMENT\|ACTION_GET_CONTENT\|font.*select\|choose.*font" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== UserFontManager / CustomFont =========="
            find decoded/ -iname "*UserFont*" -o -iname "*CustomFont*" -o -iname "*PersonalFont*" | grep "\.smali$" | head -15
            for f in $(find decoded/ -iname "*UserFont*" -name "*.smali" -not -name "*\$*" -type f 2>/dev/null | head -3); do
              echo "--- $f ---"
              grep -n "\.method\|check\|valid\|format\|import\|add\|verify" "$f" | head -20
              echo ""
            done
          } 2>&1 | tee logs/04_font_import_flow.txt

      - name: "5. 错误提示文案资源追踪"
        run: |
          {
            echo "========== 搜索 format not supported 字符串资源 =========="
            rg -rn 'format.*not.*support\|格式不支持\|unsupported\|not.*support.*format' decoded/res/values*/strings.xml 2>/dev/null | head -10

            echo ""
            echo "========== 搜索 R.string 引用（包含 font + format/support/error）=========="
            rg -rn 'font.*unsupport\|font.*invalid\|font.*error\|font.*fail\|font.*format' decoded/res/values*/strings.xml 2>/dev/null | head -10

            echo ""
            echo "========== 搜索 Toast/Snackbar 显示字体错误 =========="
            rg -rn -B3 -A3 "font.*format\|format.*font" decoded/smali_classes*/com/vega/libsticker/ 2>/dev/null | head -40
            rg -rn -B3 -A3 "font.*format\|format.*font" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -40
          } 2>&1 | tee logs/05_error_string.txt

      - name: "6. native 层字体解析"
        run: |
          {
            echo "========== 搜索 native 字体解析方法 =========="
            rg -rn 'native.*font\|native.*typeface\|nativeCheck\|nativeValid\|nativeParse' decoded/ 2>/dev/null | head -15

            echo ""
            echo "========== libvega / libeffect 中的字体相关 =========="
            rg -rn 'font\|typeface' decoded/smali_classes*/com/vega/middlebridge/swig/ 2>/dev/null | grep -i "font\|typeface" | head -20

            echo ""
            echo "========== FontInfo / FontMetadata 类 =========="
            find decoded/ -iname "*FontInfo*" -o -iname "*FontMetadata*" -o -iname "*FontData*" | grep "\.smali$" | head -10
          } 2>&1 | tee logs/06_native_font.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14d-font-import-analysis
          path: logs/
          retention-days: 7
