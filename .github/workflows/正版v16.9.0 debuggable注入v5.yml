name: 正版v16.9.0 debuggable注入 v5 (二进制AXML精确修改)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 二进制修改 AndroidManifest.xml
        run: |
          mkdir -p work
          unzip -o official.apk AndroidManifest.xml -d work/

          echo "=== 原始 Manifest ==="
          ls -la work/AndroidManifest.xml
          file work/AndroidManifest.xml

          python3 << 'PYEOF'
          import struct, sys

          TARGET_OLD = "allowNativeHeapPointerTagging"
          TARGET_NEW = "debuggable"
          RESID_DEBUGGABLE = 0x0101000f

          with open("work/AndroidManifest.xml", "rb") as f:
              data = bytearray(f.read())

          print(f"文件大小: {len(data)} bytes")

          # ===== 1. 解析 String Pool 头部 =====
          SP = 8  # 跳过文件头 (type:4 + size:4)
          sp_type, sp_hdr_sz = struct.unpack_from('<HH', data, SP)
          sp_chunk_size = struct.unpack_from('<I', data, SP + 4)[0]
          sp_str_count = struct.unpack_from('<I', data, SP + 8)[0]
          sp_flags = struct.unpack_from('<I', data, SP + 16)[0]
          sp_str_start = struct.unpack_from('<I', data, SP + 20)[0]
          is_utf8 = bool(sp_flags & 0x100)

          print(f"StringPool: {sp_str_count} strings, {'UTF-8' if is_utf8 else 'UTF-16'}, size={sp_chunk_size}")

          OFF_BASE = SP + sp_hdr_sz          # 字符串偏移表起始
          STR_BASE = SP + sp_str_start       # 字符串数据起始

          # ===== 2. 遍历字符串池，找到目标字符串 =====
          target_idx = -1

          for i in range(sp_str_count):
              rel = struct.unpack_from('<I', data, OFF_BASE + i * 4)[0]
              pos = STR_BASE + rel

              if is_utf8:
                  p = pos
                  cc = data[p]; p += 1
                  if cc & 0x80: cc = ((cc & 0x7F) << 8) | data[p]; p += 1
                  bc = data[p]; p += 1
                  if bc & 0x80: bc = ((bc & 0x7F) << 8) | data[p]; p += 1
                  try: s = data[p:p+bc].decode('utf-8')
                  except: continue
                  data_start = p
                  data_end = p + bc + 1  # +1 for null terminator
              else:
                  p = pos
                  cc = struct.unpack_from('<H', data, p)[0]; p += 2
                  if cc & 0x8000:
                      cc = ((cc & 0x7FFF) << 16) | struct.unpack_from('<H', data, p)[0]; p += 2
                  try: s = data[p:p+cc*2].decode('utf-16-le')
                  except: continue
                  data_start = p
                  data_end = p + cc * 2 + 2  # +2 for null terminator

              if s == TARGET_OLD:
                  target_idx = i
                  print(f"✅ 找到 '{TARGET_OLD}' @ string index {i}, offset {pos}")

                  # 覆写字符串内容
                  wp = pos
                  if is_utf8:
                      new_b = TARGET_NEW.encode('utf-8')
                      data[wp] = len(TARGET_NEW); wp += 1
                      data[wp] = len(new_b); wp += 1
                      for b in new_b: data[wp] = b; wp += 1
                      data[wp] = 0; wp += 1
                  else:
                      new_u = TARGET_NEW.encode('utf-16-le')
                      struct.pack_into('<H', data, wp, len(TARGET_NEW)); wp += 2
                      for j, b in enumerate(new_u): data[wp+j] = b
                      wp += len(new_u)
                      struct.pack_into('<H', data, wp, 0); wp += 2

                  # 用零填充剩余空间
                  while wp < data_end: data[wp] = 0; wp += 1
                  print(f"✅ 字符串覆写: '{TARGET_OLD}' → '{TARGET_NEW}'")
                  break

          if target_idx == -1:
              print(f"❌ '{TARGET_OLD}' 未找到！")
              sys.exit(1)

          # ===== 3. 修改 Resource ID 表 =====
          RID = SP + sp_chunk_size  # 紧跟 String Pool 之后
          rid_chunk_size = struct.unpack_from('<I', data, RID + 4)[0]
          rid_count = (rid_chunk_size - 8) // 4

          print(f"ResourceID表: {rid_count} 个条目")

          if target_idx < rid_count:
              rid_off = RID + 8 + target_idx * 4
              old_rid = struct.unpack_from('<I', data, rid_off)[0]
              struct.pack_into('<I', data, rid_off, RESID_DEBUGGABLE)
              print(f"✅ ResID[{target_idx}]: 0x{old_rid:08X} → 0x{RESID_DEBUGGABLE:08X}")
          else:
              print(f"⚠️ target_idx={target_idx} 超出 ResID 表范围 ({rid_count})")

          # ===== 4. 在 XML 元素中找到该属性并改值为 true =====
          pos = RID + rid_chunk_size
          changed = False

          while pos < len(data) - 36:
              c_type = struct.unpack_from('<H', data, pos)[0]
              c_size = struct.unpack_from('<I', data, pos + 4)[0]

              if c_size < 8 or pos + c_size > len(data):
                  break

              if c_type == 0x0102:  # START_ELEMENT
                  # pos+24: attributeStart, pos+26: attributeSize, pos+28: attributeCount
                  attr_start = struct.unpack_from('<H', data, pos + 24)[0]
                  attr_size = struct.unpack_from('<H', data, pos + 26)[0]
                  attr_count = struct.unpack_from('<H', data, pos + 28)[0]
                  if attr_size == 0: attr_size = 20

                  a_base = pos + 16 + attr_start

                  for ai in range(attr_count):
                      ao = a_base + ai * attr_size
                      if ao + 20 > len(data): break

                      a_name = struct.unpack_from('<I', data, ao + 4)[0]

                      if a_name == target_idx:
                          a_type = data[ao + 15]   # dataType
                          a_val = struct.unpack_from('<i', data, ao + 16)[0]

                          print(f"\n✅ 找到属性 @ element offset {pos}")
                          print(f"   name_idx={a_name}, type=0x{a_type:02X}, value={a_val}")

                          # 改值为 true (-1 / 0xFFFFFFFF)
                          struct.pack_into('<i', data, ao + 16, -1)
                          print(f"   → 值已改为 -1 (true)")
                          changed = True
                          break

                  if changed: break

              pos += c_size

          # 备用搜索
          if not changed:
              print("\n⚠️ 结构化搜索未命中，启动原始字节搜索...")
              needle = struct.pack('<I', target_idx)
              sp = RID + rid_chunk_size
              while sp < len(data) - 20:
                  sp = data.find(needle, sp)
                  if sp == -1: break
                  if sp + 17 <= len(data):
                      t = data[sp + 11]
                      v = struct.unpack_from('<i', data, sp + 12)[0]
                      if t == 0x12 and v == 0:
                          struct.pack_into('<i', data, sp + 12, -1)
                          print(f"✅ 原始搜索命中 @ {sp}, 值已改为 true")
                          changed = True
                          break
                  sp += 4

          with open("work/AndroidManifest.xml", "wb") as f:
              f.write(data)

          print(f"\n文件大小: {len(data)} bytes (未变)")
          if changed:
              print("🎉 三项修改全部完成: 字符串 + ResID + 属性值")
          else:
              print("⚠️ 字符串和ResID已改，但属性值未确认")
          PYEOF

          echo ""
          echo "=== 修改后验证 ==="
          file work/AndroidManifest.xml
          ls -la work/AndroidManifest.xml

      - name: 组装 APK
        run: |
          cp official.apk capcut_v16.9_debug_v5.apk
          zip -d capcut_v16.9_debug_v5.apk "META-INF/*" 2>/dev/null || true

          cd work
          zip -0 ../capcut_v16.9_debug_v5.apk AndroidManifest.xml
          cd ..

          ls -la capcut_v16.9_debug_v5.apk

      - name: 对齐 + 签名
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_v16.9_debug_v5.apk aligned.apk

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 23 \
            --out capcut_v16.9_debug_v5_signed.apk \
            aligned.apk

          echo "=== 签名验证 ==="
          "$APKSIGNER" verify -v capcut_v16.9_debug_v5_signed.apk | head -10

          echo ""
          echo "=== aapt 验证 debuggable ==="
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          "$AAPT" dump badging capcut_v16.9_debug_v5_signed.apk 2>&1 | grep -iE "debuggable|package:|allowBackup" || echo "aapt 未找到相关信息"

          ls -la capcut_v16.9_debug_v5_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-debug-v5
          path: capcut_v16.9_debug_v5_signed.apk
          retention-days: 7
