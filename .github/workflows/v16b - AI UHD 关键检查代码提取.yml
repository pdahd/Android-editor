name: v16b - AI UHD 关键检查代码提取

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. VipStatusExtKt 完整代码（最关键：c() 和 d() 方法）"
        run: |
          {
            echo "========== VipStatusExtKt.smali 完整代码 =========="
            f=$(find decoded/ -name "VipStatusExtKt.smali" -path "*/subscriptionapi/ext/*" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at expected path, searching..."
              find decoded/ -name "VipStatusExtKt.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "VipStatusExtKt.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/01_vip_status_ext.txt

      - name: "2. BaseVipExportBusinessFunction H1/X2/t2 方法签名确认"
        run: |
          {
            f="decoded/smali_classes8/com/vega/subscription/biz/function/base/BaseVipExportBusinessFunction.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              echo ""
              echo "=== 方法定义列表 ==="
              grep -n "^\.method" "$f" | head -60
              echo ""
              echo "=== H1 方法完整代码 ==="
              sed -n '/^\.method.*H1(Z)Z/,/^\.end method/p' "$f"
              echo ""
              echo "=== X2 方法完整代码 ==="
              sed -n '/^\.method.*X2()Z/,/^\.end method/p' "$f"
              echo ""
              echo "=== t2 方法完整代码 ==="
              sed -n '/^\.method.*t2()Z/,/^\.end method/p' "$f"
              echo ""
              echo "=== u1 方法完整代码 ==="
              sed -n '/^\.method.*u1()Z/,/^\.end method/p' "$f"
            else
              echo "NOT FOUND"
            fi
          } 2>&1 | tee logs/02_h1_x2_t2_methods.txt

      - name: "3. 观察者 Lambda（VIP 特征检测 → 拦截触发）"
        run: |
          {
            echo "========== observeVipFeatures\$1 =========="
            f=$(find decoded/ -name "BaseVipExportBusinessFunction\$observeVipFeatures\$1.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
            fi

            echo ""
            echo "========== observeVipMaterials\$1 =========="
            f2=$(find decoded/ -name "BaseVipExportBusinessFunction\$observeVipMaterials\$1.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f2" ]; then
              echo "File: $f2 ($(wc -l < "$f2") lines)"
              cat "$f2"
            else
              echo "NOT FOUND"
            fi
          } 2>&1 | tee logs/03_observer_lambdas.txt

      - name: "4. ExportConfigPanel 中 AI UHD 开关的处理代码"
        run: |
          {
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            if [ -f "$f" ]; then
              echo "=== 字段 W（AI UHD CheckBox）的所有引用 ==="
              grep -n "->W:" "$f" | head -30

              echo ""
              echo "=== init\$18 内部类（可能包含 checkbox listener）==="
              f2="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel\$init\$18\$1.smali"
              if [ -f "$f2" ]; then
                echo "File: $f2 ($(wc -l < "$f2") lines)"
                cat "$f2"
              else
                echo "NOT FOUND"
                echo "--- 搜索所有 init 相关内部类 ---"
                find decoded/ -name "ExportConfigPanel\$init\$*" -name "*.smali" -type f 2>/dev/null | sort
              fi

              echo ""
              echo "=== 搜索 onCheckedChanged 实现 ==="
              find decoded/ -name "ExportConfigPanel*" -name "*.smali" -type f 2>/dev/null -exec grep -l "onCheckedChanged" {} \;

              echo ""
              echo "=== 行2700-2850附近（两个CheckBox的处理逻辑）==="
              sed -n '2700,2850p' "$f"
            fi
          } 2>&1 | tee logs/04_checkbox_handler.txt

      - name: "5. ExportHighDefinitionConfig（AI UHD 配置开关）"
        run: |
          {
            echo "========== ExportHighDefinitionConfig.smali =========="
            f=$(find decoded/ -name "ExportHighDefinitionConfig.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND, searching interface/abstract..."
              find decoded/ -iname "*ExportHighDefinition*" -name "*.smali" -type f 2>/dev/null | head -10
            fi

            echo ""
            echo "========== ExportHighDefinitionConfigABSetting =========="
            f2=$(find decoded/ -name "ExportHighDefinitionConfigABSetting.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f2" ]; then
              echo "File: $f2 ($(wc -l < "$f2") lines)"
              grep -n "\.method\|\.field" "$f2" | head -30
            fi
          } 2>&1 | tee logs/05_hd_config.txt

      - name: "6. 谁调用了 VipStatusExtKt.c() 和 d()"
        run: |
          {
            echo "========== VipStatusExtKt.c() 调用者 =========="
            rg -n "VipStatusExtKt;->c\(" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== VipStatusExtKt.d() 调用者 =========="
            rg -n "VipStatusExtKt;->d\(" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== VipPayInfoProvider.p() 调用者（导出相关）=========="
            rg -n "VipPayInfoProvider;->p\(" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20
          } 2>&1 | tee logs/06_callers.txt

      - name: "7. ExportConfigPanel 行4000-4100和行8680-8720（HD config 检查点）"
        run: |
          {
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            if [ -f "$f" ]; then
              echo "=== 行3990-4020（ExportHighDefinitionConfig.b() 调用点 1）==="
              sed -n '3990,4020p' "$f"

              echo ""
              echo "=== 行5045-5075（ExportHighDefinitionConfig.b() 调用点 2）==="
              sed -n '5045,5075p' "$f"

              echo ""
              echo "=== 行8685-8720（ExportHighDefinitionConfig.b() 调用点 3）==="
              sed -n '8685,8720p' "$f"

              echo ""
              echo "=== 行8975-9010（ExportHighDefinitionConfig.a() 调用点）==="
              sed -n '8975,9010p' "$f"

              echo ""
              echo "=== 行9130-9170（ExportHighDefinitionConfig.a()+d() 调用点）==="
              sed -n '9130,9170p' "$f"

              echo ""
              echo "=== 行9395-9450（showHighDefinitionGuide 调用）==="
              sed -n '9395,9450p' "$f"
            fi
          } 2>&1 | tee logs/07_hd_config_calls.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v16b-uhd-critical-checks
          path: logs/
          retention-days: 7
