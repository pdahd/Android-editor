name: v15e - 提取 AI UHD doUseFunction 代码

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. UHD doUseFunction$1 完整代码"
        run: |
          {
            f="decoded/smali_classes8/com/vega/subscription/biz/function/TemplateExportUltraHdBusinessFunction\$doUseFunction\$1.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -name "TemplateExportUltraHdBusinessFunction*doUseFunction*" -name "*.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/01_uhd_dousefunction.txt

      - name: "2. UHD 主类方法列表（快速扫描）"
        run: |
          {
            f="decoded/smali_classes8/com/vega/subscription/biz/function/TemplateExportUltraHdBusinessFunction.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              grep -n "\.method\|\.field\|BenefitResource\|verify\|check\|vip\|benefit" "$f" | head -30
            fi
          } 2>&1 | tee logs/02_uhd_main_class.txt

      - name: "3. 其他待解锁的 BusinessFunction（完整扫描）"
        run: |
          {
            echo "========== 所有 BusinessFunction 主类 =========="
            find decoded/ -path "*/subscription/biz/function/*" -name "*.smali" -type f 2>/dev/null | grep -v "\$" | sort

            echo ""
            echo "========== 所有含 doUseFunction 的 BusinessFunction =========="
            find decoded/ -path "*/subscription/biz/function/*" -name "*doUseFunction*1.smali" -type f 2>/dev/null | sort
          } 2>&1 | tee logs/03_all_business_functions.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15e-uhd-extraction
          path: logs/
          retention-days: 7
