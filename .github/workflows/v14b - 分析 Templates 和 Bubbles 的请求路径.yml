name: v14b - 分析 Templates 和 Bubbles 的请求路径

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. SubtitleTemplate 请求路径"
        run: |
          {
            echo "========== SubtitleTemplate 相关类 =========="
            find decoded/ -iname "*SubtitleTemplate*" -name "*.smali" -type f 2>/dev/null

            echo ""
            echo "========== SubtitleTemplateEffectRepository 完整方法列表 =========="
            for f in $(find decoded/ -iname "*SubtitleTemplateEffectRepository*" -name "*.smali" -type f 2>/dev/null | grep -v '\$'); do
              echo "--- $f ---"
              grep -n "\.method" "$f" | head -30
              echo ""
            done

            echo ""
            echo "========== SubtitleTemplateEffectRepository 内部类（callback） =========="
            find decoded/ -iname "*SubtitleTemplateEffectRepository\$*" -name "*.smali" -type f 2>/dev/null

            echo ""
            echo "========== subtitle-templates 字符串引用 =========="
            rg -n '"subtitle-templates"\|"subtitle_templates"\|"SUBTITLE_TEMPLATE"' decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== Too many people 字符串 =========="
            rg -rn "Too many people\|too_many_people\|R\.string.*too_many\|rate.*limit\|server.*busy" decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/01_template_path.txt

      - name: "2. Bubble 请求路径"
        run: |
          {
            echo "========== Bubble 相关类 =========="
            find decoded/ -iname "*Bubble*Repository*" -o -iname "*Bubble*ViewModel*" 2>/dev/null | grep "\.smali$" | head -20

            echo ""
            echo "========== bubble 面板字符串 =========="
            rg -n '"bubble"\|"bubbles"' decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== TextBubble 相关 =========="
            find decoded/ -iname "*TextBubble*" -name "*.smali" -type f 2>/dev/null | head -10
          } 2>&1 | tee logs/02_bubble_path.txt

      - name: "3. ArtistEffectRepository（可能是 Templates 的实际请求者）"
        run: |
          {
            echo "========== ArtistEffectRepository 方法列表 =========="
            for f in $(find decoded/ -name "ArtistEffectRepository.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              grep -n "\.method\|getPanel\|fetchEffect\|template\|subtitle\|callback" "$f" | head -40
            done

            echo ""
            echo "========== ArtistEffectRepository 内部 callback$2 =========="
            find decoded/ -path "*ArtistEffectRepository*callback*2*" -name "*.smali" -type f 2>/dev/null
            for f in $(find decoded/ -path "*ArtistEffectRepository*callback*2*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              head -30 "$f"
              echo "..."
            done

            echo ""
            echo "========== fetchEffectByCategories 相关 =========="
            rg -n "fetchEffectByCategories\|fetchEffectByPanel" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20
          } 2>&1 | tee logs/03_artist_effect_repo.txt

      - name: "4. 错误消息映射（找 Too many people 的来源）"
        run: |
          {
            echo "========== 搜索错误提示文案的资源 ID =========="
            rg -rn "server.*busy\|rate.*limit\|too.*many\|try.*again.*later" decoded/res/values/strings.xml 2>/dev/null | head -10
            
            echo ""
            echo "========== 或者在 smali 中搜索 =========="
            rg -n "Too many\|server_busy\|network_error\|retry_later" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== 错误状态处理：谁显示了错误 UI =========="
            rg -n "showError\|showEmpty\|showRetry\|showLoading\|ErrorState\|EmptyState" decoded/smali_classes*/com/vega/libeffect/ 2>/dev/null | head -20
            rg -n "showError\|showEmpty\|showRetry\|ErrorState" decoded/smali_classes*/com/vega/subtitle/ 2>/dev/null | head -20
          } 2>&1 | tee logs/04_error_message.txt

      - name: "5. removeAllResPoolCache 的调用链（找到触发源）"
        run: |
          {
            echo "========== 方法 F 的完整代码（removeAllResPoolCache 所在）=========="
            f=$(find decoded/ -name "ResPoolRepository.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              awk '/^\.method public static F\(/,/^\.end method/' "$f"
            fi

            echo ""
            echo "========== 谁调用了方法 F =========="
            rg -n "ResPoolRepository;->F\(" decoded/ 2>/dev/null | head -10

            echo ""
            echo "========== removeAllResPoolCache 调用者（不是内部类）=========="
            rg -n "removeAllResPoolCache" decoded/ 2>/dev/null | grep -v '\$removeAllResPoolCache' | head -10
          } 2>&1 | tee logs/05_remove_cache_callers.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14b-template-bubble-analysis
          path: logs/
          retention-days: 7
