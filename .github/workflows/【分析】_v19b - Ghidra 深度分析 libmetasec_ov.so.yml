name: 【分析】v19b - Ghidra 深度分析 libmetasec_ov.so

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Ghidra
        run: |
          curl -fL --retry 3 -o ghidra.zip \
            https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
          unzip -q ghidra.zip
          mv ghidra_* ghidra

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq unzip binutils

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SO
        run: |
          mkdir -p so_files
          unzip -o official.apk "lib/arm64-v8a/libmetasec_ov.so" -d so_files/
          ls -la so_files/lib/arm64-v8a/

      - name: Create analysis script and directories
        run: |
          mkdir -p logs
          mkdir -p /tmp/ghidra_proj
          mkdir -p /tmp/ghidra_output
          cat > /tmp/MetasecAnalysis.java << 'JAVA_SCRIPT'
          import ghidra.app.script.GhidraScript;
          import ghidra.program.model.symbol.*;
          import ghidra.program.model.listing.*;
          import ghidra.program.model.address.*;
          import ghidra.program.model.data.*;
          import ghidra.app.decompiler.*;
          import java.io.*;
          import java.util.*;

          public class MetasecAnalysis extends GhidraScript {
              @Override
              public void run() throws Exception {
                  FunctionManager fm = currentProgram.getFunctionManager();
                  Listing listing = currentProgram.getListing();
                  String outDir = "/tmp/ghidra_output";

                  // 1. All functions
                  PrintWriter pw1 = new PrintWriter(new File(outDir + "/01_all_functions.txt"));
                  pw1.println("=== All Functions (" + fm.getFunctionCount() + ") ===");
                  FunctionIterator fIter = fm.getFunctions(true);
                  while (fIter.hasNext()) {
                      Function fn = fIter.next();
                      pw1.println(fn.getEntryPoint() + " | " + fn.getName() + " | size=" + fn.getBody().getNumAddresses());
                  }
                  pw1.close();

                  // 2. Key functions
                  PrintWriter pw2 = new PrintWriter(new File(outDir + "/02_key_functions.txt"));
                  pw2.println("=== Key Functions ===");
                  String[] keywords = {"sign", "verify", "check", "hash", "package", "init", "jni",
                      "cert", "valid", "metasec", "pitaya", "jwp", "wasm", "vm_", "_vm",
                      "shark", "block", "risk", "security", "apk", "dex", "hook", "detect",
                      "tamper", "integrity", "register", "native"};
                  fIter = fm.getFunctions(true);
                  while (fIter.hasNext()) {
                      Function fn = fIter.next();
                      String name = fn.getName().toLowerCase();
                      for (String kw : keywords) {
                          if (name.contains(kw)) {
                              pw2.println(fn.getEntryPoint() + " | " + fn.getName() + " | size=" + fn.getBody().getNumAddresses());
                              break;
                          }
                      }
                  }
                  pw2.close();

                  // 3. JNI_OnLoad decompilation
                  PrintWriter pw3 = new PrintWriter(new File(outDir + "/03_jni_onload.txt"));
                  pw3.println("=== JNI_OnLoad Analysis ===");
                  Function jniFunc = null;
                  fIter = fm.getFunctions(true);
                  while (fIter.hasNext()) {
                      Function fn = fIter.next();
                      if (fn.getName().equals("JNI_OnLoad")) {
                          jniFunc = fn;
                          break;
                      }
                  }
                  if (jniFunc != null) {
                      pw3.println("Found at: " + jniFunc.getEntryPoint() + " size=" + jniFunc.getBody().getNumAddresses());
                      DecompInterface decompiler = new DecompInterface();
                      decompiler.openProgram(currentProgram);
                      DecompileResults results = decompiler.decompileFunction(jniFunc, 120, monitor);
                      if (results != null && results.getDecompiledFunction() != null) {
                          pw3.println(results.getDecompiledFunction().getC());
                      } else {
                          pw3.println("Decompilation failed, showing assembly:");
                          InstructionIterator iIter = listing.getInstructions(jniFunc.getBody(), true);
                          int count = 0;
                          while (iIter.hasNext() && count < 300) {
                              Instruction inst = iIter.next();
                              pw3.println(inst.getAddress() + "  " + inst);
                              count++;
                          }
                      }
                      decompiler.dispose();
                  } else {
                      pw3.println("JNI_OnLoad NOT FOUND");
                  }
                  pw3.close();

                  // 4. Top 50 largest functions
                  PrintWriter pw4 = new PrintWriter(new File(outDir + "/04_large_functions.txt"));
                  pw4.println("=== Top 50 Largest Functions ===");
                  List<long[]> sizes = new ArrayList<>();
                  List<String> names = new ArrayList<>();
                  List<String> addrs = new ArrayList<>();
                  fIter = fm.getFunctions(true);
                  while (fIter.hasNext()) {
                      Function fn = fIter.next();
                      long sz = fn.getBody().getNumAddresses();
                      sizes.add(new long[]{sz});
                      names.add(fn.getName());
                      addrs.add(fn.getEntryPoint().toString());
                  }
                  Integer[] indices = new Integer[sizes.size()];
                  for (int i = 0; i < indices.length; i++) indices[i] = i;
                  Arrays.sort(indices, (a, b) -> Long.compare(sizes.get(b)[0], sizes.get(a)[0]));
                  for (int i = 0; i < Math.min(50, indices.length); i++) {
                      int idx = indices[i];
                      pw4.println(addrs.get(idx) + " | " + names.get(idx) + " | size=" + sizes.get(idx)[0]);
                  }
                  pw4.close();

                  // 5. String references
                  PrintWriter pw5 = new PrintWriter(new File(outDir + "/05_string_xrefs.txt"));
                  pw5.println("=== String Cross-References ===");
                  DataIterator dIter = listing.getDefinedData(true);
                  while (dIter.hasNext()) {
                      Data data = dIter.next();
                      Object val = data.getValue();
                      if (val != null && val instanceof String) {
                          String s = ((String)val).toLowerCase();
                          if (s.contains("signature") || s.contains("packageinfo") ||
                              s.contains("getpackage") || s.contains("/data/data") ||
                              s.contains("base.apk") || s.contains("metasec") ||
                              s.contains("pitaya") || s.contains("jwp_call") ||
                              s.contains("should_have") || s.contains("package_version") ||
                              s.contains("registernative") || s.contains("findclass")) {
                              pw5.println("\nString: \"" + val + "\" at " + data.getAddress());
                              ReferenceIterator refs = data.getReferenceIteratorTo();
                              while (refs.hasNext()) {
                                  Reference ref = refs.next();
                                  Function refFn = fm.getFunctionContaining(ref.getFromAddress());
                                  String fnName = refFn != null ? refFn.getName() : "unknown";
                                  pw5.println("  Referenced by: " + ref.getFromAddress() + " in " + fnName);
                              }
                          }
                      }
                  }
                  pw5.close();

                  println("Analysis complete! Files in " + outDir);
              }
          }
          JAVA_SCRIPT

      - name: Run Ghidra analysis
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
          ghidra/support/analyzeHeadless /tmp/ghidra_proj MetasecProject \
            -import "$SO" \
            -processor AARCH64:LE:64:v8A \
            -scriptPath /tmp \
            -postScript MetasecAnalysis.java

      - name: Collect results
        if: always()
        run: |
          for f in /tmp/ghidra_output/*.txt; do
            if [ -f "$f" ]; then
              cp "$f" logs/
            fi
          done
          if [ ! "$(ls -A logs/ 2>/dev/null)" ]; then
            echo "No output generated" > logs/00_status.txt
          fi
          ls -la logs/

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v19b-ghidra-deep-analysis
          path: logs/
          retention-days: 7
