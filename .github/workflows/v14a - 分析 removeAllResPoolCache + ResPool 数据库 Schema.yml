name: v14a - 分析 removeAllResPoolCache + ResPool 数据库 Schema

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: |
          java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. removeAllResPoolCache 完整代码"
        run: |
          {
            echo "========== 搜索 removeAllResPoolCache 方法 =========="
            rg -n "removeAllResPoolCache" decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== ResPoolRepository 中包含 remove/cache 的方法 =========="
            f=$(find decoded/ -name "ResPoolRepository.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f"
              grep -n "\.method\|removeAll\|removeCache\|clearCache\|RemoveResource" "$f" | head -30
            fi

            echo ""
            echo "========== removeAllResPoolCache 方法的完整代码 =========="
            if [ -n "$f" ]; then
              awk '/removeAllResPoolCache/,/\.end method/' "$f" | head -80
            fi
          } 2>&1 | tee logs/01_removeCache.txt

      - name: "2. 谁调用了 removeAllResPoolCache"
        run: |
          {
            echo "========== removeAllResPoolCache 的所有调用者 =========="
            rg -n "removeAllResPoolCache" decoded/ 2>/dev/null

            echo ""
            echo "========== RemoveResourceCache 在 Java 层的调用 =========="
            rg -n "RemoveResourceCache" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== shark block 触发缓存清除的逻辑 =========="
            rg -n -B5 -A5 "removeAll" decoded/smali_classes*/com/vega/libeffect/ 2>/dev/null | head -60
          } 2>&1 | tee logs/02_callers.txt

      - name: "3. ResPool 数据库 Schema（v16.9.0 的表结构）"
        run: |
          {
            echo "========== ArtistsPanelCategoriesDao =========="
            find decoded/ -iname "*ArtistsPanelCategories*Dao*" -name "*.smali" 2>/dev/null | head -10
            for f in $(find decoded/ -iname "*ArtistsPanelCategories*Dao*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              grep -n "CREATE TABLE\|INSERT\|SELECT\|column\|TABLE_NAME\|const-string" "$f" | head -30
              echo ""
            done

            echo ""
            echo "========== ArtistsCategoryEffectsDao =========="
            find decoded/ -iname "*ArtistsCategoryEffects*Dao*" -name "*.smali" 2>/dev/null | head -10
            for f in $(find decoded/ -iname "*ArtistsCategoryEffects*Dao*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              grep -n "CREATE TABLE\|INSERT\|SELECT\|column\|TABLE_NAME\|const-string" "$f" | head -30
              echo ""
            done

            echo ""
            echo "========== 搜索所有 CREATE TABLE 语句 =========="
            rg -n "CREATE TABLE" decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -30

            echo ""
            echo "========== 搜索 rp.db / respool 数据库名 =========="
            rg -n '"rp\.db"\|"rp_db"\|"respool"' decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索数据库文件名 =========="
            rg -n '".*\.db"' decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -20
            rg -n '".*\.db"' decoded/smali_classes*/com/vega/libeffect/ 2>/dev/null | head -20
          } 2>&1 | tee logs/03_db_schema.txt

      - name: "4. ArtistsPanelCategoriesResponse 对象结构"
        run: |
          {
            echo "========== ArtistsPanelCategoriesResponse 类 =========="
            for f in $(find decoded/ -iname "*ArtistsPanelCategoriesResponse*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== ArtistsCategoryEffectsResponse 类 =========="
            for f in $(find decoded/ -iname "*ArtistsCategoryEffectsResponse*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              head -100 "$f"
              echo "..."
              echo ""
            done

            echo ""
            echo "========== Gson/SerializedName 在 librespool 中 =========="
            rg -n "SerializedName\|com/google/gson" decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -20

            echo ""
            echo "========== Djinni 生成的 CppProxy 类 =========="
            find decoded/ -path "*/librespool/*CppProxy*" -name "*.smali" -type f 2>/dev/null | head -10
          } 2>&1 | tee logs/04_response_structure.txt

      - name: "5. EffectPlatform 缓存路径"
        run: |
          {
            echo "========== EffectCacheKeyGenerator 完整代码 =========="
            f=$(find decoded/ -name "EffectCacheKeyGenerator.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            fi
          } 2>&1 | tee logs/05_cache_key_gen.txt

      - name: "6. shark block 状态管理"
        run: |
          {
            echo "========== SharkManager 完整代码 =========="
            for f in $(find decoded/ -name "SharkManager.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== shark block 后的处理逻辑 =========="
            rg -n -B3 -A10 "shark.*block\|block.*reinstall\|removeAll.*Cache" decoded/smali_classes*/com/vega/ 2>/dev/null | head -80
          } 2>&1 | tee logs/06_shark_manager.txt

      - name: "7. FetchCache 流程"
        run: |
          {
            echo "========== ArtistPanelInfoFetchCache 相关 =========="
            rg -n "FetchCache" decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -20

            echo ""
            echo "========== QueryPanelVersion 相关 =========="
            rg -n "QueryPanelVersion\|panel_version\|panelVersion" decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -20

            echo ""
            echo "========== 缓存命中判断逻辑 =========="
            rg -n "cache.*hit\|skip.*network\|use.*cache\|found.*cache" decoded/smali_classes*/com/lemon/librespool/ 2>/dev/null | head -20
          } 2>&1 | tee logs/07_fetch_cache.txt

      - name: "8. callback$2 错误回调完整代码"
        run: |
          {
            echo "========== getArtistsPanelInfo callback$2 =========="
            for f in $(find decoded/ -path "*getArtistsPanelInfo*callback*2*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== getArtistsCategoryEffects callback$2 =========="
            for f in $(find decoded/ -path "*getArtistsCategoryEffects*callback*2*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/08_callback2.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14a-respool-deep-analysis
          path: logs/
          retention-days: 7
