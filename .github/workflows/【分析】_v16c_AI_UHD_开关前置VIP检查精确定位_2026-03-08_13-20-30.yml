name: 【分析】_v16c_AI_UHD_开关前置VIP检查精确定位_2026-03-08_13-20-30

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. 定位 checkbox handler 文件（谁打印了 highDefinitionCheckBox 日志）"
        run: |
          {
            echo "=== 搜索 'highDefinitionCheckBox' 字符串 ==="
            rg -rn "highDefinitionCheckBox" decoded/ 2>/dev/null | head -30

            echo ""
            echo "=== 搜索 onCheckedChanged 实现（ExportConfigPanel 相关文件）==="
            find decoded/ -name "ExportConfigPanel*" -name "*.smali" -type f 2>/dev/null \
              -exec grep -l "onCheckedChanged" {} \;

            echo ""
            echo "=== 所有 ExportConfigPanel 内部类列表 ==="
            find decoded/ -name "ExportConfigPanel\$*" -name "*.smali" -type f 2>/dev/null | sort
          } 2>&1 | tee logs/01_find_handler.txt

      - name: "2. 提取 checkbox handler 完整代码"
        run: |
          {
            # 方案A：在内部类中搜索
            for f in $(rg -l "highDefinitionCheckBox" decoded/smali_classes*/com/vega/edit/widget/ExportConfigPanel* 2>/dev/null); do
              echo "=== FILE: $f ($(wc -l < "$f") lines) ==="
              cat "$f"
              echo ""
            done

            # 方案B：在主类中搜索（如果内部类没找到）
            MAIN="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            if [ -f "$MAIN" ]; then
              LINE=$(grep -n "highDefinitionCheckBox" "$MAIN" | head -1 | cut -d: -f1)
              if [ -n "$LINE" ]; then
                echo "=== ExportConfigPanel.smali 主类中找到，行 $LINE ==="
                # 向前找到方法开头，向后找到方法结尾
                START=$((LINE - 60))
                END=$((LINE + 120))
                [ $START -lt 1 ] && START=1
                echo "=== 行 $START - $END ==="
                sed -n "${START},${END}p" "$MAIN"
              fi
            fi
          } 2>&1 | tee logs/02_handler_code.txt

      - name: "3. showHighDefinitionGuide 方法和所有相关内部类"
        run: |
          {
            MAIN="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"

            echo "=== showHighDefinitionGuide 方法定义 ==="
            if [ -f "$MAIN" ]; then
              sed -n '/\.method.*showHighDefinitionGuide/,/^\.end method/p' "$MAIN"
            fi

            echo ""
            echo "=== showHighDefinitionGuide 调用点 ==="
            grep -n "showHighDefinitionGuide" "$MAIN" 2>/dev/null | head -10

            echo ""
            echo "=== showHighDefinitionGuide 内部类完整代码 ==="
            for f in $(find decoded/ -name "ExportConfigPanel\$showHighDefinitionGuide*" -name "*.smali" -type f 2>/dev/null | sort); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "=== saveAIUltraHDToSp 内部类完整代码 ==="
            for f in $(find decoded/ -name "ExportConfigPanel\$saveAIUltraHD*" -name "*.smali" -type f 2>/dev/null | sort); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/03_show_hd_guide.txt

      - name: "4. //login 导航路径追踪"
        run: |
          {
            echo "=== '//login' 在 edit 包中的引用 ==="
            rg -rn '"//login"' decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20

            echo ""
            echo "=== '//login' 在 ExportConfigPanel 中的引用 ==="
            rg -rn '"//login"' decoded/smali_classes*/com/vega/edit/widget/ExportConfigPanel* 2>/dev/null | head -20

            echo ""
            echo "=== 'login' 相关字符串在 ExportConfigPanel 中 ==="
            MAIN="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            grep -n "login\|Login\|LOGIN" "$MAIN" 2>/dev/null | head -20

            echo ""
            echo "=== LookiActivityInterceptor 完整代码 ==="
            for f in $(find decoded/ -name "LookiActivityInterceptor.smali" -type f 2>/dev/null | head -2); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              if [ $(wc -l < "$f") -lt 500 ]; then
                cat "$f"
              else
                grep -n "\.method\|//login\|intercept\|navigate\|launch\|startAct" "$f" | head -40
              fi
            done
          } 2>&1 | tee logs/04_login_nav.txt

      - name: "5. ExportConfigPanel init$15 到 init$20 内部类（可能包含 checkbox listener）"
        run: |
          {
            for i in 15 16 17 18 19 20 21 22; do
              for suffix in "" "\$1" "\$2"; do
                f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel\$init\$${i}${suffix}.smali"
                if [ -f "$f" ]; then
                  LINES=$(wc -l < "$f")
                  echo "=== $f ($LINES lines) ==="
                  if [ $LINES -lt 200 ]; then
                    cat "$f"
                  else
                    echo "(large file, showing key parts)"
                    grep -n "onCheckedChanged\|highDefinition\|checkbox\|Checked\|vip\|Vip\|VIP\|login\|Login\|guide\|Guide\|pay\|Pay\|subscribe" "$f" | head -30
                    echo ""
                    echo "--- Method list ---"
                    grep -n "^\.method" "$f"
                  fi
                  echo ""
                fi
              done
            done
          } 2>&1 | tee logs/05_init_classes.txt

      - name: "6. VipPayInfoProvider 和 ExportHighDefinitionConfig"
        run: |
          {
            echo "=== VipPayInfoProvider 在 ExportConfigPanel 中的调用 ==="
            MAIN="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            grep -n "VipPayInfoProvider" "$MAIN" 2>/dev/null | head -20

            echo ""
            echo "=== ExportHighDefinitionConfig 完整代码 ==="
            for f in $(find decoded/ -name "ExportHighDefinitionConfig.smali" -type f 2>/dev/null | head -2); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "=== ExportHighDefinitionConfig 在 ExportConfigPanel 中的调用 ==="
            grep -n "ExportHighDefinitionConfig" "$MAIN" 2>/dev/null | head -20

            echo ""
            echo "=== ExportHighDefinitionConfigABSetting 完整代码 ==="
            for f in $(find decoded/ -name "ExportHighDefinitionConfigABSetting.smali" -type f 2>/dev/null | head -2); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              if [ $(wc -l < "$f") -lt 300 ]; then
                cat "$f"
              else
                grep -n "^\.method\|^\.field" "$f"
              fi
              echo ""
            done
          } 2>&1 | tee logs/06_vip_pay_hd_config.txt

      - name: "7. ExportConfigPanel 中 HD config 相关方法（完整提取）"
        run: |
          {
            MAIN="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            if [ -f "$MAIN" ]; then
              echo "=== 包含 highDefinition/HighDefinition 的所有行 ==="
              grep -n -i "highDefinition\|high_definition\|ultraHd\|ultra_hd" "$MAIN" | head -40

              echo ""
              echo "=== 包含 guide/Guide 的所有行 ==="
              grep -n -i "guide" "$MAIN" | head -20

              echo ""
              echo "=== 方法列表（method 签名）==="
              grep -n "^\.method" "$MAIN" | head -80

              echo ""
              echo "=== 包含 setChecked 的行（checkbox 状态回写）==="
              grep -n "setChecked" "$MAIN" | head -20

              echo ""
              echo "=== 包含 startActivity/navigate/launch 的行 ==="
              grep -n "startActivity\|navigate\|launch\|router\|Router" "$MAIN" | head -20
            fi
          } 2>&1 | tee logs/07_panel_methods.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v16c-checkbox-handler
          path: logs/
          retention-days: 7
