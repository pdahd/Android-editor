name: 【分析】_v19b - Ghidra 深度分析 libmetasec_ov.so_2026-03-20_15-23-21

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Ghidra
        run: |
          curl -fL --retry 3 -o ghidra.zip \
            https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.3_build/ghidra_11.3_PUBLIC_20250205.zip
          unzip -q ghidra.zip
          mv ghidra_* ghidra
          echo "$PWD/ghidra/support" >> $GITHUB_PATH

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq unzip binutils

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SO
        run: |
          mkdir -p so_files
          unzip -o official.apk "lib/arm64-v8a/libmetasec_ov.so" -d so_files/
          ls -la so_files/lib/arm64-v8a/

      - name: Create logs directory
        run: mkdir -p logs

      - name: "Ghidra headless analysis + export"
        run: |
          SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
          
          # Create Ghidra project and analyze
          ghidra/support/analyzeHeadless /tmp/ghidra_proj MetasecProject \
            -import "$SO" \
            -processor AARCH64:LE:64:v8A \
            -postScript /dev/stdin << 'GHIDRA_SCRIPT'
          import ghidra.program.model.symbol.*;
          import ghidra.program.model.listing.*;
          import ghidra.program.model.address.*;
          import java.io.*;

          def fm = currentProgram.getFunctionManager()
          def listing = currentProgram.getListing()
          def mem = currentProgram.getMemory()
          def symTable = currentProgram.getSymbolTable()

          // 1. Export all functions with their sizes
          def pw1 = new PrintWriter(new File("/tmp/ghidra_proj/functions.txt"))
          pw1.println("=== All Functions (${fm.getFunctionCount()}) ===")
          fm.getFunctions(true).each { fn ->
            pw1.println("${fn.getEntryPoint()} | ${fn.getName()} | size=${fn.getBody().getNumAddresses()}")
          }
          pw1.close()

          // 2. Export functions containing key strings in their name
          def pw2 = new PrintWriter(new File("/tmp/ghidra_proj/key_functions.txt"))
          pw2.println("=== Key Functions (sign/verify/check/hash/package/init/jni) ===")
          fm.getFunctions(true).each { fn ->
            def name = fn.getName().toLowerCase()
            if (name.contains("sign") || name.contains("verify") || name.contains("check") ||
                name.contains("hash") || name.contains("package") || name.contains("init") ||
                name.contains("jni") || name.contains("cert") || name.contains("valid") ||
                name.contains("metasec") || name.contains("pitaya") || name.contains("jwp") ||
                name.contains("wasm") || name.contains("vm_") || name.contains("_vm") ||
                name.contains("shark") || name.contains("block") || name.contains("risk")) {
              pw2.println("${fn.getEntryPoint()} | ${fn.getName()} | size=${fn.getBody().getNumAddresses()}")
            }
          }
          pw2.close()

          // 3. Export JNI_OnLoad decompilation
          def pw3 = new PrintWriter(new File("/tmp/ghidra_proj/jni_onload.txt"))
          pw3.println("=== JNI_OnLoad Decompilation ===")
          def jniFunc = null
          fm.getFunctions(true).each { fn ->
            if (fn.getName() == "JNI_OnLoad") jniFunc = fn
          }
          if (jniFunc != null) {
            def decompInterface = new ghidra.app.decompiler.DecompInterface()
            decompInterface.openProgram(currentProgram)
            def results = decompInterface.decompileFunction(jniFunc, 60, monitor)
            if (results != null && results.depiledFunction != null) {
              pw3.println(results.getDecompiledFunction().getC())
            } else if (results != null) {
              pw3.println(results.getErrorMessage())
              // Fallback: print assembly
              pw3.println("\n=== Assembly fallback ===")
              def body = jniFunc.getBody()
              def iter = listing.getInstructions(body, true)
              def count = 0
              while (iter.hasNext() && count < 200) {
                def inst = iter.next()
                pw3.println("${inst.getAddress()} ${inst}")
                count++
              }
            }
            decompInterface.dispose()
          } else {
            pw3.println("JNI_OnLoad not found!")
          }
          pw3.close()

          // 4. Export cross-references to key strings
          def pw4 = new PrintWriter(new File("/tmp/ghidra_proj/string_xrefs.txt"))
          pw4.println("=== Cross-references to key strings ===")
          def strings = currentProgram.getListing().getDefinedData(true)
          strings.each { data ->
            if (data.getDataType().getName().contains("string") || data.getDataType().getName().contains("char")) {
              def val = data.getValue()
              if (val != null) {
                def s = val.toString().toLowerCase()
                if (s.contains("signature") || s.contains("package") || s.contains("hash") ||
                    s.contains("sign") || s.contains("verify") || s.contains("/data/data") ||
                    s.contains("base.apk") || s.contains("metasec") || s.contains("pitaya") ||
                    s.contains("jwp_call") || s.contains("shark") || s.contains("reinstall")) {
                  pw4.println("\nString: \"${val}\" at ${data.getAddress()}")
                  def refs = data.getReferenceIteratorTo()
                  refs.each { ref ->
                    def refFn = fm.getFunctionContaining(ref.getFromAddress())
                    def fnName = refFn != null ? refFn.getName() : "unknown"
                    pw4.println("  Referenced by: ${ref.getFromAddress()} in ${fnName}")
                  }
                }
              }
            }
          }
          pw4.close()

          // 5. Export large functions (likely main logic)
          def pw5 = new PrintWriter(new File("/tmp/ghidra_proj/large_functions.txt"))
          pw5.println("=== Top 50 Largest Functions ===")
          def funcList = []
          fm.getFunctions(true).each { fn ->
            funcList.add([name: fn.getName(), addr: fn.getEntryPoint().toString(), size: fn.getBody().getNumAddresses()])
          }
          funcList.sort { -it.size }
          funcList.take(50).each { f ->
            pw5.println("${f.addr} | ${f.name} | size=${f.size}")
          }
          pw5.close()

          println "Analysis complete. Files written to /tmp/ghidra_proj/"
          GHIDRA_SCRIPT

      - name: Collect results
        run: |
          cp /tmp/ghidra_proj/functions.txt logs/01_all_functions.txt 2>/dev/null || echo "NOT GENERATED" > logs/01_all_functions.txt
          cp /tmp/ghidra_proj/key_functions.txt logs/02_key_functions.txt 2>/dev/null || echo "NOT GENERATED" > logs/02_key_functions.txt
          cp /tmp/ghidra_proj/jni_onload.txt logs/03_jni_onload.txt 2>/dev/null || echo "NOT GENERATED" > logs/03_jni_onload.txt
          cp /tmp/ghidra_proj/string_xrefs.txt logs/04_string_xrefs.txt 2>/dev/null || echo "NOT GENERATED" > logs/04_string_xrefs.txt
          cp /tmp/ghidra_proj/large_functions.txt logs/05_large_functions.txt 2>/dev/null || echo "NOT GENERATED" > logs/05_large_functions.txt
          ls -la logs/

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v19b-ghidra-deep-analysis
          path: logs/
          retention-days: 7
