name: v11a - 分析 TransLynxActivity + 路由类 + 安全组件

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile DEX (skip resources)
        run: |
          java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true
          echo "=== smali 目录数 ==="
          ls -d decoded/smali_classes* 2>/dev/null | wc -l

      - name: Create logs directory
        run: mkdir -p logs

      - name: 1. TransLynxActivity 完整代码
        run: |
          {
            echo "========== 搜索 TransLynxActivity =========="
            find decoded/ -name "TransLynxActivity.smali" -type f 2>/dev/null

            echo ""
            echo "========== TransLynxActivity 完整代码 =========="
            for f in $(find decoded/ -name "TransLynxActivity.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== TransLynxActivity 相关内部类 =========="
            for f in $(find decoded/ -name "TransLynxActivity*.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              wc -l "$f"
            done

            echo ""
            echo "========== 所有 TransLynxActivity 内部类代码 =========="
            for f in $(find decoded/ -name "TransLynxActivity\$*.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/01_TransLynxActivity.txt

      - name: 2. 搜索 unsafe_pkg_modal 引用
        run: |
          {
            echo "========== smali 中包含 unsafe_pkg_modal 的文件 =========="
            rg -l "unsafe_pkg_modal" decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== unsafe_pkg_modal 上下文（每处匹配前后5行）=========="
            rg -n -B5 -A5 "unsafe_pkg_modal" decoded/ 2>/dev/null | head -200

            echo ""
            echo "========== 搜索 unsafe_pkg 变体 =========="
            rg -l "unsafe_pkg" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== Manifest 中的 TransLynxActivity 注册 =========="
            java -jar apktool.jar d -s -f official.apk -o manifest_only > /dev/null 2>&1 || true
            grep -A5 "TransLynxActivity" manifest_only/AndroidManifest.xml 2>/dev/null || echo "未找到"
          } 2>&1 | tee logs/02_unsafe_pkg_modal.txt

      - name: 3. DeepLink 路由机制分析
        run: |
          {
            echo "========== DeepLinkHandler 相关类 =========="
            find decoded/ -iname "*deeplink*" -name "*.smali" -type f 2>/dev/null | head -30

            echo ""
            echo "========== DeeplinkIntentLancetImpl 代码 =========="
            for f in $(find decoded/ -name "DeeplinkIntentLancetImpl.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== 谁启动了 TransLynxActivity =========="
            rg -l "TransLynxActivity" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== TransLynxActivity 启动上下文 =========="
            rg -n -B3 -A3 "TransLynxActivity" decoded/ 2>/dev/null | head -150

            echo ""
            echo "========== DeepLinkHandlerActivity =========="
            for f in $(find decoded/ -iname "*DeepLinkHandler*Activity*.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -100 "$f"
              echo "... (truncated)"
              echo ""
            done

            echo ""
            echo "========== capcut://main/lynx 路由引用 =========="
            rg -l "capcut://main" decoded/ 2>/dev/null | head -20
            echo ""
            rg -n "capcut://main" decoded/ 2>/dev/null | head -30
          } 2>&1 | tee logs/03_deeplink_routing.txt

      - name: 4. CrackingInterceptor 当前状态验证
        run: |
          {
            echo "========== vega CrackingInterceptor - 验证 c() 方法 =========="
            f="decoded/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor.smali"
            if [ -f "$f" ]; then
              echo "--- 完整文件 ---"
              cat "$f"
            else
              echo "文件不存在！"
              find decoded/ -path "*/vega/launcher/network/interceptors/CrackingInterceptor.smali" 2>/dev/null
            fi

            echo ""
            echo "========== showGlobalSecurityDialog 相关文件 =========="
            for f in $(find decoded/ -name "*showGlobalSecurityDialog*" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== CrackingInterceptor Companion =========="
            for f in $(find decoded/ -path "*/vega/launcher/network/interceptors/CrackingInterceptor\$Companion.smali" 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== intercept$1 (回调) =========="
            for f in $(find decoded/ -path "*/vega/launcher/network/interceptors/CrackingInterceptor\$intercept\$1.smali" 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== reportPopups$1 =========="
            for f in $(find decoded/ -path "*/vega/launcher/network/interceptors/CrackingInterceptor\$reportPopups\$1.smali" 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/04_CrackingInterceptor_verify.txt

      - name: 5. shark block 和安全字符串搜索
        run: |
          {
            echo "========== 搜索 shark 引用 =========="
            rg -l -i "shark" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== shark 上下文 =========="
            rg -n -i "shark" decoded/ 2>/dev/null | head -50

            echo ""
            echo "========== 搜索 block reinstall =========="
            rg -l "block.reinstall\|reinstall" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 error_code.*-5 或 code.*-5 =========="
            rg -l "error_code.*-5\|code.*-5\|code=-5" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 check_risk / rick_control =========="
            rg -l "check_risk\|rick_control" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 isCracking 引用 =========="
            rg -n "isCracking" decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== 搜索 SecModuleInit =========="
            find decoded/ -name "*SecModuleInit*" -type f 2>/dev/null
            for f in $(find decoded/ -name "SecModuleInit*.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -80 "$f"
              echo "... (truncated if > 80 lines)"
              echo ""
            done
          } 2>&1 | tee logs/05_shark_security_strings.txt

      - name: 6. ResPool SDK 错误处理分析
        run: |
          {
            echo "========== 搜索 RES_POOL_SDK 或 respool 引用 =========="
            rg -l -i "res.pool\|respool\|RES_POOL" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 ArtistPanelInfoNetwork =========="
            rg -l "ArtistPanelInfoNetwork\|ArtistPanel" decoded/ 2>/dev/null | head -20
            echo ""
            rg -n "ArtistPanelInfoNetwork" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 error_message 或 error_code 处理 =========="
            rg -l "error_message\|error_code" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== AppFetchController 相关 =========="
            find decoded/ -iname "*AppFetch*" -name "*.smali" -type f 2>/dev/null | head -10
            find decoded/ -iname "*FetchController*" -name "*.smali" -type f 2>/dev/null | head -10

            echo ""
            echo "========== LynxCommonBridge (JSB 回调) =========="
            find decoded/ -name "LynxCommonBridge.smali" -type f 2>/dev/null
            for f in $(find decoded/ -name "LynxCommonBridge.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -60 "$f"
              echo "... (showing first 60 lines)"
              echo ""
            done
          } 2>&1 | tee logs/06_respool_error_handling.txt

      - name: 7. Gecko/Forest 离线资源加载
        run: |
          {
            echo "========== 搜索 ttgecko / gecko 引用 =========="
            rg -l -i "ttgecko\|gecko.*fetch\|GeckoFetcher" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 Forest 资源加载 =========="
            rg -l "Forest_\|ForestFetcher\|ResourceFetcherChain" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 搜索 template.js 引用 =========="
            rg -l "template\\.js" decoded/ 2>/dev/null | head -10

            echo ""
            echo "========== 搜索 lynx_overlay_id =========="
            rg -n "lynx_overlay_id" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== APK assets 中的 Gecko/Lynx 资源 =========="
            unzip -l official.apk 2>/dev/null | grep -iE "gecko|lynx|unsafe|security" | head -20
          } 2>&1 | tee logs/07_gecko_forest.txt

      - name: 8. EffectUtil 和 Helios 分析
        run: |
          {
            echo "========== EffectUtil (clinit 中的可疑调用) =========="
            find decoded/ -path "*/illusion/light/EffectUtil.smali" -type f 2>/dev/null
            for f in $(find decoded/ -path "*/illusion/light/EffectUtil.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -100 "$f"
              echo "... (showing first 100 lines)"
              echo ""
            done

            echo ""
            echo "========== 搜索 Ew0PFxIIElcAXVdHWFpVCEI0 方法 =========="
            rg -n "Ew0PFxIIElcAXVdHWFpVCEI0" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== Helios 相关类 =========="
            find decoded/ -path "*helios*" -name "*.smali" -type f 2>/dev/null | head -20

            echo ""
            echo "========== HeliosApiHook =========="
            for f in $(find decoded/ -name "HeliosApiHook.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -60 "$f"
              echo ""
            done
          } 2>&1 | tee logs/08_effectutil_helios.txt

      - name: 9. MetaSec 和 BdTuring 初始化入口
        run: |
          {
            echo "========== SecModuleInitTask =========="
            find decoded/ -iname "*SecModuleInitTask*" -type f 2>/dev/null
            for f in $(find decoded/ -iname "*SecModuleInitTask*" -type f 2>/dev/null); do
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== SecModuleInit (非 Task) =========="
            find decoded/ -iname "SecModuleInit.smali" -type f 2>/dev/null
            for f in $(find decoded/ -iname "SecModuleInit.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -100 "$f"
              echo ""
            done

            echo ""
            echo "========== MSManagerUtils =========="
            find decoded/ -name "MSManagerUtils.smali" -type f 2>/dev/null
            for f in $(find decoded/ -name "MSManagerUtils.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -60 "$f"
              echo ""
            done

            echo ""
            echo "========== BdTuring 初始化 =========="
            find decoded/ -name "BdTuring.smali" -type f 2>/dev/null
            for f in $(find decoded/ -name "BdTuring.smali" -type f 2>/dev/null); do
              echo "--- FILE: $f ($(wc -l < "$f") lines) ---"
              head -60 "$f"
              echo ""
            done
          } 2>&1 | tee logs/09_metasec_bdturing.txt

      - name: 10. 汇总分析摘要
        run: |
          {
            echo "================================================"
            echo "  v11a 分析汇总"
            echo "================================================"

            echo ""
            echo "=== TransLynxActivity 位置 ==="
            find decoded/ -name "TransLynxActivity*.smali" -type f 2>/dev/null

            echo ""
            echo "=== 引用 TransLynxActivity 的文件 ==="
            rg -l "TransLynxActivity" decoded/ 2>/dev/null | grep -v "TransLynxActivity.smali" | head -10

            echo ""
            echo "=== unsafe_pkg_modal 引用文件 ==="
            rg -l "unsafe_pkg_modal" decoded/ 2>/dev/null | head -10

            echo ""
            echo "=== CrackingInterceptor c() 方法当前状态 ==="
            f="decoded/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor.smali"
            if [ -f "$f" ]; then
              grep -A2 "\.method.*final.*c(Ljava/lang/String;)V" "$f" || echo "c() 方法未找到"
            fi

            echo ""
            echo "=== showGlobalSecurityDialog 文件 ==="
            find decoded/ -name "*showGlobalSecurityDialog*" -type f 2>/dev/null

            echo ""
            echo "=== Deeplink 路由文件数 ==="
            find decoded/ -iname "*deeplink*" -name "*.smali" -type f 2>/dev/null | wc -l

            echo ""
            echo "=== 各日志文件大小 ==="
            ls -la logs/

            echo ""
            echo "================================================"
            echo "  分析完成 - 请下载 artifact 查看详细结果"
            echo "================================================"
          } 2>&1 | tee logs/10_summary.txt

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v11a-analysis-results
          path: logs/
          retention-days: 7
