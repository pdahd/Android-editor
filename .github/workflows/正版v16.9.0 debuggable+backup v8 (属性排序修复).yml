name: 正版v16.9.0 debuggable+backup v8 (属性排序修复)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 二进制修改 Manifest (修改+排序)
        run: |
          mkdir -p work
          unzip -o official.apk AndroidManifest.xml -d work/

          python3 << 'PYEOF'
          import struct, sys

          RESID_DEBUGGABLE = 0x0101000f

          with open("work/AndroidManifest.xml", "rb") as f:
              data = bytearray(f.read())

          print(f"文件大小: {len(data)} bytes")

          # ===== 1. 解析 String Pool =====
          SP = 8
          sp_chunk_size = struct.unpack_from('<I', data, SP + 4)[0]
          sp_str_count = struct.unpack_from('<I', data, SP + 8)[0]
          sp_hdr_sz = struct.unpack_from('<H', data, SP + 2)[0]
          sp_flags = struct.unpack_from('<I', data, SP + 16)[0]
          sp_str_start = struct.unpack_from('<I', data, SP + 20)[0]
          is_utf8 = bool(sp_flags & 0x100)

          OFF_BASE = SP + sp_hdr_sz
          STR_BASE = SP + sp_str_start

          print(f"StringPool: {sp_str_count} strings, {'UTF-8' if is_utf8 else 'UTF-16'}")

          # 读取所有字符串
          str_info = {}
          for i in range(sp_str_count):
              rel = struct.unpack_from('<I', data, OFF_BASE + i * 4)[0]
              pos = STR_BASE + rel
              try:
                  if is_utf8:
                      p = pos
                      cc = data[p]; p += 1
                      if cc & 0x80: p += 1
                      bc = data[p]; p += 1
                      if bc & 0x80: bc = ((bc & 0x7F) << 8) | data[p]; p += 1
                      s = data[p:p+bc].decode('utf-8')
                      str_info[i] = (s, pos, p + bc + 1)
                  else:
                      p = pos
                      cc = struct.unpack_from('<H', data, p)[0]; p += 2
                      if cc & 0x8000:
                          cc = ((cc & 0x7FFF) << 16) | struct.unpack_from('<H', data, p)[0]; p += 2
                      s = data[p:p+cc*2].decode('utf-16-le')
                      str_info[i] = (s, pos, p + cc * 2 + 2)
              except:
                  str_info[i] = (f"<error>", pos, pos)

          # 找关键字符串
          native_heap_idx = -1
          allow_backup_idx = -1
          for idx, (s, _, _) in str_info.items():
              if s == "allowNativeHeapPointerTagging":
                  native_heap_idx = idx
              elif s == "allowBackup":
                  allow_backup_idx = idx

          print(f"allowNativeHeapPointerTagging: index {native_heap_idx}")
          print(f"allowBackup: index {allow_backup_idx}")

          # ===== 2. 修改 Resource ID 表 =====
          RID_START = SP + sp_chunk_size
          rid_chunk_size = struct.unpack_from('<I', data, RID_START + 4)[0]
          rid_count = (rid_chunk_size - 8) // 4

          # 读取完整 ResID 表
          rid_table = {}
          for i in range(rid_count):
              rid = struct.unpack_from('<I', data, RID_START + 8 + i * 4)[0]
              rid_table[i] = rid

          # 修改 native_heap 的 ResID 为 debuggable
          if native_heap_idx >= 0 and native_heap_idx < rid_count:
              rid_off = RID_START + 8 + native_heap_idx * 4
              old_rid = struct.unpack_from('<I', data, rid_off)[0]
              struct.pack_into('<I', data, rid_off, RESID_DEBUGGABLE)
              rid_table[native_heap_idx] = RESID_DEBUGGABLE
              print(f"✅ ResID[{native_heap_idx}]: 0x{old_rid:08X} → 0x{RESID_DEBUGGABLE:08X}")

          # ===== 3. 修改字符串池 =====
          if native_heap_idx >= 0:
              s, start, end = str_info[native_heap_idx]
              new_name = "debuggable"
              wp = start

              if is_utf8:
                  new_b = new_name.encode('utf-8')
                  data[wp] = len(new_name); wp += 1
                  data[wp] = len(new_b); wp += 1
                  for b in new_b: data[wp] = b; wp += 1
                  data[wp] = 0; wp += 1
              else:
                  new_u = new_name.encode('utf-16-le')
                  struct.pack_into('<H', data, wp, len(new_name)); wp += 2
                  for j, b in enumerate(new_u): data[wp + j] = b
                  wp += len(new_u)
                  struct.pack_into('<H', data, wp, 0); wp += 2

              while wp < end: data[wp] = 0; wp += 1
              print(f"✅ 字符串: '{s}' → '{new_name}'")

          # ===== 4. 扫描 XML 元素，修改属性值 + 排序 =====
          print(f"\n===== 扫描并修改属性 =====")
          pos = RID_START + rid_chunk_size
          app_found = False

          while pos < len(data) - 8:
              c_type = struct.unpack_from('<H', data, pos)[0]
              c_size = struct.unpack_from('<I', data, pos + 4)[0]

              if c_size < 8 or pos + c_size > len(data):
                  break

              if c_type == 0x0102:  # START_ELEMENT
                  elem_name_idx = struct.unpack_from('<I', data, pos + 20)[0]
                  attr_start_off = struct.unpack_from('<H', data, pos + 24)[0]
                  attr_size = struct.unpack_from('<H', data, pos + 26)[0]
                  attr_count = struct.unpack_from('<H', data, pos + 28)[0]
                  if attr_size == 0: attr_size = 20

                  elem_name_str = str_info.get(elem_name_idx, ("<?>",))[0]
                  a_base = pos + 16 + attr_start_off

                  if elem_name_str == "application":
                      app_found = True
                      print(f"\n🎯 <application> @ offset {pos}")
                      print(f"   属性数: {attr_count}, 大小: {attr_size}")

                      # ---- 修改属性值 ----
                      for ai in range(attr_count):
                          ao = a_base + ai * attr_size
                          if ao + 20 > len(data): break

                          a_name = struct.unpack_from('<I', data, ao + 4)[0]
                          a_type = data[ao + 15]
                          a_val = struct.unpack_from('<i', data, ao + 16)[0]

                          # debuggable: false → true
                          if a_name == native_heap_idx and a_type == 0x12:
                              struct.pack_into('<i', data, ao + 16, -1)
                              print(f"   ✅ debuggable: {a_val} → true")

                          # allowBackup: false → true
                          if a_name == allow_backup_idx and a_type == 0x12 and a_val == 0:
                              struct.pack_into('<i', data, ao + 16, -1)
                              print(f"   ✅ allowBackup: false → true")

                      # ---- 排序属性 ----
                      print(f"\n   === 排序前 ===")
                      attr_blocks = []
                      for ai in range(attr_count):
                          ao = a_base + ai * attr_size
                          block = bytes(data[ao:ao + attr_size])
                          name_idx = struct.unpack_from('<I', block, 4)[0]
                          rid = rid_table.get(name_idx, 0xFFFFFFFF)
                          attr_name = str_info.get(name_idx, ("<?>",))[0]
                          print(f"   [{ai:2d}] ResID=0x{rid:08X} ({attr_name})")
                          attr_blocks.append((rid, block))

                      # 按 Resource ID 排序
                      attr_blocks.sort(key=lambda x: x[0])

                      print(f"\n   === 排序后 ===")
                      for ai, (rid, block) in enumerate(attr_blocks):
                          ao = a_base + ai * attr_size
                          data[ao:ao + attr_size] = block
                          name_idx = struct.unpack_from('<I', block, 4)[0]
                          attr_name = str_info.get(name_idx, ("<?>",))[0]
                          a_type = block[15]
                          a_val = struct.unpack_from('<i', block, 16)[0]
                          val_str = ""
                          if a_type == 0x12:
                              val_str = f" = {'true' if a_val != 0 else 'false'}"
                          print(f"   [{ai:2d}] ResID=0x{rid:08X} ({attr_name}){val_str}")

                      print(f"\n   ✅ {attr_count} 个属性已按 ResID 排序")

              pos += c_size

          if not app_found:
              print("❌ 未找到 <application> 元素！")
              sys.exit(1)

          # ===== 5. 写回 =====
          with open("work/AndroidManifest.xml", "wb") as f:
              f.write(data)

          print(f"\n🎉 修改完成: 文件大小 {len(data)} bytes (未变)")
          PYEOF

      - name: 组装 APK
        run: |
          cp official.apk capcut_v16.9_v8.apk
          zip -d capcut_v16.9_v8.apk "META-INF/*" 2>/dev/null || true
          cd work
          zip -0 ../capcut_v16.9_v8.apk AndroidManifest.xml
          cd ..
          ls -la capcut_v16.9_v8.apk

      - name: 对齐 + 签名
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_v16.9_v8.apk aligned.apk

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 23 \
            --out capcut_v16.9_v8_signed.apk \
            aligned.apk

          echo "=== 签名验证 ==="
          "$APKSIGNER" verify -v capcut_v16.9_v8_signed.apk | head -10

          echo ""
          echo "=== aapt dump badging ==="
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          "$AAPT" dump badging capcut_v16.9_v8_signed.apk 2>&1 | grep -iE "debuggable|package:|allowBackup"

          echo ""
          echo "=== aapt dump xmltree (application 属性) ==="
          "$AAPT" dump xmltree capcut_v16.9_v8_signed.apk AndroidManifest.xml 2>&1 | grep -A 20 "E: application" | head -25

          ls -la capcut_v16.9_v8_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-v8
          path: capcut_v16.9_v8_signed.apk
          retention-days: 7
