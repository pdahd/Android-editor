name: 【分析】_v19a - libmetasec_ov.so 内部侦察_2026-03-20_14-44-14

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip binutils

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SO files
        run: |
          mkdir -p so_files
          unzip -o official.apk "lib/arm64-v8a/libmetasec_ov.so" -d so_files/ 2>/dev/null || true
          unzip -o official.apk "lib/arm64-v8a/libhelios_bm.so" -d so_files/ 2>/dev/null || true
          ls -la so_files/lib/arm64-v8a/

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. 基本文件信息"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
            echo "=== 文件大小和类型 ==="
            ls -la "$SO"
            file "$SO"
            
            echo ""
            echo "=== ELF 头信息 ==="
            readelf -h "$SO" 2>/dev/null | head -20
            
            echo ""
            echo "=== 段信息 ==="
            readelf -S "$SO" 2>/dev/null | head -30
          } 2>&1 | tee logs/01_file_info.txt

      - name: "2. 导出符号（函数名）"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
            echo "=== 动态符号表（导出函数）==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep -E "FUNC|OBJECT" | head -100
            
            echo ""
            echo "=== 搜索签名/验证相关符号 ==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep -iE "sign|verify|cert|hash|package|check|valid|metasec|init" | head -30
          } 2>&1 | tee logs/02_symbols.txt

      - name: "3. JNI 函数注册（Java 回调入口）"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
            echo "=== JNI_OnLoad 和 RegisterNatives ==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep -iE "JNI_OnLoad|RegisterNatives|GetMethodID|CallMethod|FindClass"
            
            echo ""
            echo "=== 搜索 Java 类名字符串 ==="
            strings "$SO" | grep -E "^L[a-z].*;" | head -30
            strings "$SO" | grep -iE "com/vega|com/bytedance|com/lemon|PackageManager|PackageInfo|Signature|getPackageInfo" | head -30
          } 2>&1 | tee logs/03_jni.txt

      - name: "4. 所有字符串常量（关键信息源）"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
            echo "=== 签名/校验相关字符串 ==="
            strings "$SO" | grep -iE "sign|cert|hash|md5|sha|package|verify|reinstall|block|shark|metasec|check|valid|tamper|integrity|detect" | sort -u | head -50
            
            echo ""
            echo "=== URL/域名字符串 ==="
            strings "$SO" | grep -iE "http|api\.|\.com|host|domain|url" | sort -u | head -30
            
            echo ""
            echo "=== 文件路径字符串 ==="
            strings "$SO" | grep -iE "/data/|/proc/|base\.apk|\.dex|\.so|classes" | sort -u | head -30
            
            echo ""
            echo "=== 错误/状态消息 ==="
            strings "$SO" | grep -iE "error|fail|success|invalid|illegal|deny|block|abort" | sort -u | head -30
          } 2>&1 | tee logs/04_strings.txt

      - name: "5. 导入函数（调用了哪些系统 API）"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
            echo "=== 导入的 libc 函数 ==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep "UND" | grep -iE "open|read|stat|mmap|fopen|access|dlopen|dlsym" | head -20
            
            echo ""
            echo "=== 导入的加密函数 ==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep "UND" | grep -iE "SSL|sha|md5|aes|encrypt|decrypt|digest|hmac|EVP_" | head -20
            
            echo ""
            echo "=== 所有 UND 符号（外部依赖）==="
            readelf -W --dyn-syms "$SO" 2>/dev/null | grep "UND" | head -50
          } 2>&1 | tee logs/05_imports.txt

      - name: "6. libhelios_bm.so 分析（Helios 拦截模块）"
        run: |
          {
            SO="so_files/lib/arm64-v8a/libhelios_bm.so"
            if [ -f "$SO" ]; then
              echo "=== 文件信息 ==="
              ls -la "$SO"
              
              echo ""
              echo "=== 导出符号 ==="
              readelf -W --dyn-syms "$SO" 2>/dev/null | grep "FUNC" | head -30
              
              echo ""
              echo "=== 关键字符串 ==="
              strings "$SO" | grep -iE "white|block|domain|host|network|intercept|filter" | sort -u | head -20
              
              echo ""
              echo "=== Java 类引用 ==="
              strings "$SO" | grep -E "^L[a-z].*;" | head -20
              strings "$SO" | grep -iE "com/bytedance|helios|Network" | head -20
            else
              echo "libhelios_bm.so NOT FOUND"
            fi
          } 2>&1 | tee logs/06_helios.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v19a-so-recon
          path: logs/
          retention-days: 7
