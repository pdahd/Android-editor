name: v16a分析- AI UHD 关键枚举和观察者代码提取

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. LVVEVipStatus 枚举完整代码（最关键）"
        run: |
          {
            echo "========== LVVEVipStatus.smali 完整代码 =========="
            f="decoded/smali_classes8/com/vega/middlebridge/swig/LVVEVipStatus.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at expected path, searching..."
              find decoded/ -name "LVVEVipStatus.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "LVVEVipStatus.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/01_vip_status_enum.txt

      - name: "2. LVVEVipFeaturePayStatus 枚举完整代码"
        run: |
          {
            echo "========== LVVEVipFeaturePayStatus.smali =========="
            f="decoded/smali_classes8/com/vega/middlebridge/swig/LVVEVipFeaturePayStatus.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND, searching..."
              find decoded/ -name "LVVEVipFeaturePayStatus.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "LVVEVipFeaturePayStatus.smali" -type f 2>/dev/null); do
                echo "--- $f2 ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/02_pay_status_enum.txt

      - name: "3. BaseVipExportBusinessFunction（观察者逻辑）"
        run: |
          {
            echo "========== BaseVipExportBusinessFunction.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/base/BaseVipExportBusinessFunction.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at expected path, searching..."
              find decoded/ -name "BaseVipExportBusinessFunction.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "BaseVipExportBusinessFunction.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/03_base_vip_export.txt

      - name: "4. BaseVipExportBusinessFunction 的父类和内部类"
        run: |
          {
            echo "========== 内部类列表 =========="
            find decoded/ -name "BaseVipExportBusinessFunction*" -name "*.smali" -type f 2>/dev/null | sort

            echo ""
            echo "========== 父类 BaseBusinessCheckerFunction =========="
            f=$(find decoded/ -name "BaseBusinessCheckerFunction.smali" -path "*/subscription/*" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              grep -n "\.method\|\.field\|observer\|listen\|feature\|vip\|material\|update\|LiveData\|MutableLiveData" "$f" | head -40
            fi
          } 2>&1 | tee logs/04_parent_classes.txt

      - name: "5. IVipUserService 接口和实现"
        run: |
          {
            echo "========== IVipUserService 接口 =========="
            for f in $(find decoded/ -name "IVipUserService.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== IVipUserService 的实现类 =========="
            rg -l "implements.*IVipUserService\|Lcom/vega/subscriptionapi/legacy/service/IVipUserService" decoded/ 2>/dev/null | grep "\.smali$" | grep -v "IVipUserService.smali" | head -10

            echo ""
            echo "========== IVipUserService.isVip() 的所有调用者 =========="
            rg -n "IVipUserService;->isVip" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== ISubscribe.isVip() 的实现类 =========="
            rg -l "implements.*ISubscribe" decoded/ 2>/dev/null | grep "\.smali$" | head -10
            rg -n "ISubscribe;->isVip\(\)Z" decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/05_ivip_service.txt

      - name: "6. ExportConfigPanel 中 highDefinition 相关代码段"
        run: |
          {
            echo "========== ExportConfigPanel highDefinition 方法搜索 =========="
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            if [ -f "$f" ]; then
              echo "File size: $(wc -l < "$f") lines"
              echo ""
              echo "--- highDefinition 相关方法 ---"
              grep -n "highDefinition\|HighDefinition\|ultraHd\|ultra_hd\|ai_uhd\|AIUHD" "$f" | head -30
              echo ""
              echo "--- onCheckedChanged 方法 ---"
              grep -n "onCheckedChanged\|checkedChanged\|CheckBox\|checkBox\|setChecked" "$f" | head -20
              echo ""
              echo "--- VipPayInfoProvider 调用 ---"
              grep -n "VipPayInfoProvider" "$f" | head -10
            fi

            echo ""
            echo "========== showHighDefinitionGuide 内部类 =========="
            for f in $(find decoded/ -name "ExportConfigPanel*showHighDefinitionGuide*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== saveAIUltraHDToSp 内部类 =========="
            for f in $(find decoded/ -name "ExportConfigPanel*saveAIUltraHD*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/06_export_panel_hd.txt

      - name: "7. ai_ultra_hd 字符串引用（定位所有相关代码路径）"
        run: |
          {
            echo "========== ai_ultra_hd 相关引用 =========="
            rg -n "ai_ultra_hd" decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== highDefinition 字符串引用 =========="
            rg -rn '"highDefinition"\|"high_definition"\|"HighDefinition"' decoded/smali_classes*/com/vega/ 2>/dev/null | head -20

            echo ""
            echo "========== VipPayInfoProvider 完整方法列表 =========="
            for f in $(find decoded/ -name "VipPayInfoProvider.smali" -type f 2>/dev/null | head -2); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              grep -n "\.method\|\.field" "$f" | head -30
              echo ""
            done
          } 2>&1 | tee logs/07_uhd_string_refs.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v16a-uhd-critical-extraction
          path: logs/
          retention-days: 7
