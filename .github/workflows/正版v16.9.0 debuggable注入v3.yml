name: жӯЈзүҲv16.9.0 debuggableжіЁе…Ҙ v3 (дҝ®еӨҚManifestжіЁе…Ҙ)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip curl xmlstarlet
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: иҜҠж–ӯ Manifest з»“жһ„
        run: |
          echo "========== ж–№жі•1: apktool -s (дёҚи§Јз ҒDEXпјҢи§Јз Ғиө„жәҗ) =========="
          java -jar apktool.jar d -s official.apk -o decode_with_res -f 2>&1 | tail -5

          if [ -f decode_with_res/AndroidManifest.xml ]; then
            echo "--- Manifest ж–Үд»¶зұ»еһӢ ---"
            file decode_with_res/AndroidManifest.xml

            echo "--- <application ж ҮзӯҫжүҖеңЁиЎҢ ---"
            grep -n "<application" decode_with_res/AndroidManifest.xml | head -5

            echo "--- <application ж Үзӯҫе®Ңж•ҙеҶ…е®№пјҲеӨҡиЎҢжҸҗеҸ–пјү---"
            sed -n '/<application/,/>/p' decode_with_res/AndroidManifest.xml | head -20

            echo "--- жЈҖжҹҘ debuggable жҳҜеҗҰе·ІеӯҳеңЁ ---"
            grep -c "debuggable" decode_with_res/AndroidManifest.xml || echo "debuggable: дёҚеӯҳеңЁ"

            echo "--- жЈҖжҹҘ allowBackup ---"
            grep "allowBackup" decode_with_res/AndroidManifest.xml || echo "allowBackup: дёҚеӯҳеңЁ"
          else
            echo "вқҢ ж–№жі•1 жңӘз”ҹжҲҗ AndroidManifest.xml"
          fi

          echo ""
          echo "========== ж–№жі•2: apktool -r -s (дёҚи§Јз Ғиө„жәҗд№ҹдёҚи§Јз ҒDEX) =========="
          java -jar apktool.jar d -r -s official.apk -o decode_no_res -f 2>&1 | tail -5

          if [ -f decode_no_res/AndroidManifest.xml ]; then
            echo "--- Manifest ж–Үд»¶зұ»еһӢ ---"
            file decode_no_res/AndroidManifest.xml

            echo "--- еүҚ 5 иЎҢ ---"
            head -5 decode_no_res/AndroidManifest.xml

            echo "--- жЈҖжҹҘжҳҜеҗҰжҳҜдәҢиҝӣеҲ¶ ---"
            if file decode_no_res/AndroidManifest.xml | grep -q "XML"; then
              echo "вң… ж–Үжң¬ XML"
            else
              echo "вҡ пёҸ еҸҜиғҪжҳҜдәҢиҝӣеҲ¶ж јејҸ"
            fi
          else
            echo "вқҢ ж–№жі•2 жңӘз”ҹжҲҗ AndroidManifest.xml"
          fi

      - name: жіЁе…Ҙ debuggable (дҪҝз”Ёи§Јз Ғиө„жәҗзҡ„ж–№ејҸ)
        run: |
          cd decode_with_res

          echo "=== жіЁе…ҘеүҚ ==="
          grep "<application" AndroidManifest.xml | head -3

          # ж–№жі•A: еҰӮжһң <application еңЁеҚ•иЎҢ
          if grep -q '<application.*>' AndroidManifest.xml; then
            echo "жЈҖжөӢеҲ°еҚ•иЎҢ <application> ж Үзӯҫ"
            sed -i 's|<application|<application android:debuggable="true"|' AndroidManifest.xml
          fi

          # ж–№жі•B: еҰӮжһң <application и·ЁеӨҡиЎҢпјҢз”Ё Python еӨ„зҗҶ
          python3 << 'PYEOF'
          import re

          with open("AndroidManifest.xml", "r") as f:
              content = f.read()

          # жЈҖжҹҘжҳҜеҗҰе·Із»Ҹжңү debuggable
          if "debuggable" in content:
              print("debuggable е·ІеӯҳеңЁпјҲеҸҜиғҪжҳҜж–№жі•AжҲҗеҠҹдәҶпјү")
              # зЎ®дҝқеҖјдёә true
              content = re.sub(r'android:debuggable="false"', 'android:debuggable="true"', content)
          else:
              # еңЁ <application еҗҺйқўжҸ’е…Ҙ debuggable
              content = content.replace("<application", '<application android:debuggable="true"', 1)
              print("debuggable е·ІйҖҡиҝҮ Python жіЁе…Ҙ")

          with open("AndroidManifest.xml", "w") as f:
              f.write(content)
          PYEOF

          echo "=== жіЁе…ҘеҗҺ ==="
          grep "debuggable" AndroidManifest.xml && echo "вң… debuggable зЎ®и®ӨеӯҳеңЁ" || echo "вқҢ жіЁе…ҘеӨұиҙҘ"
          grep "<application" AndroidManifest.xml | head -3

          cd ..

      - name: йҮҚж–°зј–иҜ‘ Manifest
        run: |
          echo "=== е°қиҜ•зј–иҜ‘пјҲеҸҜиғҪеӣ иө„жәҗж–Үд»¶еҗҚжҠҘй”ҷпјү==="
          java -jar apktool.jar b decode_with_res -o temp_recompiled.apk 2>&1 | tail -20

          if [ -f temp_recompiled.apk ]; then
            echo "вң… зј–иҜ‘жҲҗеҠҹ"
            mkdir -p work
            unzip -o temp_recompiled.apk AndroidManifest.xml -d work/
            ls -la work/AndroidManifest.xml

            # йӘҢиҜҒзј–иҜ‘еҗҺзҡ„ Manifest жҳҜеҗҰеҢ…еҗ« debuggable
            echo "=== йӘҢиҜҒзј–иҜ‘еҗҺзҡ„дәҢиҝӣеҲ¶ Manifest ==="
            strings work/AndroidManifest.xml | grep -i "debuggable" || echo "вҡ пёҸ зј–иҜ‘еҗҺзҡ„дәҢиҝӣеҲ¶дёӯжңӘжүҫеҲ° debuggable еӯ—з¬ҰдёІ"
          else
            echo "вқҢ зј–иҜ‘еӨұиҙҘпјҢе°қиҜ•жӣҝд»Јж–№жЎҲ..."

            echo ""
            echo "========== жӣҝд»Јж–№жЎҲ: зӣҙжҺҘдҝ®ж”№дәҢиҝӣеҲ¶ Manifest =========="
            # д»ҺеҺҹе§Ӣ APK жҸҗеҸ–дәҢиҝӣеҲ¶ Manifest
            mkdir -p work
            unzip -o official.apk AndroidManifest.xml -d work/

            echo "--- еҺҹе§ӢдәҢиҝӣеҲ¶ Manifest дҝЎжҒҜ ---"
            ls -la work/AndroidManifest.xml
            file work/AndroidManifest.xml

            # дҪҝз”Ё Python зӣҙжҺҘдҝ®ж”№дәҢиҝӣеҲ¶ AndroidManifest.xml
            python3 << 'PYEOF'
          import struct

          # Android Binary XML format:
          # debuggable еұһжҖ§зҡ„еҖјеңЁдәҢиҝӣеҲ¶дёӯжҳҜдёҖдёӘ 32-bit integer
          # 0x00000000 = false, 0xFFFFFFFF = true (-1)
          #
          # дҪҶжӣҙз®ҖеҚ•зҡ„ж–№жі•пјҡжүҫеҲ° allowBackup=false зҡ„дҪҚзҪ®
          # е°Ҷ allowBackup зҡ„еҖјд»Һ false(0) ж”№дёә true(йқһ0)
          # з„¶еҗҺеҗҢж—¶ж·»еҠ  debuggable...
          #
          # е®һйҷ…дёҠпјҢзӣҙжҺҘдҝ®ж”№дәҢиҝӣеҲ¶ Manifest йқһеёёеӨҚжқӮ
          # жӣҙеҘҪзҡ„ж–№жЎҲжҳҜз”Ёдё“й—Ёзҡ„е·Ҙе…·

          # е°қиҜ•ж–№жЎҲ: з”Ё aapt2 еӨ„зҗҶ
          import subprocess, os

          # жЈҖжҹҘ aapt2 жҳҜеҗҰеҸҜз”Ё
          r = subprocess.run(["which", "aapt2"], capture_output=True, text=True)
          if r.stdout.strip():
              print(f"aapt2 found at: {r.stdout.strip()}")
          else:
              # еңЁ Android SDK дёӯжҗңзҙў
              sdk = os.environ.get("ANDROID_HOME", "")
              r = subprocess.run(["find", sdk, "-name", "aapt2", "-type", "f"],
                                capture_output=True, text=True)
              paths = r.stdout.strip().split('\n')
              if paths and paths[0]:
                  print(f"aapt2 found at: {paths[0]}")
              else:
                  print("aapt2 not found")
          PYEOF

            # дҪҝз”Ё apktool д»…еӨ„зҗҶ ManifestпјҲдёҚеӨ„зҗҶиө„жәҗж–Үд»¶пјү
            echo ""
            echo "========== жӣҝд»Јж–№жЎҲ2: жүӢеҠЁеӨ„зҗҶ =========="
            # и§Јз ҒеҸӘиҰҒ ManifestпјҢжүӢеҠЁеҲ йҷӨжңүй—®йўҳзҡ„иө„жәҗж–Үд»¶
            cp -r decode_with_res decode_manifest_only
            # еҲ йҷӨжүҖжңү res/ дёӢеҸҜиғҪеҜјиҮҙзј–иҜ‘й”ҷиҜҜзҡ„ж–Үд»¶
            rm -rf decode_manifest_only/res/
            rm -rf decode_manifest_only/unknown/
            # еҸӘдҝқз•ҷ AndroidManifest.xml е’Ң apktool.yml
            java -jar apktool.jar b decode_manifest_only -o temp_manifest_only.apk 2>&1 | tail -20

            if [ -f temp_manifest_only.apk ]; then
              echo "вң… д»… Manifest зј–иҜ‘жҲҗеҠҹ"
              unzip -o temp_manifest_only.apk AndroidManifest.xml -d work/
              ls -la work/AndroidManifest.xml
              strings work/AndroidManifest.xml | grep -i "debuggable" && echo "вң… debuggable еңЁдәҢиҝӣеҲ¶дёӯзЎ®и®Ө" || echo "вҡ пёҸ йңҖиҰҒиҝӣдёҖжӯҘжЈҖжҹҘ"
            else
              echo "вқҢ жӣҝд»Јж–№жЎҲд№ҹеӨұиҙҘ"
            fi
          fi

      - name: з»„иЈ… APK
        run: |
          if [ ! -f work/AndroidManifest.xml ]; then
            echo "вқҢ жІЎжңүжҲҗеҠҹз”ҹжҲҗ AndroidManifest.xmlпјҢж— жі•з»§з»ӯ"
            exit 1
          fi

          cp official.apk capcut_v16.9_debuggable_v3.apk
          zip -d capcut_v16.9_debuggable_v3.apk "META-INF/*" 2>/dev/null || true

          cd work
          zip -0 ../capcut_v16.9_debuggable_v3.apk AndroidManifest.xml
          cd ..

          ls -la capcut_v16.9_debuggable_v3.apk

      - name: еҜ№йҪҗ + зӯҫеҗҚ
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_v16.9_debuggable_v3.apk aligned.apk

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out capcut_v16.9_debug_v3.apk \
            aligned.apk

          "$APKSIGNER" verify -v capcut_v16.9_debug_v3.apk | head -10
          ls -la capcut_v16.9_debug_v3.apk

      - name: йӘҢиҜҒжңҖз»Ҳ APK зҡ„ Manifest
        run: |
          # з”Ё aapt йӘҢиҜҒ
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          if [ -n "$AAPT" ]; then
            echo "=== aapt dump badging ==="
            "$AAPT" dump badging capcut_v16.9_debug_v3.apk 2>&1 | grep -iE "debuggable|package|application"
          fi

          AAPT2=$(find "$ANDROID_HOME" -name "aapt2" -type f | sort -V | tail -1)
          if [ -n "$AAPT2" ]; then
            echo ""
            echo "=== aapt2 dump badging ==="
            "$AAPT2" dump badging capcut_v16.9_debug_v3.apk 2>&1 | grep -iE "debuggable|package|application" || true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-debug-v3
          path: capcut_v16.9_debug_v3.apk
          retention-days: 7

      - name: Upload иҜҠж–ӯж—Ҙеҝ—
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-diagnosis-v3
          path: |
            decode_with_res/AndroidManifest.xml
            decode_no_res/AndroidManifest.xml
          retention-days: 7
