name: 【分析】_v16d - AI UHD 门控代码精确提取_2026-03-08_14-53-23

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. X/0M6.smali 完整代码（最关键）"
        run: |
          {
            f="decoded/smali_classes3/X/0M6.smali"
            if [ -f "$f" ]; then
              echo "=== $f ($(wc -l < "$f") lines) ==="
              echo ""
              cat "$f"
            else
              echo "NOT FOUND at expected path"
              echo "Searching all locations..."
              find decoded/ -path "*/X/0M6.smali" -type f 2>/dev/null
              find decoded/ -path "*/0M6.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/01_checkbox_handler.txt

      - name: "2. ExportConfigPanel.d(Function1)Z 方法（登录拦截）"
        run: |
          {
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            echo "=== Method d(Function1)Z — lines 3600-3700 ==="
            sed -n '3600,3700p' "$f"
          } 2>&1 | tee logs/02_method_d.txt

      - name: "3. ExportConfigPanel.p(Function1)V 方法（checkbox listener 设置）"
        run: |
          {
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            echo "=== Method p(Function1)V — lines 7230-7530 ==="
            sed -n '7230,7530p' "$f"
          } 2>&1 | tee logs/03_method_p.txt

      - name: "4. ExportConfigPanel HD区域 lines 8680-9100"
        run: |
          {
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel.smali"
            echo "=== HD config + checkbox init area ==="
            sed -n '8680,9100p' "$f"
          } 2>&1 | tee logs/04_hd_area.txt

      - name: "5. init$16$1$1 和 init$19 完整代码"
        run: |
          {
            echo "========== init\$16\$1\$1 =========="
            f="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel\$init\$16\$1\$1.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
            fi

            echo ""
            echo "========== init\$19 =========="
            f2="decoded/smali_classes3/com/vega/edit/widget/ExportConfigPanel\$init\$19.smali"
            if [ -f "$f2" ]; then
              echo "File: $f2 ($(wc -l < "$f2") lines)"
              cat "$f2"
            else
              echo "NOT FOUND"
            fi
          } 2>&1 | tee logs/05_init_classes.txt

      - name: "6. X/0M6 引用分析 + d() 调用者"
        run: |
          {
            echo "========== X/0M6 所有 invoke 调用 =========="
            f="decoded/smali_classes3/X/0M6.smali"
            if [ -f "$f" ]; then
              grep -n "invoke-" "$f"
              echo ""
              echo "--- string constants ---"
              grep -n "const-string" "$f"
              echo ""
              echo "--- ExportConfigPanel refs ---"
              grep -n "ExportConfigPanel" "$f"
            fi

            echo ""
            echo "========== d(Function1)Z 的所有调用者 =========="
            rg -rn "ExportConfigPanel;->d\(" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== LoginUtilKt;->a 的所有调用者 =========="
            rg -rn "LoginUtilKt;->a\(" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20
          } 2>&1 | tee logs/06_xrefs.txt

      - name: "7. LoginUtilKt 完整代码"
        run: |
          {
            f=$(find decoded/ -name "LoginUtilKt.smali" -path "*/edit/*" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "=== $f ($(wc -l < "$f") lines) ==="
              cat "$f"
            else
              echo "NOT FOUND in edit package"
              find decoded/ -name "LoginUtilKt.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "LoginUtilKt.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/07_login_util.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v16d-precise-handler
          path: logs/
          retention-days: 7
