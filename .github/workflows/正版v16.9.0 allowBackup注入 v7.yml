name: 正版v16.9.0 debuggable+allowBackup注入 v7 (双修改)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 二进制修改 Manifest (debuggable + allowBackup)
        run: |
          mkdir -p work
          unzip -o official.apk AndroidManifest.xml -d work/

          python3 << 'PYEOF'
          import struct, sys

          RESID_DEBUGGABLE = 0x0101000f
          RESID_ALLOW_BACKUP = 0x01010280
          RESID_NATIVE_HEAP = 0x01010612

          with open("work/AndroidManifest.xml", "rb") as f:
              data = bytearray(f.read())

          print(f"文件大小: {len(data)} bytes")

          # ===== 1. 解析 String Pool =====
          SP = 8
          sp_chunk_size = struct.unpack_from('<I', data, SP + 4)[0]
          sp_str_count = struct.unpack_from('<I', data, SP + 8)[0]
          sp_hdr_sz = struct.unpack_from('<H', data, SP + 2)[0]
          sp_flags = struct.unpack_from('<I', data, SP + 16)[0]
          sp_str_start = struct.unpack_from('<I', data, SP + 20)[0]
          is_utf8 = bool(sp_flags & 0x100)

          OFF_BASE = SP + sp_hdr_sz
          STR_BASE = SP + sp_str_start

          print(f"StringPool: {sp_str_count} strings, {'UTF-8' if is_utf8 else 'UTF-16'}")

          # 读取所有字符串
          str_info = {}  # idx -> (string, data_offset, data_end)
          for i in range(sp_str_count):
              rel = struct.unpack_from('<I', data, OFF_BASE + i * 4)[0]
              pos = STR_BASE + rel
              try:
                  if is_utf8:
                      p = pos
                      cc = data[p]; p += 1
                      if cc & 0x80: p += 1
                      bc = data[p]; p += 1
                      if bc & 0x80: bc = ((bc & 0x7F) << 8) | data[p]; p += 1
                      s = data[p:p+bc].decode('utf-8')
                      str_info[i] = (s, pos, p + bc + 1)
                  else:
                      p = pos
                      cc = struct.unpack_from('<H', data, p)[0]; p += 2
                      if cc & 0x8000:
                          cc = ((cc & 0x7FFF) << 16) | struct.unpack_from('<H', data, p)[0]; p += 2
                      s = data[p:p+cc*2].decode('utf-16-le')
                      str_info[i] = (s, pos, p + cc * 2 + 2)
              except:
                  str_info[i] = (f"<error>", pos, pos)

          # 找关键字符串
          native_heap_idx = -1
          allow_backup_idx = -1
          for idx, (s, _, _) in str_info.items():
              if s == "allowNativeHeapPointerTagging":
                  native_heap_idx = idx
              elif s == "allowBackup":
                  allow_backup_idx = idx

          print(f"allowNativeHeapPointerTagging: string index {native_heap_idx}")
          print(f"allowBackup: string index {allow_backup_idx}")

          # ===== 2. 修改 Resource ID 表 =====
          RID_START = SP + sp_chunk_size
          rid_chunk_size = struct.unpack_from('<I', data, RID_START + 4)[0]
          rid_count = (rid_chunk_size - 8) // 4

          print(f"\nResourceID表: {rid_count} 个条目")

          # 打印所有条目
          for i in range(rid_count):
              rid = struct.unpack_from('<I', data, RID_START + 8 + i * 4)[0]
              s = str_info.get(i, ("<?>", 0, 0))[0]
              marker = ""
              if i == native_heap_idx:
                  marker = " ← 将改为 debuggable (0x0101000F)"
              elif i == allow_backup_idx:
                  marker = " ← allowBackup"
              print(f"  [{i:3d}] 0x{rid:08X} = {s}{marker}")

          # 修改 native_heap 的 ResID 为 debuggable
          changes = []
          if native_heap_idx >= 0 and native_heap_idx < rid_count:
              rid_off = RID_START + 8 + native_heap_idx * 4
              old_rid = struct.unpack_from('<I', data, rid_off)[0]
              struct.pack_into('<I', data, rid_off, RESID_DEBUGGABLE)
              changes.append(f"ResID[{native_heap_idx}]: 0x{old_rid:08X} → 0x{RESID_DEBUGGABLE:08X}")
              print(f"\n✅ {changes[-1]}")

          # ===== 3. 修改字符串池 =====
          if native_heap_idx >= 0:
              s, start, end = str_info[native_heap_idx]
              new_name = "debuggable"
              wp = start

              if is_utf8:
                  new_b = new_name.encode('utf-8')
                  data[wp] = len(new_name); wp += 1
                  data[wp] = len(new_b); wp += 1
                  for b in new_b: data[wp] = b; wp += 1
                  data[wp] = 0; wp += 1
              else:
                  new_u = new_name.encode('utf-16-le')
                  struct.pack_into('<H', data, wp, len(new_name)); wp += 2
                  for j, b in enumerate(new_u): data[wp + j] = b
                  wp += len(new_u)
                  struct.pack_into('<H', data, wp, 0); wp += 2

              while wp < end: data[wp] = 0; wp += 1
              changes.append(f"字符串[{native_heap_idx}]: '{s}' → '{new_name}'")
              print(f"✅ {changes[-1]}")

          # ===== 4. 扫描所有 XML 元素的所有属性 =====
          print(f"\n===== 扫描 XML 元素属性 =====")
          pos = RID_START + rid_chunk_size
          elem_count = 0
          attr_changes = 0

          while pos < len(data) - 8:
              c_type = struct.unpack_from('<H', data, pos)[0]
              c_size = struct.unpack_from('<I', data, pos + 4)[0]

              if c_size < 8 or pos + c_size > len(data):
                  break

              if c_type == 0x0102:  # START_ELEMENT
                  # 正确的偏移量！
                  elem_ns = struct.unpack_from('<i', data, pos + 16)[0]
                  elem_name = struct.unpack_from('<I', data, pos + 20)[0]
                  attr_start = struct.unpack_from('<H', data, pos + 24)[0]
                  attr_size = struct.unpack_from('<H', data, pos + 26)[0]
                  attr_count = struct.unpack_from('<H', data, pos + 28)[0]
                  if attr_size == 0: attr_size = 20

                  elem_name_str = str_info.get(elem_name, ("<?>", 0, 0))[0]
                  a_base = pos + 16 + attr_start

                  is_app = (elem_name_str == "application")
                  if is_app:
                      print(f"\n🎯 <application> 元素 @ offset {pos}")
                      print(f"   属性数: {attr_count}, 属性大小: {attr_size}")
                      print(f"   属性起始: {a_base} (= {pos} + 16 + {attr_start})")

                  for ai in range(attr_count):
                      ao = a_base + ai * attr_size
                      if ao + 20 > len(data): break

                      a_ns = struct.unpack_from('<I', data, ao)[0]
                      a_name = struct.unpack_from('<I', data, ao + 4)[0]
                      a_raw = struct.unpack_from('<I', data, ao + 8)[0]
                      a_typed_size = struct.unpack_from('<H', data, ao + 12)[0]
                      a_typed_res0 = data[ao + 14]
                      a_typed_type = data[ao + 15]
                      a_typed_data = struct.unpack_from('<i', data, ao + 16)[0]

                      a_name_str = str_info.get(a_name, ("<?>", 0, 0))[0]

                      if is_app:
                          val_display = ""
                          if a_typed_type == 0x12:
                              val_display = f"{'true' if a_typed_data != 0 else 'false'}"
                          elif a_typed_type == 0x01:
                              val_display = f"@0x{a_typed_data:08X}"
                          elif a_typed_type == 0x03:
                              val_display = f"str[{a_typed_data}]"
                          else:
                              val_display = f"0x{a_typed_data:08X}"
                          print(f"   [{ai:2d}] name_idx={a_name:3d} ({a_name_str:40s}) "
                                f"type=0x{a_typed_type:02X} value={val_display}")

                      # 修改1: debuggable (原 allowNativeHeapPointerTagging)
                      if a_name == native_heap_idx and a_typed_type == 0x12:
                          old_val = a_typed_data
                          struct.pack_into('<i', data, ao + 16, -1)  # true
                          changes.append(f"属性 debuggable: {old_val} → -1 (true) @ offset {ao+16}")
                          print(f"   ✅ → debuggable 值改为 true")
                          attr_changes += 1

                      # 修改2: allowBackup false → true
                      if a_name == allow_backup_idx and a_typed_type == 0x12 and a_typed_data == 0:
                          struct.pack_into('<i', data, ao + 16, -1)  # true
                          changes.append(f"属性 allowBackup: false → true @ offset {ao+16}")
                          print(f"   ✅ → allowBackup 值改为 true")
                          attr_changes += 1

              pos += c_size

          # ===== 5. 写回 =====
          with open("work/AndroidManifest.xml", "wb") as f:
              f.write(data)

          print(f"\n===== 修改总结 =====")
          print(f"文件大小: {len(data)} bytes (未变)")
          print(f"总修改数: {len(changes)}")
          for c in changes:
              print(f"  ✅ {c}")

          if attr_changes == 0:
              print("\n❌ 警告: 没有属性被修改！")
              sys.exit(1)
          else:
              print(f"\n🎉 {attr_changes} 个属性修改成功")
          PYEOF

      - name: 组装 APK
        run: |
          cp official.apk capcut_v16.9_v7.apk
          zip -d capcut_v16.9_v7.apk "META-INF/*" 2>/dev/null || true
          cd work
          zip -0 ../capcut_v16.9_v7.apk AndroidManifest.xml
          cd ..
          ls -la capcut_v16.9_v7.apk

      - name: 对齐 + 签名
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_v16.9_v7.apk aligned.apk

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 23 \
            --out capcut_v16.9_v7_signed.apk \
            aligned.apk

          echo "=== 签名验证 ==="
          "$APKSIGNER" verify -v capcut_v16.9_v7_signed.apk | head -10

          echo ""
          echo "=== aapt 验证 ==="
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          "$AAPT" dump badging capcut_v16.9_v7_signed.apk 2>&1 | grep -iE "debuggable|package:|allowBackup" || echo "aapt 未找到相关标志"

          echo ""
          echo "=== aapt dump xmltree (Manifest application 节点) ==="
          "$AAPT" dump xmltree capcut_v16.9_v7_signed.apk AndroidManifest.xml 2>&1 | grep -A 30 "application" | head -40

          ls -la capcut_v16.9_v7_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-v7
          path: capcut_v16.9_v7_signed.apk
          retention-days: 7
