name: 【分析】_v18a - 蒙版面板UI层代码定位_2026-03-20_00-30-12

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. 搜索蒙版面板相关的 UI 类"
        run: |
          {
            echo "=== 文件名包含 Mask/mask 的 smali 文件 ==="
            find decoded/ -iname "*mask*" -name "*.smali" -path "*/edit/*" -type f 2>/dev/null | sort | head -40

            echo ""
            echo "=== 文件名包含 VideoMask 的 smali 文件 ==="
            find decoded/ -iname "*VideoMask*" -name "*.smali" -type f 2>/dev/null | sort | head -20

            echo ""
            echo "=== 搜索 videomask 字符串引用 ==="
            rg -rn '"videomask"' decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 No internet connection 字符串 ==="
            rg -rn -i "no.internet\|no_internet\|internet.*connection\|connection.*error\|network.*error" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20
            rg -rn -i "no.internet\|no_internet\|internet.*connection" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20
          } 2>&1 | tee logs/01_mask_ui_files.txt

      - name: "2. 搜索 No internet connection 的资源 ID"
        run: |
          {
            echo "=== 搜索可能的字符串资源引用 ==="
            rg -rn "no.*internet\|no_internet\|network_error\|connection_error" decoded/smali_classes*/com/vega/ 2>/dev/null | head -30

            echo ""
            echo "=== 搜索 RecommendOptController（日志中出现的 loading UI 管理器）==="
            find decoded/ -name "RecommendOptController*" -name "*.smali" -type f 2>/dev/null | head -10
            f=$(find decoded/ -name "RecommendOptController.smali" -type f 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              grep -n "internet\|connection\|error\|empty\|no.*data\|loading\|retry" "$f" | head -20
            fi
          } 2>&1 | tee logs/02_error_strings.txt

      - name: "3. 蒙版面板的 ViewModel 和 Panel 类"
        run: |
          {
            echo "=== MaskPanel / MaskViewModel 相关类 ==="
            find decoded/ -iname "*MaskPanel*" -o -iname "*MaskViewModel*" -o -iname "*MaskView*" | grep "\.smali$" | sort | head -20

            echo ""
            echo "=== 搜索处理 videomask 的 ViewModel ==="
            rg -l "videomask" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -15

            echo ""
            echo "=== 搜索面板 error/empty 状态处理 ==="
            rg -rn "showError\|showEmpty\|showNoNetwork\|showRetry\|setError\|setState.*ERROR\|setState.*EMPTY" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -30
          } 2>&1 | tee logs/03_mask_viewmodel.txt

      - name: "4. 通用特效面板的错误处理基类"
        run: |
          {
            echo "=== BaseEffectPanel / BasePanel 类 ==="
            find decoded/ -iname "*BaseEffect*Panel*" -o -iname "*EffectPanel*" -o -iname "*ResourcePanel*" | grep "\.smali$" | grep -i "edit" | sort | head -20

            echo ""
            echo "=== ArtistPanel / ArtistEffect 相关 UI 类 ==="
            find decoded/ -iname "*ArtistPanel*" -o -iname "*ArtistEffect*View*" -o -iname "*ArtistEffect*Panel*" | grep "\.smali$" | sort | head -20

            echo ""
            echo "=== PanelLoadState / LoadState 相关类 ==="
            find decoded/ -iname "*LoadState*" -o -iname "*PanelState*" -o -iname "*ViewState*" | grep "\.smali$" | grep -iE "edit|effect|panel" | sort | head -20
          } 2>&1 | tee logs/04_base_panel.txt

      - name: "5. EffectPanelViewLifecycle（可能是所有特效面板的生命周期管理器）"
        run: |
          {
            echo "=== EffectPanelViewLifecycle 相关文件 ==="
            find decoded/ -iname "*EffectPanel*Lifecycle*" -name "*.smali" -type f 2>/dev/null | sort | head -20

            echo ""
            echo "=== 搜索 videomask 面板的注册/绑定代码 ==="
            rg -rn "videomask\|video_mask\|VIDEO_MASK" decoded/smali_classes*/com/vega/ 2>/dev/null | head -30
          } 2>&1 | tee logs/05_effect_lifecycle.txt

      - name: "6. 通用 Panel 错误 UI 组件"
        run: |
          {
            echo "=== NetworkErrorView / EmptyView / RetryView 相关 ==="
            find decoded/ -iname "*NetworkError*" -o -iname "*EmptyView*" -o -iname "*RetryView*" -o -iname "*ErrorTip*" -o -iname "*NoDataView*" | grep "\.smali$" | sort | head -20

            echo ""
            echo "=== PanelErrorView / EffectErrorView ==="
            find decoded/ -iname "*PanelError*" -o -iname "*EffectError*" -o -iname "*PanelEmpty*" | grep "\.smali$" | sort | head -20

            echo ""
            echo "=== 搜索 internet connection 相关的 UI 组件 ==="
            rg -rn "internet\|no_connection\|network_unavailable" decoded/smali_classes*/com/vega/ui/ 2>/dev/null | head -20
            rg -rn "internet\|no_connection\|network_unavailable" decoded/smali_classes*/com/vega/libeffect/ 2>/dev/null | head -20
          } 2>&1 | tee logs/06_error_ui.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v18a-mask-ui-locate
          path: logs/
          retention-days: 7
