name: v15b - 提取水印 Pro 锁定关键代码

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. VipManager 完整代码（核心目标）"
        run: |
          {
            echo "========== VipManager.smali 完整代码 =========="
            f="decoded/smali_classes8/com/vega/subscriptionapi/legacy/VipManager.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at expected path"
              find decoded/ -name "VipManager.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/01_vipmanager.txt

      - name: "2. WatermarkBusinessFunction 完整代码"
        run: |
          {
            echo "========== WatermarkBusinessFunction.smali 主类 =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/WatermarkBusinessFunction.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -name "WatermarkBusinessFunction.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/02_watermark_business.txt

      - name: "3. doUseFunction$1 完整代码（核心决策 Lambda）"
        run: |
          {
            echo "========== doUseFunction\$1.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/WatermarkBusinessFunction\$doUseFunction\$1.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -name "*doUseFunction*" -name "*.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/03_dousefunction.txt

      - name: "4. VipExportChecker + RadicalVipExportChecker（导出二次检查）"
        run: |
          {
            echo "========== VipExportChecker.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/checker/VipExportChecker.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -iname "*VipExportChecker*" -name "*.smali" -type f 2>/dev/null
            fi

            echo ""
            echo "========== RadicalVipExportChecker.smali =========="
            f2="decoded/smali_classes8/com/vega/subscription/biz/checker/RadicalVipExportChecker.smali"
            if [ -f "$f2" ]; then
              echo "File: $f2 ($(wc -l < "$f2") lines)"
              cat "$f2"
            else
              echo "NOT FOUND"
            fi
          } 2>&1 | tee logs/04_export_checker.txt

      - name: "5. BaseGoodsAccessChecker（通用付费校验基类）"
        run: |
          {
            echo "========== BaseGoodsAccessChecker.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/checker/base/BaseGoodsAccessChecker.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              grep -n "\.method\|isVip\|isPro\|VipManager\|checkExport\|watermark\|canExport\|trialExport" "$f" | head -40
              echo ""
              echo "--- 完整代码 ---"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -name "BaseGoodsAccessChecker.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/05_base_checker.txt

      - name: "6. 谁调用了 VipManager.b()Z（确认调用范围）"
        run: |
          {
            echo "========== VipManager;->b()Z 的所有调用者 =========="
            rg -n "VipManager;->b\(\)Z" decoded/ 2>/dev/null | head -40

            echo ""
            echo "========== VipManager 的所有方法引用 =========="
            rg -n "VipManager;->" decoded/ 2>/dev/null | grep -v "VipManager\$\|VipManager.smali" | head -40
          } 2>&1 | tee logs/06_vipmanager_callers.txt

      - name: "7. 水印状态的存储和读取"
        run: |
          {
            echo "========== 水印状态字符串搜索 =========="
            rg -n '"watermark_type"\|"watermark_hidden"\|"watermark_visible"\|"show_watermark"\|"hide_watermark"\|"no_watermark"\|"watermark_position"\|"watermark_config"' decoded/ 2>/dev/null | head -30

            echo ""
            echo "========== ExportImpl 中的水印逻辑 =========="
            f="decoded/smali_classes8/com/vega/export/ExportImpl.smali"
            if [ -f "$f" ]; then
              rg -n -B2 -A5 -i "watermark" "$f" 2>/dev/null | head -60
            fi

            echo ""
            echo "========== Watermark 相关的 lemon.editexport 类 =========="
            find decoded/ -path "*/lemon/editexport/*" -iname "*watermark*" -name "*.smali" -type f 2>/dev/null
            find decoded/ -path "*/lemon/editexport/*" -iname "*Watermark*" -name "*.smali" -type f 2>/dev/null

            echo ""
            echo "========== 导出参数中的水印配置 =========="
            rg -rn "watermark" decoded/smali_classes*/com/lemon/editexport/ 2>/dev/null | head -20
            rg -rn "watermark" decoded/smali_classes*/com/vega/export/ 2>/dev/null | head -20
          } 2>&1 | tee logs/07_watermark_state.txt

      - name: "8. observeVipStatus 和钻石图标控制"
        run: |
          {
            echo "========== observeVipStatus\$1.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/WatermarkBusinessFunction\$observeVipStatus\$1.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
            fi

            echo ""
            echo "========== WatermarkBusinessFunction$Companion =========="
            f2="decoded/smali_classes8/com/vega/subscription/biz/function/WatermarkBusinessFunction\$Companion.smali"
            if [ -f "$f2" ]; then
              echo "File: $f2 ($(wc -l < "$f2") lines)"
              cat "$f2"
            fi
          } 2>&1 | tee logs/08_vip_observe.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15b-watermark-code-extraction
          path: logs/
          retention-days: 7
