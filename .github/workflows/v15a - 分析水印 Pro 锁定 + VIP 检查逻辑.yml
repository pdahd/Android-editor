name: v15a - 分析水印 Pro 锁定 + VIP 检查逻辑

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. 水印相关类和方法"
        run: |
          {
            echo "========== Watermark 相关类 =========="
            find decoded/ -iname "*watermark*" -name "*.smali" -type f 2>/dev/null | sort

            echo ""
            echo "========== Watermark 相关字符串引用 =========="
            rg -n -i '".*watermark.*"\|".*water_mark.*"\|"no_watermark"\|"hide_watermark"\|"remove_watermark"' decoded/ 2>/dev/null | head -40

            echo ""
            echo "========== ExportWatermark / WatermarkSetting 类 =========="
            for f in $(find decoded/ -iname "*Watermark*" -not -name "*\$*" -name "*.smali" -type f 2>/dev/null | head -10); do
              echo "--- $f ---"
              grep -n "\.method\|\.field\|watermark\|hidden\|visible\|pro\|vip\|subscribe\|diamond" "$f" | head -30
              echo ""
            done

            echo ""
            echo "========== Watermark ViewModel / Fragment =========="
            find decoded/ -iname "*Watermark*ViewModel*" -o -iname "*Watermark*Fragment*" -o -iname "*Watermark*Activity*" 2>/dev/null | grep "\.smali$" | head -10
          } 2>&1 | tee logs/01_watermark_classes.txt

      - name: "2. Pro/VIP 检查逻辑"
        run: |
          {
            echo "========== isPro / isVip / isSubscribed 方法 =========="
            rg -n "isPro\|isVip\|is_pro\|is_vip\|isSubscribed\|isPremium\|hasPremium\|hasSubscription\|isProUser" decoded/smali_classes*/com/vega/ 2>/dev/null | head -30
            rg -n "isPro\|isVip\|is_pro\|is_vip\|isSubscribed\|isPremium" decoded/smali_classes*/com/lemon/ 2>/dev/null | head -20

            echo ""
            echo "========== VipManager / ProManager / SubscriptionManager =========="
            find decoded/ -iname "*VipManager*" -o -iname "*ProManager*" -o -iname "*SubscriptionManager*" -o -iname "*EntitlementManager*" -o -iname "*AbilityManager*" 2>/dev/null | grep "\.smali$" | head -20

            echo ""
            echo "========== Pro/VIP 检查类的方法列表 =========="
            for f in $(find decoded/ -iname "*VipManager*" -not -name "*\$*" -name "*.smali" -type f 2>/dev/null | head -3); do
              echo "--- $f ---"
              grep -n "\.method\|isPro\|isVip\|check\|subscribe\|premium" "$f" | head -20
              echo ""
            done
          } 2>&1 | tee logs/02_pro_vip_check.txt

      - name: "3. 订阅页 Activity 搜索"
        run: |
          {
            echo "========== 订阅/购买相关 Activity =========="
            rg -n "SubscribeActivity\|SubscriptionActivity\|ProActivity\|PurchaseActivity\|PaywallActivity\|UpgradeActivity\|VipActivity\|PremiumActivity" decoded/AndroidManifest.xml 2>/dev/null || true
            rg -n "SubscribeActivity\|SubscriptionActivity\|ProActivity\|PurchaseActivity\|PaywallActivity\|UpgradeActivity\|VipActivity\|PremiumActivity" decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== Manifest 中所有 Activity 列表（搜索关键词）=========="
            rg -n "activity.*android:name" decoded/AndroidManifest.xml 2>/dev/null | grep -iE "pro|vip|subscribe|purchase|premium|upgrade|paywall|billing" | head -20

            echo ""
            echo "========== 通用跳转搜索：从水印页跳转到订阅页 =========="
            for f in $(find decoded/ -iname "*Watermark*" -name "*.smali" -type f 2>/dev/null); do
              hits=$(rg -c "startActivity\|startActivityForResult\|Intent\|navigate" "$f" 2>/dev/null || echo "0")
              if [ "$hits" != "0" ]; then
                echo "--- $(basename "$f"): $hits hits ---"
                rg -n "startActivity\|Intent\|navigate\|ProFeature\|subscribe\|upgrade" "$f" 2>/dev/null
                echo ""
              fi
            done
          } 2>&1 | tee logs/03_subscription_activity.txt

      - name: "4. 功能门控 / Feature Gating 机制"
        run: |
          {
            echo "========== FeatureGating / AbilityCheck / ProFeature 类 =========="
            find decoded/ -iname "*FeatureGat*" -o -iname "*AbilityCheck*" -o -iname "*ProFeature*" -o -iname "*FeatureLock*" -o -iname "*FeatureGuard*" 2>/dev/null | grep "\.smali$" | head -20

            echo ""
            echo "========== 功能权限检查字符串 =========="
            rg -n '"no_watermark"\|"watermark_hidden"\|"hide_watermark"\|"remove_watermark"\|"export_no_watermark"' decoded/ 2>/dev/null | head -20

            echo ""
            echo "========== 导出设置中的 Pro 检查 =========="
            find decoded/ -iname "*Export*" -name "*.smali" -type f 2>/dev/null | grep -iE "setting|config|watermark|option" | head -10
            for f in $(find decoded/ -iname "*ExportSetting*" -o -iname "*ExportConfig*" -o -iname "*ExportOption*" 2>/dev/null | grep "\.smali$" | head -5); do
              echo "--- $f ---"
              grep -n "watermark\|hidden\|pro\|vip\|diamond\|subscribe" "$f" | head -15
              echo ""
            done
          } 2>&1 | tee logs/04_feature_gating.txt

      - name: "5. 水印 UI 控件的点击事件"
        run: |
          {
            echo "========== Watermark 内部类（点击事件处理）=========="
            find decoded/ -path "*Watermark*\$*" -name "*.smali" -type f 2>/dev/null | head -20

            echo ""
            echo "========== onClick / onCheckedChanged in Watermark classes =========="
            for f in $(find decoded/ -iname "*Watermark*" -name "*.smali" -type f 2>/dev/null); do
              hits=$(rg -c "onClick\|onCheckedChanged\|setOnClickListener\|onItemSelected\|isChecked\|setChecked\|toggle" "$f" 2>/dev/null || echo "0")
              if [ "$hits" != "0" ]; then
                echo "--- $(basename "$f"): $hits hits ---"
                rg -n "onClick\|onCheckedChanged\|setOnClickListener\|isChecked\|setChecked\|toggle\|hidden\|visible" "$f" 2>/dev/null
                echo ""
              fi
            done

            echo ""
            echo "========== 水印选项的 View ID 搜索 =========="
            rg -n "watermark.*hidden\|btn.*hidden\|switch.*watermark\|radio.*hidden\|tab.*hidden" decoded/ 2>/dev/null | head -15
          } 2>&1 | tee logs/05_watermark_click.txt

      - name: "6. Ability/Entitlement 系统（字节跳动的权限控制）"
        run: |
          {
            echo "========== AbilityManager / EntitlementService =========="
            find decoded/ -iname "*Ability*" -name "*.smali" -type f 2>/dev/null | grep -iv "accessibility" | head -20

            echo ""
            echo "========== checkAbility / checkEntitlement 方法 =========="
            rg -n "checkAbility\|checkEntitlement\|canUse\|isFeatureEnabled\|isFeatureAvailable\|hasPermission.*pro\|hasAbility" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20
            rg -n "checkAbility\|checkEntitlement\|canUse\|isFeatureEnabled\|isFeatureAvailable" decoded/smali_classes*/com/lemon/ 2>/dev/null | head -20

            echo ""
            echo "========== ProGuide / UpgradeGuide / UpsellGuide =========="
            find decoded/ -iname "*ProGuide*" -o -iname "*UpgradeGuide*" -o -iname "*UpsellGuide*" -o -iname "*ProDialog*" -o -iname "*UpgradeDialog*" 2>/dev/null | grep "\.smali$" | head -15

            echo ""
            echo "========== 钻石/Pro 图标显示逻辑 =========="
            rg -n "diamond\|pro_icon\|pro_badge\|vip_icon\|crown_icon\|lock_icon" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20
          } 2>&1 | tee logs/06_ability_system.txt

      - name: "7. 导出流程中的水印处理"
        run: |
          {
            echo "========== Export 相关类（搜索 watermark）=========="
            for f in $(find decoded/ -iname "*Export*" -not -name "*\$*" -name "*.smali" -type f 2>/dev/null | head -15); do
              hits=$(rg -c -i "watermark" "$f" 2>/dev/null || echo "0")
              if [ "$hits" != "0" ]; then
                echo "--- $f: $hits watermark references ---"
                rg -n -i "watermark\|hidden\|visible\|no.*watermark\|remove.*watermark" "$f" 2>/dev/null | head -15
                echo ""
              fi
            done

            echo ""
            echo "========== WatermarkConfig / WatermarkModel =========="
            find decoded/ -iname "*WatermarkConfig*" -o -iname "*WatermarkModel*" -o -iname "*WatermarkBean*" -o -iname "*WatermarkData*" -o -iname "*WatermarkState*" 2>/dev/null | grep "\.smali$" | head -10
            for f in $(find decoded/ -iname "*WatermarkConfig*" -o -iname "*WatermarkModel*" -o -iname "*WatermarkState*" 2>/dev/null | grep "\.smali$" | grep -v "\$" | head -5); do
              echo "--- $f ---"
              cat "$f" | head -60
              echo "..."
              echo ""
            done
          } 2>&1 | tee logs/07_export_watermark.txt

      - name: "8. 已知 MOD 版的 Pro 解锁线索"
        run: |
          {
            echo "========== MOD 版可能使用的 Pro 解锁方式 =========="
            echo "(搜索常见的 Pro/VIP 解锁类和方法)"
            echo ""

            echo "=== UserManager / AccountManager ==="
            find decoded/ -iname "*UserManager*" -o -iname "*AccountManager*" 2>/dev/null | grep "\.smali$" | grep -v "\$" | head -10
            for f in $(find decoded/ -iname "*UserManager*" -not -name "*\$*" -name "*.smali" -type f 2>/dev/null | head -3); do
              echo "--- $f ---"
              grep -n "\.method\|isPro\|isVip\|getUser\|subscription\|premium\|pro_status" "$f" | head -20
              echo ""
            done

            echo ""
            echo "=== SubscriptionInfo / SubscriptionStatus ==="
            find decoded/ -iname "*Subscription*" -name "*.smali" -type f 2>/dev/null | grep -v "\$" | head -15

            echo ""
            echo "=== ProConfig / VipConfig ==="
            rg -n '"is_pro"\|"is_vip"\|"pro_status"\|"vip_status"\|"subscription_status"\|"has_watermark"\|"show_watermark"\|"watermark_type"' decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/08_pro_unlock_clues.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15a-watermark-pro-analysis
          path: logs/
          retention-days: 7
