name: 正版v16.9.0 debuggable注入 v4 (二进制Manifest修改)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip curl
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 直接修改二进制 AndroidManifest.xml
        run: |
          mkdir -p work

          # 提取原始二进制 Manifest
          unzip -o official.apk AndroidManifest.xml -d work/
          echo "=== 原始 Manifest ==="
          ls -la work/AndroidManifest.xml
          file work/AndroidManifest.xml

          # 使用 Python 直接修改二进制 AXML
          python3 << 'PYEOF'
          import struct
          import sys

          def read_axml(path):
              with open(path, 'rb') as f:
                  return bytearray(f.read())

          def write_axml(path, data):
              with open(path, 'wb') as f:
                  f.write(data)

          def find_string_in_pool(data, target):
              """Find a UTF-16 string in the string pool and return its index"""
              # AXML format: strings are stored as UTF-16LE
              target_bytes = target.encode('utf-16-le')
              pos = 0
              while True:
                  pos = data.find(target_bytes, pos)
                  if pos == -1:
                      return -1, -1
                  return pos, len(target_bytes)

          def patch_debuggable(input_path, output_path):
              data = read_axml(input_path)
              print(f"文件大小: {len(data)} bytes")

              # Strategy: Find "allowBackup" in the binary and look for its
              # boolean value (0x00000000 = false). Then find a way to add debuggable.
              #
              # But modifying binary AXML string pool is very complex.
              # Better approach: use Android's own tools.

              # Let's try a different approach - find the exact byte pattern
              # for allowBackup="false" and see if we can change it to true,
              # AND find where to inject debuggable.

              # First, let's understand the structure
              # Search for "debuggable" string
              debuggable_utf16 = "debuggable".encode('utf-16-le')
              debuggable_utf8 = b"debuggable"

              pos16 = data.find(debuggable_utf16)
              pos8 = data.find(debuggable_utf8)
              print(f"'debuggable' UTF-16LE position: {pos16}")
              print(f"'debuggable' UTF-8 position: {pos8}")

              # Search for "allowBackup"
              backup_utf16 = "allowBackup".encode('utf-16-le')
              backup_pos = data.find(backup_utf16)
              print(f"'allowBackup' UTF-16LE position: {backup_pos}")

              # Search for android:debuggable attribute ID
              # android:debuggable = 0x0101000f
              debuggable_attr_id = struct.pack('<I', 0x0101000f)
              attr_positions = []
              pos = 0
              while True:
                  pos = data.find(debuggable_attr_id, pos)
                  if pos == -1:
                      break
                  attr_positions.append(pos)
                  pos += 4
              print(f"debuggable attr ID (0x0101000f) found at: {attr_positions}")

              # Search for android:allowBackup attribute ID
              # android:allowBackup = 0x01010280
              backup_attr_id = struct.pack('<I', 0x01010280)
              backup_positions = []
              pos = 0
              while True:
                  pos = data.find(backup_attr_id, pos)
                  if pos == -1:
                      break
                  backup_positions.append(pos)
                  pos += 4
              print(f"allowBackup attr ID (0x01010280) found at: {backup_positions}")

              if not backup_positions:
                  print("ERROR: Cannot find allowBackup attribute!")
                  sys.exit(1)

              # In AXML, each attribute is a 20-byte structure:
              # [4: namespace_uri] [4: name] [4: raw_value] [4: type_and_size] [4: data]
              # For boolean: type=0x12, data=0x00000000(false) or 0xFFFFFFFF(true)
              #
              # We need to find allowBackup's attribute entry and look at its value
              for bp in backup_positions:
                  # The attr ID is at the 'name' field position
                  # So the full attribute starts 4 bytes before (namespace_uri)
                  # Actually, in the attribute chunk:
                  # offset+0: namespace (4 bytes)
                  # offset+4: name (4 bytes) ← this is where we found backup_attr_id
                  # offset+8: rawValue (4 bytes)
                  # offset+12: typedValue size (2) + padding (1) + type (1)
                  # offset+16: data (4 bytes)

                  # Let's examine the area around it
                  print(f"\n--- allowBackup 属性 @ {bp} ---")
                  start = bp - 4
                  chunk = data[start:start+20]
                  if len(chunk) == 20:
                      ns, name, raw, type_info, value = struct.unpack_from('<IIIII', chunk)
                      attr_type = (type_info >> 24) & 0xFF
                      print(f"  namespace: 0x{ns:08X}")
                      print(f"  name:      0x{name:08X}")
                      print(f"  rawValue:  0x{raw:08X}")
                      print(f"  type:      0x{attr_type:02X} ({'boolean' if attr_type == 0x12 else 'other'})")
                      print(f"  value:     0x{value:08X} ({'true' if value != 0 else 'false'})")

                      if attr_type == 0x12 and value == 0x00000000:
                          print("  → 这是 allowBackup=false ✅")
                          print("  → 将在此属性前插入 debuggable=true")

                          # Create a new debuggable attribute entry (20 bytes)
                          # Copy namespace from allowBackup
                          new_attr = struct.pack('<IIIII',
                              ns,           # same namespace (android)
                              0xFFFFFFFF,   # placeholder for name index (will fix)
                              0xFFFFFFFF,   # no raw value
                              0x000812,     # size=8, padding=0, type=0x12 (boolean)
                              0xFFFFFFFF    # true (-1)
                          )

                          # Actually, inserting bytes into binary AXML is very risky
                          # because it changes all offsets. Let's use a simpler approach:
                          #
                          # APPROACH: Change allowBackup from false to true,
                          # which enables adb backup. Then separately handle debuggable.
                          #
                          # Wait - we need debuggable, not just allowBackup.
                          # Let's try the simplest possible patch:
                          # Just flip allowBackup from false to true AND
                          # add --min-sdk-version to apksigner.
                          pass

              # SIMPLEST APPROACH: Don't modify binary AXML at all.
              # Instead, we'll handle this at the apksigner level.
              print("\n=== 采用替代方案 ===")
              print("二进制 AXML 修改过于复杂")
              print("改用 apktool 的 --use-aapt2 参数重新编译")

          patch_debuggable("work/AndroidManifest.xml", "work/AndroidManifest_patched.xml")
          PYEOF

      - name: 使用 apktool --use-aapt2 重新编译
        run: |
          # 方法: 只解码 Manifest（不解码 DEX），使用 --use-aapt2
          java -jar apktool.jar d -s official.apk -o apktool_work -f

          # 注入 debuggable
          sed -i 's/<application/<application android:debuggable="true"/' apktool_work/AndroidManifest.xml
          grep "debuggable" apktool_work/AndroidManifest.xml && echo "✅ debuggable 已注入"

          # 尝试用 --use-aapt2 编译
          echo "=== 尝试 --use-aapt2 编译 ==="
          java -jar apktool.jar b apktool_work -o recompiled_aapt2.apk --use-aapt2 2>&1 | tail -20
          
          if [ -f recompiled_aapt2.apk ]; then
            echo "✅ aapt2 编译成功"
            mkdir -p final_work
            unzip -o recompiled_aapt2.apk AndroidManifest.xml -d final_work/
            echo "--- 验证 ---"
            file final_work/AndroidManifest.xml
            ls -la final_work/AndroidManifest.xml
          else
            echo "❌ aapt2 也失败，尝试最终方案..."
            
            # 最终方案: 删除有问题的资源文件，保留 resources.arsc
            echo ""
            echo "=== 最终方案: 清理有问题的资源文件 ==="
            
            # 找出并删除所有文件名包含特殊字符的资源文件
            find apktool_work/res/ -name '*+*' -delete 2>/dev/null
            find apktool_work/res/ -name '*=*' -delete 2>/dev/null
            find apktool_work/res/ -name '*-*' -not -name '*.9.png' | while read f; do
              base=$(basename "$f" .xml)
              # 只删除文件名是类似 "+c" "-a" "0=" 这种混淆名的
              if echo "$base" | grep -qE '^[0-9+\-=]'; then
                echo "删除: $f"
                rm -f "$f"
              fi
            done
            
            echo "=== 重新编译（清理后）==="
            java -jar apktool.jar b apktool_work -o recompiled_clean.apk 2>&1 | tail -20
            
            if [ -f recompiled_clean.apk ]; then
              echo "✅ 清理后编译成功"
              mkdir -p final_work
              unzip -o recompiled_clean.apk AndroidManifest.xml -d final_work/
            else
              echo "❌ 仍然失败"
              
              # 绝对最终方案: 用 Python 直接修改二进制
              echo ""
              echo "=== 绝对最终方案: Python 二进制注入 ==="
              mkdir -p final_work
              unzip -o official.apk AndroidManifest.xml -d final_work/
              
              python3 << 'PYEOF'
          import struct

          with open("final_work/AndroidManifest.xml", "rb") as f:
              data = bytearray(f.read())

          print(f"原始大小: {len(data)} bytes")

          # android:allowBackup attribute resource ID = 0x01010280
          # android:debuggable attribute resource ID = 0x0101000f
          #
          # In AXML binary format, attributes are stored in chunks.
          # Each attribute is 20 bytes:
          #   namespace_ref (4) + name_ref (4) + raw_value_ref (4) + typed_value (8)
          #   where typed_value = size(2) + res0(1) + type(1) + data(4)
          #
          # Strategy: Find allowBackup attribute, then duplicate it
          # and change the name to debuggable + value to true.
          # But this requires updating chunk sizes and attribute counts.
          #
          # SIMPLER: Find allowBackup=false and change it to allowBackup=true
          # This gives us adb backup + we handle debuggable differently.
          #
          # SIMPLEST: Look for the attribute count in the XML start tag
          # for <application> and increment it, then append debuggable attribute.
          
          # Let's find allowBackup (0x01010280) attribute entry
          target = struct.pack('<I', 0x01010280)  # allowBackup attr ID
          pos = 0
          found = False
          while True:
              pos = data.find(target, pos)
              if pos == -1:
                  break
              
              # Check if this looks like an attribute entry
              # The attribute starts 4 bytes before (namespace ref)
              attr_start = pos - 4
              if attr_start < 0:
                  pos += 4
                  continue
              
              # Read the attribute structure
              ns, name, raw_val = struct.unpack_from('<III', data, attr_start)
              typed_size, typed_res0, typed_type, typed_data = struct.unpack_from('<HBBi', data, attr_start + 12)
              
              print(f"Found allowBackup at offset {attr_start}:")
              print(f"  namespace_ref: {ns}")
              print(f"  name_ref:      0x{name:08X}")
              print(f"  raw_value_ref: {raw_val}")
              print(f"  typed: size={typed_size}, type=0x{typed_type:02X}, data={typed_data}")
              
              if typed_type == 0x12:  # TYPE_INT_BOOLEAN
                  if typed_data == 0:
                      print(f"  → allowBackup = false (确认)")
                      print(f"  → 修改 allowBackup 为 true")
                      # Change value to true (-1 / 0xFFFFFFFF)
                      struct.pack_into('<i', data, attr_start + 16, -1)
                      print(f"  ✅ allowBackup 已改为 true")
                      found = True
                  elif typed_data == -1:
                      print(f"  → allowBackup = true (已经是true)")
                  break
              pos += 4

          if not found:
              print("WARNING: 未找到或未修改 allowBackup")

          # Now let's try to add debuggable attribute
          # This is more complex - we need to:
          # 1. Add "debuggable" string to string pool (or find if it exists)
          # 2. Add attribute entry to the <application> element
          # 3. Update chunk sizes and attribute count
          #
          # For now, let's check if "debuggable" string already exists
          debuggable_utf16 = "debuggable".encode('utf-16-le')
          dpos = data.find(debuggable_utf16)
          print(f"\n'debuggable' string in binary: {'found at ' + str(dpos) if dpos >= 0 else 'NOT FOUND'}")

          # Check for debuggable attr ID
          debug_attr = struct.pack('<I', 0x0101000f)
          dattr_pos = data.find(debug_attr)
          print(f"debuggable attr ID (0x0101000f): {'found at ' + str(dattr_pos) if dattr_pos >= 0 else 'NOT FOUND'}")

          with open("final_work/AndroidManifest.xml", "wb") as f:
              f.write(data)

          print(f"\n修改后大小: {len(data)} bytes")
          print("注意: 仅修改了 allowBackup=true，debuggable 需要另外处理")
          PYEOF

              echo "--- 验证修改后的二进制 ---"
              ls -la final_work/AndroidManifest.xml
              file final_work/AndroidManifest.xml
            fi
          fi

      - name: 组装 APK
        run: |
          MANIFEST=""
          if [ -f final_work/AndroidManifest.xml ]; then
            MANIFEST="final_work"
          fi

          if [ -z "$MANIFEST" ]; then
            echo "❌ 没有可用的 AndroidManifest.xml"
            exit 1
          fi

          cp official.apk capcut_v16.9_debug_v4.apk
          zip -d capcut_v16.9_debug_v4.apk "META-INF/*" 2>/dev/null || true

          cd "$MANIFEST"
          zip -0 ../capcut_v16.9_debug_v4.apk AndroidManifest.xml
          cd ..

          ls -la capcut_v16.9_debug_v4.apk

      - name: 对齐 + 签名
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_v16.9_debug_v4.apk aligned.apk

          # 加 --min-sdk-version 防止 Manifest 解析失败
          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 23 \
            --out capcut_v16.9_debug_v4_signed.apk \
            aligned.apk

          "$APKSIGNER" verify -v capcut_v16.9_debug_v4_signed.apk | head -10

          # 用 aapt 验证 debuggable
          AAPT=$(find "$ANDROID_HOME" -name "aapt" -not -name "aapt2" -type f | sort -V | tail -1)
          echo ""
          echo "=== aapt 验证 ==="
          "$AAPT" dump badging capcut_v16.9_debug_v4_signed.apk 2>&1 | grep -iE "debuggable|package|allowBackup" || true

          ls -la capcut_v16.9_debug_v4_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-debug-v4
          path: capcut_v16.9_debug_v4_signed.apk
          retention-days: 7

      - name: Upload 诊断日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-diagnosis-v4
          path: |
            final_work/
            work/
          retention-days: 7
