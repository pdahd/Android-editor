name: 【分析】v19d - 解密函数反编译 + 加密数据提取

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Ghidra
        run: |
          curl -fL --retry 3 -o ghidra.zip \
            https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
          unzip -q ghidra.zip
          mv ghidra_* ghidra

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq unzip python3

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SO
        run: |
          mkdir -p so_files
          unzip -o official.apk "lib/arm64-v8a/libmetasec_ov.so" -d so_files/
          ls -la so_files/lib/arm64-v8a/

      - name: Create analysis script and directories
        run: |
          mkdir -p logs
          mkdir -p /tmp/ghidra_proj
          mkdir -p /tmp/ghidra_output
          cat > /tmp/DecryptAnalysis.java << 'JAVA_SCRIPT'
          import ghidra.app.script.GhidraScript;
          import ghidra.program.model.symbol.*;
          import ghidra.program.model.listing.*;
          import ghidra.program.model.address.*;
          import ghidra.program.model.mem.*;
          import ghidra.app.decompiler.*;
          import java.io.*;

          public class DecryptAnalysis extends GhidraScript {
              
              private String decompileAt(long offset, String label, DecompInterface decomp) {
                  try {
                      Address addr = currentProgram.getAddressFactory()
                          .getDefaultAddressSpace().getAddress(offset);
                      Function fn = currentProgram.getFunctionManager().getFunctionAt(addr);
                      if (fn == null) {
                          fn = currentProgram.getFunctionManager().getFunctionContaining(addr);
                      }
                      if (fn == null) return "FUNCTION NOT FOUND at 0x" + Long.toHexString(offset);
                      
                      StringBuilder sb = new StringBuilder();
                      sb.append("=== " + label + " ===\n");
                      sb.append("Address: " + fn.getEntryPoint() + "\n");
                      sb.append("Name: " + fn.getName() + "\n");
                      sb.append("Size: " + fn.getBody().getNumAddresses() + " bytes\n\n");
                      
                      DecompileResults results = decomp.decompileFunction(fn, 180, monitor);
                      if (results != null && results.getDecompiledFunction() != null) {
                          sb.append(results.getDecompiledFunction().getC());
                      } else {
                          sb.append("DECOMPILATION FAILED - showing first 300 instructions:\n");
                          Listing listing = currentProgram.getListing();
                          InstructionIterator iIter = listing.getInstructions(fn.getBody(), true);
                          int count = 0;
                          while (iIter.hasNext() && count < 300) {
                              Instruction inst = iIter.next();
                              sb.append(inst.getAddress() + "  " + inst + "\n");
                              count++;
                          }
                      }
                      return sb.toString();
                  } catch (Exception e) {
                      return "ERROR decompiling " + label + ": " + e.getMessage();
                  }
              }

              private String hexDumpAt(long offset, int length, String label) {
                  try {
                      Memory mem = currentProgram.getMemory();
                      Address addr = currentProgram.getAddressFactory()
                          .getDefaultAddressSpace().getAddress(offset);
                      byte[] bytes = new byte[length];
                      mem.getBytes(addr, bytes);
                      
                      StringBuilder sb = new StringBuilder();
                      sb.append("=== " + label + " ===\n");
                      sb.append("Address: 0x" + Long.toHexString(offset) + "\n");
                      sb.append("Length: " + length + " bytes\n");
                      sb.append("Hex: ");
                      for (int i = 0; i < bytes.length; i++) {
                          sb.append(String.format("%02x", bytes[i] & 0xFF));
                          if (i < bytes.length - 1) sb.append(" ");
                      }
                      sb.append("\n");
                      // Also show as potential ASCII
                      sb.append("Raw: ");
                      for (byte b : bytes) {
                          char c = (char)(b & 0xFF);
                          sb.append((c >= 32 && c < 127) ? c : '.');
                      }
                      sb.append("\n");
                      return sb.toString();
                  } catch (Exception e) {
                      return "ERROR reading " + label + ": " + e.getMessage();
                  }
              }

              @Override
              public void run() throws Exception {
                  String outDir = "/tmp/ghidra_output";
                  String sep = "\n" + "=".repeat(80) + "\n";
                  
                  DecompInterface decomp = new DecompInterface();
                  decomp.openProgram(currentProgram);
                  
                  println("Starting decrypt function analysis...");

                  // File 1: The 4 decrypt functions
                  println("Decompiling 4 decrypt functions...");
                  PrintWriter pw1 = new PrintWriter(new File(outDir + "/01_decrypt_functions.txt"));
                  pw1.println(decompileAt(0x00268aa4L, "Decrypt A - FUN_00268aa4", decomp));
                  pw1.println(sep);
                  pw1.println(decompileAt(0x00269a34L, "Decrypt B - FUN_00269a34", decomp));
                  pw1.println(sep);
                  pw1.println(decompileAt(0x0026941cL, "Decrypt C - FUN_0026941c", decomp));
                  pw1.println(sep);
                  pw1.println(decompileAt(0x002692b4L, "Decrypt D - FUN_002692b4", decomp));
                  pw1.flush();
                  pw1.close();
                  println("File 01 done");

                  // File 2: Helper/sub functions called by decrypt functions
                  // These addresses come from v19a strings output and cross-references
                  println("Decompiling decrypt helpers...");
                  PrintWriter pw2 = new PrintWriter(new File(outDir + "/02_decrypt_helpers.txt"));
                  pw2.println(decompileAt(0x00268c24L, "Decrypt E - FUN_00268c24 (also used as decrypt)", decomp));
                  pw2.println(sep);
                  // FUN_001c5bf8 - the final signature verification judge
                  pw2.println(decompileAt(0x001c5bf8L, "FUN_001c5bf8 - signature verify final judge", decomp));
                  pw2.println(sep);
                  // FUN_001c24c8 - single check executor
                  pw2.println(decompileAt(0x001c24c8L, "FUN_001c24c8 - single check executor", decomp));
                  pw2.println(sep);
                  // FUN_00158f0c - preliminary verification in 001c568c
                  pw2.println(decompileAt(0x00158f0cL, "FUN_00158f0c - preliminary verify", decomp));
                  pw2.flush();
                  pw2.close();
                  println("File 02 done");

                  // File 3: Extract encrypted data bytes from FUN_001c568c references
                  // These are the encrypted Java class names/method names
                  println("Extracting encrypted data...");
                  PrintWriter pw3 = new PrintWriter(new File(outDir + "/03_encrypted_data.txt"));
                  pw3.println("=== Encrypted data referenced in FUN_001c568c ===\n");
                  
                  // From the decompiled code of 001c568c:
                  // FindClass class name (24 bytes): local_180 area = DAT_0027be3e, DAT_0027be46, DAT_0027be4e
                  pw3.println(hexDumpAt(0x0027be3eL, 24, "Class name A for FindClass (0x18=24 bytes, decrypt B)"));
                  pw3.println(hexDumpAt(0x0027be56L, 30, "Error msg 1 (0x1e=30 bytes, decrypt A)"));
                  pw3.println(hexDumpAt(0x0027be74L, 40, "Error msg 2 (0x28=40 bytes, decrypt C)"));
                  pw3.println(hexDumpAt(0x0027be9cL, 29, "Error msg 3 (0x1d=29 bytes, decrypt B)"));
                  
                  // GetMethodID method name (18 bytes) and signature (38 bytes)
                  pw3.println(hexDumpAt(0x0027bddaL, 18, "Method name (0x12=18 bytes, decrypt E/268c24)"));  
                  pw3.println(hexDumpAt(0x0027bd8fL, 38, "Method sig candidate area 1"));
                  
                  // Second class (34 bytes)
                  pw3.println(hexDumpAt(0x0027bde4L, 34, "Class name B (0x22=34 bytes, decrypt A)"));
                  
                  // More method names from 001c568c
                  pw3.println(hexDumpAt(0x0027bdd3L, 17, "Method name 2 (0x11=17 bytes, decrypt E)"));
                  pw3.println(hexDumpAt(0x0027bdbdL, 22, "Method sig 2 (0x16=22 bytes, decrypt D)"));
                  
                  // CallStaticObjectMethodA related
                  pw3.println(hexDumpAt(0x0027bda2L, 27, "Static method name (0x1b=27 bytes, decrypt B)"));
                  pw3.println(hexDumpAt(0x0027bd8fL, 19, "Static method arg (0x13=19 bytes, decrypt A)"));
                  
                  // GetStaticObjectField (API>=30)
                  pw3.println(hexDumpAt(0x0027bf08L, 39, "Static field name (0x27=39 bytes, decrypt D)"));
                  
                  pw3.println(sep);
                  pw3.println("=== Encrypted data from FUN_001c00f0 (first 5 decrypt calls) ===\n");
                  
                  // From 001c00f0: the 5 initial decrypt pairs
                  pw3.println(hexDumpAt(0x0027b5c2L, 21, "001c00f0 decrypt C arg1 (0x15=21 bytes)"));
                  pw3.println(hexDumpAt(0x0027b59bL, 39, "001c00f0 decrypt B arg2 (0x27=39 bytes)"));
                  pw3.println(hexDumpAt(0x0027b58aL, 17, "001c00f0 decrypt A arg3 (0x11=17 bytes)"));
                  pw3.println(hexDumpAt(0x0027b987L, 19, "001c00f0 decrypt E arg4 (0x13=19 bytes)"));
                  pw3.println(hexDumpAt(0x0027b572L, 24, "001c00f0 decrypt D arg5 (0x18=24 bytes)"));
                  
                  // Encrypted class names used in the check list
                  pw3.println(hexDumpAt(0x0027b346L, 35, "Check list class 1 (decrypt A, 0x23=35)"));
                  pw3.println(hexDumpAt(0x0027b32eL, 24, "Check list class 2 (decrypt A, 0x18=24)"));
                  pw3.println(hexDumpAt(0x0027b390L, 17, "Check list method 1 (decrypt B, 0x11=17)"));
                  
                  pw3.flush();
                  pw3.close();
                  println("File 03 done");

                  // File 4: Hex dump of the 4 decrypt functions themselves (raw bytes)
                  // This allows offline analysis of the algorithm
                  println("Dumping decrypt function bytes...");
                  PrintWriter pw4 = new PrintWriter(new File(outDir + "/04_decrypt_raw_bytes.txt"));
                  
                  // Get sizes from 01_all_functions.txt
                  // FUN_00268aa4: need to find size - let's dump generous amounts
                  pw4.println(hexDumpAt(0x00268aa4L, 132, "FUN_00268aa4 raw bytes (Decrypt A)"));
                  pw4.println(sep);
                  pw4.println(hexDumpAt(0x00269a34L, 68, "FUN_00269a34 raw bytes (Decrypt B)"));
                  pw4.println(sep);
                  pw4.println(hexDumpAt(0x0026941cL, 68, "FUN_0026941c raw bytes (Decrypt C)"));
                  pw4.println(sep);
                  pw4.println(hexDumpAt(0x002692b4L, 68, "FUN_002692b4 raw bytes (Decrypt D)"));
                  pw4.println(sep);
                  pw4.println(hexDumpAt(0x00268c24L, 68, "FUN_00268c24 raw bytes (Decrypt E)"));
                  
                  pw4.flush();
                  pw4.close();
                  println("File 04 done");

                  // File 5: Cross-reference analysis - who calls the decrypt functions
                  println("Analyzing cross-references...");
                  PrintWriter pw5 = new PrintWriter(new File(outDir + "/05_xrefs.txt"));
                  
                  long[] decryptAddrs = {0x268aa4L, 0x269a34L, 0x26941cL, 0x2692b4L, 0x268c24L};
                  String[] decryptNames = {"Decrypt_A_268aa4", "Decrypt_B_269a34", "Decrypt_C_26941c", "Decrypt_D_2692b4", "Decrypt_E_268c24"};
                  
                  FunctionManager fm = currentProgram.getFunctionManager();
                  ReferenceManager rm = currentProgram.getReferenceManager();
                  
                  for (int i = 0; i < decryptAddrs.length; i++) {
                      Address addr = currentProgram.getAddressFactory()
                          .getDefaultAddressSpace().getAddress(decryptAddrs[i]);
                      Function fn = fm.getFunctionAt(addr);
                      if (fn == null) {
                          pw5.println(decryptNames[i] + ": FUNCTION NOT FOUND\n");
                          continue;
                      }
                      
                      pw5.println("=== " + decryptNames[i] + " callers ===");
                      ReferenceIterator refs = rm.getReferencesTo(addr);
                      int count = 0;
                      while (refs.hasNext() && count < 50) {
                          Reference ref = refs.next();
                          Function caller = fm.getFunctionContaining(ref.getFromAddress());
                          String callerName = caller != null ? caller.getName() : "unknown";
                          long callerSize = caller != null ? caller.getBody().getNumAddresses() : 0;
                          pw5.println("  " + ref.getFromAddress() + " in " + callerName + " (size=" + callerSize + ")");
                          count++;
                      }
                      pw5.println("  Total references shown: " + count + "\n");
                  }
                  
                  pw5.flush();
                  pw5.close();
                  println("File 05 done");

                  decomp.dispose();
                  println("Decrypt analysis complete! All 5 files written to " + outDir);
              }
          }
          JAVA_SCRIPT
          echo "Script created successfully"

      - name: Run Ghidra analysis
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          SO="so_files/lib/arm64-v8a/libmetasec_ov.so"
          
          ghidra/support/analyzeHeadless /tmp/ghidra_proj MetasecProject \
            -import "$SO" \
            -processor AARCH64:LE:64:v8A \
            -scriptPath /tmp \
            -postScript DecryptAnalysis.java \
            2>&1 | tee /tmp/ghidra_output/ghidra_run.log
          
          echo ""
          echo "=== Ghidra exit code: $? ==="
          echo "=== Output files ==="
          ls -la /tmp/ghidra_output/

      - name: Collect results
        if: always()
        run: |
          for f in /tmp/ghidra_output/*.txt /tmp/ghidra_output/*.log; do
            if [ -f "$f" ]; then
              cp "$f" logs/
            fi
          done
          if [ ! "$(ls -A logs/ 2>/dev/null)" ]; then
            echo "No output generated" > logs/00_status.txt
          fi
          echo "=== Final logs directory ==="
          ls -la logs/
          echo ""
          echo "=== File sizes ==="
          wc -l logs/* 2>/dev/null || true

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v19d-decrypt-analysis
          path: logs/
          retention-days: 7
