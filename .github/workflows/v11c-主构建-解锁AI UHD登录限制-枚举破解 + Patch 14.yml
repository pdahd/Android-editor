      - name: "Patch 9: Templates Fail-Open (FAILED→SUCCESS in error branches)"
        run: |
          python3 << 'PYEOF'
          import os, sys

          BASE = "smali_work/smali_classes7/com/vega/libeffect/repository"

          # 三个目标文件：分类加载 + 两个特效加载协程
          targets = [
              ("getCategoriesByMultiPanelWithCategoryId$2",
               BASE + "/SubtitleTemplateEffectRepository$getCategoriesByMultiPanelWithCategoryId$2.smali"),
              ("getComposeEffectWithCategoryId$2",
               BASE + "/SubtitleTemplateEffectRepository$getComposeEffectWithCategoryId$2.smali"),
              ("getComposeEffect$2",
               BASE + "/SubtitleTemplateEffectRepository$getComposeEffect$2.smali"),
          ]

          total = 0

          for name, fp in targets:
              if not os.path.exists(fp):
                  print(f"WARN {name}: file not found, skipping")
                  continue

              with open(fp, 'r') as f:
                  lines = f.readlines()

              count = 0
              i = 0
              while i < len(lines):
                  # 检测：new-instance 创建 CategoryListState 或 ComposeEffectListState
                  if 'new-instance' in lines[i] and \
                     ('CategoryListState' in lines[i] or 'ComposeEffectListState' in lines[i]):
                      # 在接下来10行内搜索 RepoResult;->b (FAILED)
                      for j in range(i + 1, min(i + 10, len(lines))):
                          if 'RepoResult;->b:' in lines[j]:
                              # 替换 FAILED → SUCCESS
                              lines[j] = lines[j].replace('RepoResult;->b:', 'RepoResult;->a:')
                              count += 1
                              break
                  i += 1

              with open(fp, 'w') as f:
                  f.writelines(lines)

              print(f"OK {name}: {count} FAILED→SUCCESS patches")
              total += count

          print(f"\nTotal: {total} Fail-Open patches across 3 coroutine files")

          if total == 0:
              print("ERROR: No patches applied! File structure may have changed.")
              sys.exit(1)
          elif total < 3:
              print(f"WARN: Expected ≥3 patches (02×1 + 01×2 + 03×1), got {total}")

          print("\nExpected patch distribution:")
          print("  getCategoriesByMultiPanelWithCategoryId$2: ≥1 (category FAILED)")
          print("  getComposeEffectWithCategoryId$2: ≥2 (category + compose FAILED)")
          print("  getComposeEffect$2: ≥1 (compose FAILED)")
          PYEOF

