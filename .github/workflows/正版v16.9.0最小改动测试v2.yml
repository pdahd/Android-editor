name: 正版v16.9.0最小改动测试 v2 (debuggable注入+SO分析)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip curl binutils
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 只改 Manifest (加 debuggable) - 使用 -r -s 跳过资源和DEX
        run: |
          java -jar apktool.jar d -r -s official.apk -o manifest_work -f

          # 验证原始状态
          echo "=== 修改前 ==="
          grep "debuggable" manifest_work/AndroidManifest.xml || echo "debuggable: 不存在（预期）"
          grep "allowBackup" manifest_work/AndroidManifest.xml || echo "allowBackup: 不存在"

          # 添加 debuggable=true
          sed -i 's/<application/<application android:debuggable="true"/' manifest_work/AndroidManifest.xml

          echo "=== 修改后 ==="
          grep "debuggable" manifest_work/AndroidManifest.xml && echo "✅ debuggable 已添加"

          # 重新编译（只编译 Manifest）
          java -jar apktool.jar b manifest_work -o temp_manifest.apk

          mkdir -p work
          unzip -o temp_manifest.apk AndroidManifest.xml -d work/
          ls -la work/AndroidManifest.xml

      - name: 组装 APK (只替换 Manifest，不动 liba.so)
        run: |
          cp official.apk capcut_debuggable_nopatch.apk
          zip -d capcut_debuggable_nopatch.apk "META-INF/*" 2>/dev/null || true

          cd work
          zip -0 ../capcut_debuggable_nopatch.apk AndroidManifest.xml
          cd ..

          echo "=== 仅替换了 AndroidManifest.xml，liba.so 未修改 ==="
          ls -la capcut_debuggable_nopatch.apk

      - name: 对齐 + 签名
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign -type f | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f | sort -V | tail -1)

          KS_PASS="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASS }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n ')"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks

          "$ZIPALIGN" -p -f 4 capcut_debuggable_nopatch.apk aligned.apk

          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out capcut_v16.9_debuggable.apk \
            aligned.apk

          "$APKSIGNER" verify -v capcut_v16.9_debuggable.apk | head -10
          ls -la capcut_v16.9_debuggable.apk

      - name: 分析 v16.9.0 的 liba.so 结构
        run: |
          mkdir -p analysis/logs

          # 提取两个架构的 liba.so
          unzip -o official.apk "lib/armeabi-v7a/liba.so" -d analysis/ 2>/dev/null || true
          unzip -o official.apk "lib/arm64-v8a/liba.so" -d analysis/ 2>/dev/null || true

          echo "=== liba.so 文件信息 ===" | tee analysis/logs/so_info.txt
          find analysis/lib/ -name "liba.so" -exec ls -la {} \; | tee -a analysis/logs/so_info.txt
          find analysis/lib/ -name "liba.so" -exec file {} \; | tee -a analysis/logs/so_info.txt

          # 分析每个架构
          for arch in armeabi-v7a arm64-v8a; do
            SO="analysis/lib/${arch}/liba.so"
            [ ! -f "$SO" ] && continue

            echo "" | tee -a analysis/logs/so_info.txt
            echo "=============================" | tee -a analysis/logs/so_info.txt
            echo "=== ${arch} ===" | tee -a analysis/logs/so_info.txt
            echo "=============================" | tee -a analysis/logs/so_info.txt

            # 1. 搜索签名/验证相关字符串
            echo "--- 签名验证相关字符串 ---" | tee -a analysis/logs/so_info.txt
            strings "$SO" | grep -iE "signature|verify|abort|integrity|check.sign|cert|PackageInfo|getPackageInfo|certificates" \
              | head -30 | tee -a analysis/logs/so_info.txt

            # 2. 搜索包名（签名检查通常会引用包名）
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- 包名引用 ---" | tee -a analysis/logs/so_info.txt
            strings "$SO" | grep -iE "com.lemon|lvoverseas" \
              | head -10 | tee -a analysis/logs/so_info.txt

            # 3. 搜索 abort 相关
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- abort 相关 ---" | tee -a analysis/logs/so_info.txt
            strings "$SO" | grep -i "abort" \
              | head -10 | tee -a analysis/logs/so_info.txt

            # 4. 查找符号表中的关键函数
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- 符号表（验证相关）---" | tee -a analysis/logs/so_info.txt
            if command -v readelf >/dev/null; then
              readelf -s "$SO" 2>/dev/null | grep -iE "abort|verify|check|sign|cert|integrity" \
                | head -20 | tee -a analysis/logs/so_info.txt
            fi
            if command -v nm >/dev/null; then
              nm -D "$SO" 2>/dev/null | grep -iE "abort|verify|check|sign" \
                | head -20 | tee -a analysis/logs/so_info.txt
            fi

            # 5. 用 objdump 查找 abort@plt 的地址
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- PLT 中的 abort ---" | tee -a analysis/logs/so_info.txt
            if command -v objdump >/dev/null; then
              objdump -d -j .plt "$SO" 2>/dev/null | grep -A2 "abort" \
                | head -10 | tee -a analysis/logs/so_info.txt
            fi

            # 6. 搜索 v11.9.0 中已知的签名哈希模式
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- 文件大小与校验 ---" | tee -a analysis/logs/so_info.txt
            wc -c "$SO" | tee -a analysis/logs/so_info.txt
            md5sum "$SO" | tee -a analysis/logs/so_info.txt

            # 7. 检查 .init_array（自动执行的初始化函数）
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- .init_array 段 ---" | tee -a analysis/logs/so_info.txt
            if command -v readelf >/dev/null; then
              readelf -S "$SO" 2>/dev/null | grep -E "init_array|init\b" \
                | tee -a analysis/logs/so_info.txt
            fi

            # 8. 对比 v11.9.0 的关键偏移处的内容
            echo "" | tee -a analysis/logs/so_info.txt
            echo "--- 对比 v11.9.0 patch 点附近的数据 ---" | tee -a analysis/logs/so_info.txt
            if [ "$arch" = "armeabi-v7a" ]; then
              echo "v11.9.0 Patch1 位置 (0x10b484):" | tee -a analysis/logs/so_info.txt
              xxd -s 0x10b484 -l 16 "$SO" 2>/dev/null | tee -a analysis/logs/so_info.txt
              echo "v11.9.0 Patch2 位置 (0x306c50):" | tee -a analysis/logs/so_info.txt
              xxd -s 0x306c50 -l 16 "$SO" 2>/dev/null | tee -a analysis/logs/so_info.txt
            fi

          done

          echo ""
          echo "=== 分析完成 ==="

      - name: 列出 APK 中所有 SO 文件
        run: |
          echo "=== APK 中的所有 native 库 ===" | tee analysis/logs/all_so_files.txt
          unzip -l official.apk | grep "\.so$" | tee -a analysis/logs/all_so_files.txt

          echo ""
          echo "=== 特别关注的 SO 文件 ===" | tee -a analysis/logs/all_so_files.txt
          unzip -l official.apk | grep -iE "libsscronet|libttboringssl|libcronet|libshark|libapplog" \
            | tee -a analysis/logs/all_so_files.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capcut-v16.9-debuggable-nopatch
          path: capcut_v16.9_debuggable.apk
          retention-days: 7

      - name: Upload 分析报告
        uses: actions/upload-artifact@v4
        with:
          name: liba-so-analysis-v16.9
          path: analysis/
          retention-days: 7
