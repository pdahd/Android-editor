name: 【构建】_v12c - Patch 16 - 修复蒙版_2026-03-20_04-26

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile DEX (skip resources)
        run: |
          java -jar apktool.jar d -f -r official.apk -o smali_work > /dev/null 2>&1 || true
          echo "smali directories: $(ls -d smali_work/smali_classes* 2>/dev/null | wc -l)"

      - name: "Patch 1: vega CrackingInterceptor (skip-all + neutralize b, keep native)"
        run: |
          python3 << 'PYEOF'
          import re, sys

          filepath = "smali_work/smali_classes7/com/vega/launcher/network/interceptors/CrackingInterceptor.smali"
          with open(filepath, "r") as f:
              content = f.read()

          patched_count = 0

          if re.search(r'\.method public final native intercept\(', content):
              print("OK intercept() is native -- NOT touching it")
          else:
              print("FAIL intercept() is NOT native!"); sys.exit(1)

          if re.search(r'\.method public final native c\(Ljava/lang/String;\)V', content):
              print("OK c(String)V is native -- NOT touching it")
          else:
              print("FAIL c(String)V is NOT native!"); sys.exit(1)

          pat_a = re.search(r'\.method public final a\(Ljava/lang/String;\)Z.*?\.end method', content, re.DOTALL)
          new_a = "\n".join([
              ".method public final a(Ljava/lang/String;)Z",
              "    .locals 1",
              "    # PATCHED: force ALL URLs into skip list",
              "    const/4 v0, 0x1",
              "    return v0",
              ".end method",
          ])
          if pat_a:
              content = content[:pat_a.start()] + new_a + content[pat_a.end():]
              print("OK a(String)Z -> always return true")
              patched_count += 1
          else:
              print("FAIL a(String)Z not found!"); sys.exit(1)

          pat_b = re.search(r'\.method public final b\(I\)V.*?\.end method', content, re.DOTALL)
          new_b = "\n".join([
              ".method public final b(I)V",
              "    .locals 0",
              "    # PATCHED: block isCracking storage",
              "    return-void",
              ".end method",
          ])
          if pat_b:
              content = content[:pat_b.start()] + new_b + content[pat_b.end():]
              print("OK b(I)V -> return-void")
              patched_count += 1
          else:
              print("WARN b(I)V not found")

          with open(filepath, "w") as f:
              f.write(content)
          print(f"DONE vega CrackingInterceptor: {patched_count} patches applied")
          PYEOF

