name: v16.9.0 分析CrackingInterceptor + 安全弹窗 v9

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip zip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 反编译 DEX
        run: |
          java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true
          echo "=== smali 目录 ==="
          ls -d decoded/smali_classes* | wc -l
          echo "目录数: $(ls -d decoded/smali_classes* | wc -l)"

      - name: 准备日志目录
        run: mkdir -p logs

      - name: 1. 找到 CrackingInterceptor
        run: |
          {
            echo "=== 搜索 CrackingInterceptor ==="
            find decoded/ -name "CrackingInterceptor.smali" -type f 2>/dev/null

            echo ""
            echo "=== CrackingInterceptor 完整代码 ==="
            for f in $(find decoded/ -name "CrackingInterceptor.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "=== 搜索所有 CrackingInterceptor 相关文件 ==="
            find decoded/ -name "CrackingInterceptor*" -type f 2>/dev/null
          } 2>&1 | tee logs/01_CrackingInterceptor.txt

      - name: 2. 找到 SignVerifyInterceptor
        run: |
          {
            echo "=== SignVerifyInterceptor ==="
            for f in $(find decoded/ -name "SignVerifyInterceptor.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "=== LynxSignVerifyInterceptor ==="
            for f in $(find decoded/ -name "LynxSignVerifyInterceptor.smali" -type f 2>/dev/null); do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/02_SignVerifyInterceptors.txt

      - name: 3. 搜索安全弹窗相关代码
        run: |
          {
            echo "=== 搜索 check_risk / rick_control ==="
            rg -l "check_risk\|rick_control" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 security notice / 安全通知 ==="
            rg -l "security.notice\|Security.notice\|安全通知\|not.secure\|不安全" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 TRAFFIC_CONTROL_DROP ==="
            rg -l "TRAFFIC_CONTROL\|traffic_control\|555" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 cracking / anti-crack ==="
            rg -l -i "cracking\|anti.crack\|crack.detect\|tamper" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 lynxViewRoot / lynx_container ==="
            rg -l "lynxViewRoot\|lynx_container" decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/03_security_search.txt

      - name: 4. 搜索安全弹窗启动逻辑
        run: |
          {
            # 搜索可能启动安全弹窗的 Activity 或代码
            echo "=== 搜索包含 security 的 Activity 注册 ==="
            rg -i "security\|safe\|risk\|cracking" decoded/AndroidManifest.xml 2>/dev/null | head -20

            echo ""
            echo "=== interceptors 目录下所有文件 ==="
            find decoded/ -path "*/interceptors/*" -name "*.smali" -type f 2>/dev/null

            echo ""
            echo "=== network 目录结构 ==="
            find decoded/ -path "*/network/*" -name "*.smali" -type f 2>/dev/null | head -30
          } 2>&1 | tee logs/04_security_activity.txt

      - name: 5. 分析 check_risk 调用链
        run: |
          {
            echo "=== 搜索 check_risk URL ==="
            rg -n "check_risk" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 rick_control ==="
            rg -n "rick_control" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 搜索 feed-api.capcutapi.com ==="
            rg -n "feed-api" decoded/ 2>/dev/null | head -20

            echo ""
            echo "=== 包含 risk 的方法 ==="
            for f in $(rg -l "risk" decoded/ 2>/dev/null | head -10); do
              echo "--- $f ---"
              grep -n "risk\|\.method" "$f" | head -20
              echo ""
            done
          } 2>&1 | tee logs/05_check_risk_chain.txt

      - name: 6. 分析 CrackingInterceptor 的 native 方法所在 SO
        run: |
          {
            echo "=== 搜索注册 CrackingInterceptor native 方法的代码 ==="
            rg -n "CrackingInterceptor" decoded/ 2>/dev/null | head -30

            echo ""
            echo "=== 检查 APK 中所有 SO 文件中的 cracking 字符串 ==="
            mkdir -p so_analysis
            unzip -o official.apk "lib/arm64-v8a/*.so" -d so_analysis/ 2>/dev/null || true

            for so in so_analysis/lib/arm64-v8a/*.so; do
              name=$(basename "$so")
              result=$(strings "$so" | grep -ic "cracking\|crack_detect\|intercept" 2>/dev/null || echo "0")
              if [ "$result" -gt "0" ]; then
                echo "$name: $result 个匹配"
                strings "$so" | grep -i "cracking\|crack_detect\|CrackingInterceptor" | head -5
                echo ""
              fi
            done

            echo ""
            echo "=== 特别检查 libsscronet.so ==="
            strings so_analysis/lib/arm64-v8a/libsscronet.so 2>/dev/null | grep -i "crack\|intercept\|verify\|check" | head -20
          } 2>&1 | tee logs/06_native_analysis.txt

      - name: 上传分析结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis-v9
          path: logs/
          retention-days: 7
