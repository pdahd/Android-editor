name: v15f-分析 - AI UHD 门控代码提取

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ripgrep
          curl -fL --retry 5 -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompile
        run: java -jar apktool.jar d -f -r official.apk -o decoded > /dev/null 2>&1 || true

      - name: Create logs directory
        run: mkdir -p logs

      - name: "1. VipExportBusinessFunction 完整代码"
        run: |
          {
            echo "========== VipExportBusinessFunction.smali =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/VipExportBusinessFunction.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND at expected path, searching..."
              find decoded/ -name "VipExportBusinessFunction.smali" -type f 2>/dev/null
              for f2 in $(find decoded/ -name "VipExportBusinessFunction.smali" -type f 2>/dev/null); do
                echo "--- $f2 ($(wc -l < "$f2") lines) ---"
                cat "$f2"
              done
            fi
          } 2>&1 | tee logs/01_vip_export_business.txt

      - name: "2. AttachmentVipFeature SWIG 桥接类"
        run: |
          {
            echo "========== AttachmentVipFeature.smali =========="
            find decoded/ -name "AttachmentVipFeature.smali" -type f 2>/dev/null | while read f; do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== VipStatus 枚举/类 =========="
            find decoded/ -iname "*VipStatus*" -name "*.smali" -type f 2>/dev/null | grep -v "\$" | head -10
            for f in $(find decoded/ -iname "*VipStatus*" -name "*.smali" -type f 2>/dev/null | grep -v "\$" | head -5); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done
          } 2>&1 | tee logs/02_attachment_vip_feature.txt

      - name: "3. 搜索 observed vip feature 字符串（精确定位拦截代码）"
        run: |
          {
            echo "========== 搜索日志字符串 =========="
            rg -n "observed vip\|vip feature\|vip material\|ai_ultra_hd\|VipExportBusiness" decoded/ 2>/dev/null | head -40

            echo ""
            echo "========== VipExportBusinessFunction 内部类 =========="
            find decoded/ -name "VipExportBusinessFunction*" -name "*.smali" -type f 2>/dev/null | sort
          } 2>&1 | tee logs/03_vip_feature_strings.txt

      - name: "4. ExportConfigPanel 中的 AI UHD 开关"
        run: |
          {
            echo "========== ExportConfigPanel 搜索 =========="
            find decoded/ -iname "*ExportConfigPanel*" -name "*.smali" -type f 2>/dev/null | head -10

            echo ""
            echo "========== highDefinition / ultra_hd 字符串搜索 =========="
            rg -n "highDefinition\|high_definition\|ultra_hd\|ultraHd\|ai_uhd\|aiUhd\|oneClickEnhance\|one_click_enhance" decoded/smali_classes*/com/vega/export/ 2>/dev/null | head -30
            rg -n "highDefinition\|ultra_hd\|ultraHd" decoded/smali_classes*/com/vega/edit/ 2>/dev/null | head -20

            echo ""
            echo "========== ExportConfigPanel 中的 checkbox 和 VIP 逻辑 =========="
            for f in $(find decoded/ -iname "*ExportConfigPanel*" -not -name "*\$*" -name "*.smali" -type f 2>/dev/null | head -3); do
              echo "--- $f ---"
              grep -n "highDefinition\|checkbox\|checked\|vip\|ultra\|uhd\|enhance\|quality\|BusinessFunction" "$f" | head -30
              echo ""
            done
          } 2>&1 | tee logs/04_export_config_panel.txt

      - name: "5. VipExportBusinessFunction$showVipGuidePanel（拦截弹窗逻辑）"
        run: |
          {
            echo "========== showVipGuidePanel 相关 =========="
            for f in $(find decoded/ -name "VipExportBusinessFunction*showVipGuidePanel*" -name "*.smali" -type f 2>/dev/null); do
              echo "--- $f ($(wc -l < "$f") lines) ---"
              cat "$f"
              echo ""
            done

            echo ""
            echo "========== VipExportBusinessFunction 的 doUseFunction =========="
            f="decoded/smali_classes8/com/vega/subscription/biz/function/VipExportBusinessFunction\$doUseFunction\$1.smali"
            if [ -f "$f" ]; then
              echo "File: $f ($(wc -l < "$f") lines)"
              cat "$f"
            else
              echo "NOT FOUND"
              find decoded/ -name "VipExportBusinessFunction*doUseFunction*" -name "*.smali" -type f 2>/dev/null
            fi
          } 2>&1 | tee logs/05_show_vip_guide.txt

      - name: "6. AttachmentVipFeature 的使用方式"
        run: |
          {
            echo "========== 谁读取 AttachmentVipFeature =========="
            rg -n "AttachmentVipFeature" decoded/ 2>/dev/null | grep -v "AttachmentVipFeature.smali" | head -30

            echo ""
            echo "========== vipStatus / VipStatusServer 相关 =========="
            rg -n "VipStatusServer\|vipStatus\|vip_status\|getVipStatus\|setVipStatus" decoded/smali_classes*/com/vega/ 2>/dev/null | head -20
            rg -n "VipStatusServer" decoded/ 2>/dev/null | head -20
          } 2>&1 | tee logs/06_vip_feature_usage.txt

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v15f-uhd-gate-analysis
          path: logs/
          retention-days: 7
