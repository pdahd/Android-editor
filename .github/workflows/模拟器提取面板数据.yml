name: 模拟器提取面板数据 v6 (精确导航序列)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 确认测试视频
        run: ls -la lv_0_20260226171438.mp4

      - name: 准备辅助脚本
        run: |
          cat > tap_exact.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys
          xml_path = sys.argv[1]
          search_text = sys.argv[2]
          try:
              tree = ET.parse(xml_path)
          except Exception:
              sys.exit(1)
          for node in tree.iter('node'):
              text = node.get('text') or ''
              desc = node.get('content-desc') or ''
              clickable = node.get('clickable', 'false')
              if (text == search_text or desc == search_text) and clickable == 'true':
                  bounds = node.get('bounds', '')
                  m = re.findall(r'\d+', bounds)
                  if len(m) == 4:
                      cx = (int(m[0]) + int(m[2])) // 2
                      cy = (int(m[1]) + int(m[3])) // 2
                      print(f"{cx} {cy}")
                      sys.exit(0)
          sys.exit(1)
          PYEOF

          cat > tap_contains.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys
          xml_path = sys.argv[1]
          search_text = sys.argv[2].lower()
          try:
              tree = ET.parse(xml_path)
          except Exception:
              sys.exit(1)
          for node in tree.iter('node'):
              text = (node.get('text') or '').lower()
              desc = (node.get('content-desc') or '').lower()
              clickable = node.get('clickable', 'false')
              if clickable == 'true' and (search_text in text or search_text in desc):
                  bounds = node.get('bounds', '')
                  m = re.findall(r'\d+', bounds)
                  if len(m) == 4:
                      cx = (int(m[0]) + int(m[2])) // 2
                      cy = (int(m[1]) + int(m[3])) // 2
                      print(f"{cx} {cy}")
                      sys.exit(0)
          sys.exit(1)
          PYEOF

          cat > list_ui_helper.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys
          try:
              tree = ET.parse(sys.argv[1])
              for node in tree.iter('node'):
                  text = node.get('text', '')
                  desc = node.get('content-desc', '')
                  bounds = node.get('bounds', '')
                  clickable = node.get('clickable', 'false')
                  if text or desc:
                      m = re.findall(r'\d+', bounds)
                      cx = cy = 0
                      if len(m) == 4:
                          cx = (int(m[0]) + int(m[2])) // 2
                          cy = (int(m[1]) + int(m[3])) // 2
                      label = text if text else f"[desc:{desc}]"
                      print(f"  [{cx:>4},{cy:>4}] click={clickable:<5} \"{label}\"")
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

          cat > emu_script.sh << 'BASHEOF'
          #!/bin/bash
          set -x

          mkdir -p output/screenshots output/logs output/data output/ui_dumps

          snap() {
            adb shell screencap -p /sdcard/screen.png 2>/dev/null
            adb pull /sdcard/screen.png "output/screenshots/${1}.png" 2>/dev/null || true
            adb shell uiautomator dump /sdcard/ui.xml 2>/dev/null
            adb pull /sdcard/ui.xml "output/ui_dumps/${1}.xml" 2>/dev/null || true
          }

          tap_exact() {
            adb shell uiautomator dump /sdcard/ui_tap.xml 2>/dev/null
            adb pull /sdcard/ui_tap.xml /tmp/ui_tap.xml 2>/dev/null || return 1
            local coords
            coords=$(python3 tap_exact.py /tmp/ui_tap.xml "$1" 2>/dev/null) || return 1
            local cx=$(echo "$coords" | cut -d' ' -f1)
            local cy=$(echo "$coords" | cut -d' ' -f2)
            echo ">>> EXACT TAP '$1' at ${cx},${cy}"
            adb shell input tap "$cx" "$cy"
            return 0
          }

          tap_contains() {
            adb shell uiautomator dump /sdcard/ui_tap.xml 2>/dev/null
            adb pull /sdcard/ui_tap.xml /tmp/ui_tap.xml 2>/dev/null || return 1
            local coords
            coords=$(python3 tap_contains.py /tmp/ui_tap.xml "$1" 2>/dev/null) || return 1
            local cx=$(echo "$coords" | cut -d' ' -f1)
            local cy=$(echo "$coords" | cut -d' ' -f2)
            echo ">>> CONTAINS TAP '$1' at ${cx},${cy}"
            adb shell input tap "$cx" "$cy"
            return 0
          }

          list_ui() {
            adb shell uiautomator dump /sdcard/ui_list.xml 2>/dev/null
            adb pull /sdcard/ui_list.xml /tmp/ui_list.xml 2>/dev/null || return 1
            python3 list_ui_helper.py /tmp/ui_list.xml 2>/dev/null
          }

          echo "========== 阶段 1: 安装与初始化 =========="
          adb install -t official.apk
          adb root
          sleep 5

          for perm in READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE READ_MEDIA_VIDEO \
                      READ_MEDIA_IMAGES READ_MEDIA_AUDIO CAMERA RECORD_AUDIO \
                      POST_NOTIFICATIONS; do
            adb shell pm grant com.lemon.lvoverseas "android.permission.${perm}" 2>/dev/null || true
          done

          adb push lv_0_20260226171438.mp4 /sdcard/DCIM/test_video.mp4
          adb shell am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE \
            -d file:///sdcard/DCIM/test_video.mp4 2>/dev/null
          sleep 3

          adb shell pm disable-user --user 0 com.google.android.apps.nexuslauncher 2>/dev/null || true
          adb shell am force-stop com.google.android.apps.nexuslauncher 2>/dev/null || true
          sleep 2

          echo "========== 阶段 2: 启动 App =========="
          adb shell am start -n com.lemon.lvoverseas/com.vega.main.MainActivity
          sleep 25
          snap "01_launch"
          list_ui | tee output/logs/01_ui.txt

          echo "========== 步骤 A: 同意服务条款 =========="
          tap_exact "Agree and continue"
          sleep 5
          snap "02_after_agree"
          list_ui | tee output/logs/02_ui.txt

          echo "========== 步骤 B: 跳过 Onboarding 1/2 =========="
          tap_exact "Skip"
          sleep 3
          snap "03_after_skip1"
          list_ui | tee output/logs/03_ui.txt

          echo "========== 步骤 C: 处理可能的 2/2 或其他弹窗 =========="
          # 可能还有第二页 onboarding 或通知权限弹窗
          tap_exact "Skip" || tap_exact "Not now" || tap_exact "Later" || \
          tap_exact "Allow" || tap_exact "Don't allow" || tap_exact "Maybe later" || true
          sleep 3
          snap "04_after_popup1"
          list_ui | tee output/logs/04_ui.txt

          # 再处理一轮
          tap_exact "Skip" || tap_exact "Not now" || tap_exact "Got it" || \
          tap_exact "Allow" || tap_exact "Close" || tap_exact "Maybe later" || true
          sleep 3
          snap "05_after_popup2"
          list_ui | tee output/logs/05_ui.txt

          # 再处理一轮（确保干净）
          tap_exact "Skip" || tap_exact "Not now" || tap_exact "Got it" || \
          tap_exact "Close" || tap_exact "Maybe later" || true
          sleep 3

          echo "========== 步骤 D: 导航到 Edit 标签页 =========="
          snap "06_before_edit"
          list_ui | tee output/logs/06_ui.txt

          # v5 的 UI dump 显示底部导航栏: Edit[108,2297] Templates[324,2297] AI Lab[540,2297]
          tap_exact "Edit" || tap_contains "edit" || true
          sleep 5
          snap "07_edit_tab"
          list_ui | tee output/logs/07_ui.txt

          echo "========== 步骤 E: 点击 New Project =========="
          tap_exact "New project" || tap_contains "new project" || true
          sleep 5
          snap "08_new_project"
          list_ui | tee output/logs/08_ui.txt

          # 处理可能弹出的权限对话框
          tap_exact "Allow" || tap_exact "While using the app" || true
          sleep 3
          snap "09_after_perm"
          list_ui | tee output/logs/09_ui.txt

          echo "========== 步骤 F: 选择视频 =========="
          # 可能需要切换到 Videos 标签
          tap_exact "Videos" || tap_contains "video" || true
          sleep 3
          snap "10_videos_tab"
          list_ui | tee output/logs/10_ui.txt

          # 点击第一个视频缩略图（通常在左上区域）
          # 根据典型布局，视频列表从 y≈500 开始
          adb shell input tap 270 700
          sleep 3
          snap "11_video_tapped"
          list_ui | tee output/logs/11_ui.txt

          # 点击右下角 Add 按钮
          tap_exact "Add" || tap_contains "add" || true
          sleep 10
          snap "12_editor"
          list_ui | tee output/logs/12_ui.txt

          echo "========== 步骤 G: 进入文字/字幕编辑 =========="
          # 处理可能的引导提示
          tap_exact "Got it" || tap_exact "Skip" || tap_exact "OK" || true
          sleep 2

          # 编辑器底部工具栏应该有 Text
          tap_exact "Text" || tap_contains "text" || true
          sleep 3
          snap "13_text"
          list_ui | tee output/logs/13_ui.txt

          # 点击 Add text
          tap_exact "Add text" || tap_exact "Add Text" || tap_contains "add text" || true
          sleep 3

          # 关闭键盘
          adb shell input keyevent 4
          sleep 2

          # 处理引导
          tap_exact "Got it" || tap_exact "OK" || true
          sleep 2
          snap "14_text_added"
          list_ui | tee output/logs/14_ui.txt

          echo "========== 步骤 H: 遍历字幕面板（触发 API 加载）=========="
          for panel in Templates Fonts Effects Animations Bubble; do
            echo "===== 点击面板: $panel ====="
            tap_exact "$panel" || tap_contains "$panel" || true
            sleep 10
            snap "15_panel_${panel}"
            list_ui | tee "output/logs/15_panel_${panel}.txt"
            echo "--- 检查 effectchannel ---"
            adb shell "ls /data/data/com.lemon.lvoverseas/files/effect/effectchannel* 2>/dev/null" || echo "无"
          done

          echo "========== 步骤 I: 等待 API 完成 =========="
          echo "等待 120 秒让所有面板数据加载..."
          sleep 120

          echo "========== 最终数据提取 =========="
          echo "--- effect 目录 ---"
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/effect/" 2>/dev/null | tee output/logs/final_effect_dir.txt

          echo "--- effectchannel ---"
          adb shell "find /data/data/com.lemon.lvoverseas/files/effect/ -maxdepth 1 \( -name 'effectchannel*' -o -name 'effect_version*' \) -exec ls -la {} \;" 2>/dev/null | tee output/logs/final_channels.txt

          echo "--- rp.db ---"
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/resources/db/rp.db 2>/dev/null" | tee output/logs/final_rpdb.txt

          # 提取 rp.db
          adb pull /data/data/com.lemon.lvoverseas/files/resources/db/rp.db output/data/rp_official.db 2>/dev/null || echo "rp.db 不存在"

          # 提取所有 effectchannel 文件
          for f in $(adb shell "find /data/data/com.lemon.lvoverseas/files/effect/ -maxdepth 1 -name 'effectchannel*' 2>/dev/null" | tr -d '\r'); do
            fname=$(basename "$f")
            echo "提取: $fname"
            adb pull "$f" "output/data/${fname}" 2>/dev/null || true
          done

          # 提取 effect_version 文件
          for f in $(adb shell "find /data/data/com.lemon.lvoverseas/files/effect/ -maxdepth 1 -name 'effect_version*' 2>/dev/null" | tr -d '\r'); do
            fname=$(basename "$f")
            echo "提取: $fname"
            adb pull "$f" "output/data/${fname}" 2>/dev/null || true
          done

          echo "--- 日志分析 ---"
          adb logcat -d > output/logs/full_logcat.txt 2>/dev/null

          grep -i "respool" output/logs/full_logcat.txt 2>/dev/null | tail -80 | tee output/logs/respool_calls.txt || true
          grep -iE "effect.*panel|category/effects|get_panel_info" output/logs/full_logcat.txt 2>/dev/null | tail -50 | tee output/logs/effect_api.txt || true
          grep -i "shark" output/logs/full_logcat.txt 2>/dev/null | tee output/logs/shark_check.txt || true
          grep -iE "network.*fail|body is empty|fetch.*failed" output/logs/full_logcat.txt 2>/dev/null | tail -30 | tee output/logs/network_errors.txt || true
          grep -iE "panel.*info|panel.*category|subtitle.template|flower|bubble|text.*anim" output/logs/full_logcat.txt 2>/dev/null | tail -50 | tee output/logs/panel_activity.txt || true

          if [ -f output/data/rp_official.db ]; then
            echo "=== rp.db 面板信息 ==="
            sqlite3 -header -column output/data/rp_official.db "SELECT name, version FROM panel_info;" 2>/dev/null | tee output/logs/rpdb_panels.txt || true
            echo "=== rp.db 分类统计 ==="
            sqlite3 -header -column output/data/rp_official.db "SELECT panel, COUNT(*) as cats FROM panel_category GROUP BY panel;" 2>/dev/null | tee output/logs/rpdb_categories.txt || true
            echo "=== rp.db 特效总数 ==="
            sqlite3 -header -column output/data/rp_official.db "SELECT COUNT(*) as total FROM effect;" 2>/dev/null | tee output/logs/rpdb_effects.txt || true
          fi

          echo "========== 完成 =========="
          echo "截图: $(ls output/screenshots/ 2>/dev/null | wc -l)"
          echo "日志: $(ls output/logs/ 2>/dev/null | wc -l)"
          echo "数据: $(ls output/data/ 2>/dev/null | wc -l)"
          BASHEOF
          chmod +x emu_script.sh

      - name: 模拟器侦察与提取
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096
          heap-size: 1024
          disk-size: 8192M
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -memory 4096
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash emu_script.sh

      - name: 上传侦察结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-recon-v6
          path: output/
          retention-days: 7
