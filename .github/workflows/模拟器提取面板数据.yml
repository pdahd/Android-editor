name: 模拟器提取面板数据 v3 (精确UI导航)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 确认测试视频
        run: ls -la lv_0_20260226171438.mp4

      - name: 准备辅助脚本
        run: |
          # --- tap_helper.py: 查找UI元素坐标 ---
          cat > tap_helper.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys

          xml_path = sys.argv[1]
          search_text = sys.argv[2].lower()
          try:
              tree = ET.parse(xml_path)
          except Exception:
              sys.exit(1)
          for node in tree.iter('node'):
              text = (node.get('text') or '').lower()
              desc = (node.get('content-desc') or '').lower()
              if search_text in text or search_text in desc:
                  bounds = node.get('bounds', '')
                  m = re.findall(r'\d+', bounds)
                  if len(m) == 4:
                      cx = (int(m[0]) + int(m[2])) // 2
                      cy = (int(m[1]) + int(m[3])) // 2
                      print(f"{cx} {cy}")
                      sys.exit(0)
          sys.exit(1)
          PYEOF

          # --- list_ui_helper.py: 列出所有UI元素 ---
          cat > list_ui_helper.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys

          try:
              tree = ET.parse(sys.argv[1])
              for node in tree.iter('node'):
                  text = node.get('text', '')
                  desc = node.get('content-desc', '')
                  bounds = node.get('bounds', '')
                  clickable = node.get('clickable', 'false')
                  if text or desc:
                      m = re.findall(r'\d+', bounds)
                      cx = cy = 0
                      if len(m) == 4:
                          cx = (int(m[0]) + int(m[2])) // 2
                          cy = (int(m[1]) + int(m[3])) // 2
                      label = text if text else f"[desc:{desc}]"
                      print(f"  [{cx:>4},{cy:>4}] click={clickable:<5} \"{label}\"")
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

          # --- find_video_thumb.py: 找视频缩略图坐标 ---
          cat > find_video_thumb.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import re, sys

          try:
              tree = ET.parse(sys.argv[1])
              for node in tree.iter('node'):
                  cls = node.get('class', '')
                  bounds = node.get('bounds', '')
                  m = re.findall(r'\d+', bounds)
                  if len(m) == 4 and 'ImageView' in cls:
                      cx = (int(m[0]) + int(m[2])) // 2
                      cy = (int(m[1]) + int(m[3])) // 2
                      w = int(m[2]) - int(m[0])
                      h = int(m[3]) - int(m[1])
                      if 300 < cy < 1800 and w > 100 and h > 100:
                          print(f"{cx} {cy}")
                          sys.exit(0)
          except Exception:
              pass
          sys.exit(1)
          PYEOF

          # --- emu_script.sh: 主脚本 ---
          cat > emu_script.sh << 'BASHEOF'
          #!/bin/bash
          set -x

          mkdir -p output/screenshots output/logs output/data output/ui_dumps

          snap() {
            adb shell screencap -p /sdcard/screen.png 2>/dev/null
            adb pull /sdcard/screen.png "output/screenshots/${1}.png" 2>/dev/null || true
            adb shell uiautomator dump /sdcard/ui.xml 2>/dev/null
            adb pull /sdcard/ui.xml "output/ui_dumps/${1}.xml" 2>/dev/null || true
          }

          tap_text() {
            adb shell uiautomator dump /sdcard/ui_tap.xml 2>/dev/null
            adb pull /sdcard/ui_tap.xml /tmp/ui_tap.xml 2>/dev/null || return 1
            local coords
            coords=$(python3 tap_helper.py /tmp/ui_tap.xml "$1" 2>/dev/null) || return 1
            local cx=$(echo "$coords" | cut -d' ' -f1)
            local cy=$(echo "$coords" | cut -d' ' -f2)
            echo ">>> TAP '$1' at ${cx},${cy}"
            adb shell input tap "$cx" "$cy"
            return 0
          }

          list_ui() {
            adb shell uiautomator dump /sdcard/ui_list.xml 2>/dev/null
            adb pull /sdcard/ui_list.xml /tmp/ui_list.xml 2>/dev/null || return 1
            python3 list_ui_helper.py /tmp/ui_list.xml 2>/dev/null
          }

          echo "========== 阶段 1: 安装与初始化 =========="
          adb install -t official.apk
          adb root
          sleep 5

          for perm in READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE READ_MEDIA_VIDEO \
                      READ_MEDIA_IMAGES READ_MEDIA_AUDIO CAMERA RECORD_AUDIO \
                      POST_NOTIFICATIONS; do
            adb shell pm grant com.lemon.lvoverseas "android.permission.${perm}" 2>/dev/null || true
          done

          adb push lv_0_20260226171438.mp4 /sdcard/DCIM/test_video.mp4
          adb shell am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE \
            -d file:///sdcard/DCIM/test_video.mp4 2>/dev/null
          sleep 3
          echo "OK 初始化完成"

          echo "========== 阶段 2: 启动 App =========="
          adb shell am start -n com.lemon.lvoverseas/com.vega.main.MainActivity
          sleep 20
          snap "01_app_launch"
          echo "--- 启动后UI ---"
          list_ui | tee output/logs/01_ui.txt

          echo "========== 阶段 3: 处理服务条款 =========="
          tap_text "Agree and continue" || tap_text "Agree" || true
          sleep 5
          snap "02_after_agree"
          echo "--- 同意后UI ---"
          list_ui | tee output/logs/02_ui.txt

          # 处理可能的弹窗（通知权限等）
          for attempt in 1 2 3 4; do
            echo "--- 弹窗处理 第${attempt}轮 ---"
            tap_text "Allow" || tap_text "Not now" || tap_text "Skip" || \
            tap_text "Got it" || tap_text "OK" || tap_text "Later" || \
            tap_text "No thanks" || tap_text "Maybe later" || tap_text "Close" || true
            sleep 3
          done
          snap "03_dialogs_cleared"
          echo "--- 弹窗处理后UI ---"
          list_ui | tee output/logs/03_ui.txt

          echo "========== 阶段 4: 等待后台下载 =========="
          echo "等待 60 秒..."
          sleep 60
          snap "04_after_wait"

          echo "--- effect 目录 (中期) ---"
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/effect/" 2>/dev/null | tee output/logs/mid_effect_dir.txt
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/effect/effectchannel* 2>/dev/null" | tee output/logs/mid_channels.txt

          echo "========== 阶段 5: 进入编辑器 =========="
          echo "--- 主页UI ---"
          list_ui | tee output/logs/05_ui.txt

          tap_text "New project" || tap_text "New Project" || true
          sleep 5
          snap "05_new_project"
          echo "--- New project 后UI ---"
          list_ui | tee output/logs/05b_ui.txt

          # 选择 Videos 标签
          tap_text "Videos" || tap_text "Video" || true
          sleep 3

          # 找视频缩略图
          adb shell uiautomator dump /sdcard/ui_vid.xml 2>/dev/null
          adb pull /sdcard/ui_vid.xml /tmp/ui_vid.xml 2>/dev/null
          VIDEO_XY=$(python3 find_video_thumb.py /tmp/ui_vid.xml 2>/dev/null) || VIDEO_XY=""

          if [ -n "$VIDEO_XY" ]; then
            VX=$(echo "$VIDEO_XY" | cut -d' ' -f1)
            VY=$(echo "$VIDEO_XY" | cut -d' ' -f2)
            echo ">>> TAP video at ${VX},${VY}"
            adb shell input tap "$VX" "$VY"
          else
            echo ">>> Fallback: tap 270,900"
            adb shell input tap 270 900
          fi
          sleep 3
          snap "06_video_selected"
          echo "--- 选择视频后UI ---"
          list_ui | tee output/logs/06_ui.txt

          # 点击 Add
          tap_text "Add" || tap_text "Next" || tap_text "Done" || true
          sleep 10
          snap "07_editor"
          echo "--- 编辑器UI ---"
          list_ui | tee output/logs/07_ui.txt

          echo "========== 阶段 6: 进入文字编辑 =========="
          tap_text "Text" || true
          sleep 3
          snap "08_text_menu"
          echo "--- Text菜单UI ---"
          list_ui | tee output/logs/08_ui.txt

          tap_text "Add text" || tap_text "Add Text" || tap_text "Default text" || true
          sleep 3
          adb shell input keyevent 4
          sleep 2
          snap "09_text_added"
          echo "--- 添加文字后UI ---"
          list_ui | tee output/logs/09_ui.txt

          echo "========== 阶段 7: 遍历字幕面板 =========="
          for panel in Templates Fonts Styles Effects Animations Bubble; do
            echo "=== 面板: $panel ==="
            tap_text "$panel" || true
            sleep 8
            snap "10_panel_${panel}"
            echo "--- ${panel} UI ---"
            list_ui | tee "output/logs/10_panel_${panel}.txt"
          done

          echo "========== 阶段 8: 等待API响应 =========="
          echo "等待 60 秒让面板数据加载..."
          sleep 60

          echo "========== 阶段 9: 最终数据提取 =========="
          echo "--- 最终 effect 目录 ---"
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/effect/" 2>/dev/null | tee output/logs/final_effect_dir.txt

          echo "--- effectchannel 文件 ---"
          adb shell "find /data/data/com.lemon.lvoverseas/files/effect/ -maxdepth 1 \( -name 'effectchannel*' -o -name 'effect_version*' \)" 2>/dev/null | tee output/logs/final_channels.txt

          echo "--- rp.db ---"
          adb shell "ls -la /data/data/com.lemon.lvoverseas/files/resources/db/rp.db 2>/dev/null" | tee output/logs/final_rpdb.txt

          # 提取数据文件
          adb pull /data/data/com.lemon.lvoverseas/files/resources/db/rp.db output/data/rp_official.db 2>/dev/null || echo "rp.db 不存在"

          for f in $(adb shell "ls /data/data/com.lemon.lvoverseas/files/effect/effectchannel* 2>/dev/null" | tr -d '\r'); do
            fname=$(basename "$f")
            adb pull "$f" "output/data/${fname}" 2>/dev/null || true
          done

          adb shell "cat /data/data/com.lemon.lvoverseas/shared_prefs/tt_device_info.xml" > output/logs/device_info.xml 2>/dev/null || true

          echo "========== 阶段 10: 日志分析 =========="
          adb logcat -d > output/logs/full_logcat.txt 2>/dev/null

          grep -i "respool" output/logs/full_logcat.txt 2>/dev/null | tail -50 | tee output/logs/respool_calls.txt || true
          grep -iE "effect.*panel|category/effects|get_panel_info" output/logs/full_logcat.txt 2>/dev/null | tail -30 | tee output/logs/effect_api.txt || true
          grep -i "shark" output/logs/full_logcat.txt 2>/dev/null | tee output/logs/shark_check.txt || true
          grep -iE "network.*fail|body is empty|fetch.*failed" output/logs/full_logcat.txt 2>/dev/null | tail -20 | tee output/logs/network_errors.txt || true

          if [ -f output/data/rp_official.db ]; then
            echo "--- rp.db 分析 ---"
            sqlite3 -header -column output/data/rp_official.db "SELECT name, version FROM panel_info;" 2>/dev/null | tee output/logs/rpdb_panels.txt || true
            sqlite3 -header -column output/data/rp_official.db "SELECT panel, COUNT(*) as cats FROM panel_category GROUP BY panel;" 2>/dev/null | tee output/logs/rpdb_categories.txt || true
            sqlite3 -header -column output/data/rp_official.db "SELECT COUNT(*) as total FROM effect;" 2>/dev/null | tee output/logs/rpdb_effects.txt || true
          fi

          echo "========== 完成 =========="
          echo "截图: $(ls output/screenshots/ 2>/dev/null | wc -l)"
          echo "日志: $(ls output/logs/ 2>/dev/null | wc -l)"
          echo "数据: $(ls output/data/ 2>/dev/null | wc -l)"
          BASHEOF
          chmod +x emu_script.sh

      - name: 模拟器侦察与提取
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          emulator-boot-timeout: 300
          script: bash emu_script.sh

      - name: 上传侦察结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-recon-v3
          path: output/
          retention-days: 7
