name: 模拟器提取面板数据 v10 (状态机导航)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Official APK
        run: |
          gh release download official --pattern "*.apk" --dir .
          mv *.apk official.apk
          ls -la official.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 确认测试视频
        run: ls -la lv_0_20260226171438.mp4

      - name: 准备状态机导航脚本
        run: |
          cat > navigator.py << 'NAVIGATOR_EOF'
          #!/usr/bin/env python3
          """CapCut 状态机导航器 - 看路走路，不盲走"""

          import subprocess, time, xml.etree.ElementTree as ET, re, os, sys, sqlite3

          class Nav:
              def __init__(self):
                  self.step = 0
                  for d in ["output/screenshots","output/logs","output/data","output/ui_dumps"]:
                      os.makedirs(d, exist_ok=True)
                  self.logf = open("output/logs/navigator.txt","w")
                  self.panels_visited = set()
                  self.TARGET_PANELS = {"Templates","Fonts","Effects","Animations","Bubble","Presets","Styles"}

              def log(self, msg):
                  print(msg, flush=True)
                  self.logf.write(msg+"\n"); self.logf.flush()

              def adb(self, *args):
                  try:
                      r = subprocess.run(["adb"]+list(args), capture_output=True, text=True, timeout=30)
                      return r.stdout.strip()
                  except: return ""

              def snap(self, name):
                  self.step += 1
                  tag = f"{self.step:02d}_{name}"
                  self.adb("shell","screencap","-p","/sdcard/s.png")
                  subprocess.run(["adb","pull","/sdcard/s.png",f"output/screenshots/{tag}.png"],
                                capture_output=True)
                  self.adb("shell","uiautomator","dump","/sdcard/u.xml")
                  subprocess.run(["adb","pull","/sdcard/u.xml",f"output/ui_dumps/{tag}.xml"],
                                capture_output=True)

              def tap(self, x, y, desc=""):
                  self.log(f"  >>> TAP [{x},{y}] {desc}")
                  self.adb("shell","input","tap",str(x),str(y))

              def get_ui(self):
                  self.adb("shell","uiautomator","dump","/sdcard/nav.xml")
                  subprocess.run(["adb","pull","/sdcard/nav.xml","/tmp/nav.xml"],capture_output=True)
                  elems = []
                  try:
                      for n in ET.parse("/tmp/nav.xml").iter('node'):
                          t,d,b = n.get('text',''), n.get('content-desc',''), n.get('bounds','')
                          c = n.get('clickable','false')=='true'
                          m = re.findall(r'\d+',b)
                          if len(m)==4:
                              elems.append({'text':t,'desc':d,
                                           'x':(int(m[0])+int(m[2]))//2,
                                           'y':(int(m[1])+int(m[3]))//2,
                                           'clickable':c})
                  except: pass
                  return elems

              def texts(self, elems):
                  s = set()
                  for e in elems:
                      if e['text']: s.add(e['text'])
                      if e['desc']: s.add(e['desc'])
                  return s

              def find_tap(self, elems, name, exact=True, click_only=False):
                  for e in elems:
                      if click_only and not e['clickable']: continue
                      t, d = e['text'], e['desc']
                      if exact:
                          if t==name or d==name:
                              self.tap(e['x'],e['y'],f"'{name}'")
                              return True
                      else:
                          if name.lower() in t.lower() or name.lower() in d.lower():
                              self.tap(e['x'],e['y'],f"~'{name}'")
                              return True
                  return False

              def identify(self, elems):
                  tx = self.texts(elems)
                  # 按优先级判断
                  if any("Pixel is starting" in t for t in tx): return "SYSTEM_BOOT"
                  if "Agree and continue" in tx: return "TOS"
                  if any("What type of content" in t for t in tx): return "ONBOARDING"
                  if "Wait" in tx and "Close app" in tx: return "ANR"
                  if "Sign in & Claim offer" in tx: return "SIGNIN_POPUP"
                  if any("FREE Pro" in t for t in tx): return "PRO_POPUP"
                  if "Allow" in tx and any("access" in t.lower() or "permission" in t.lower() or "allow" in t.lower() for t in tx):
                      # Check if it's a system permission dialog
                      if any("While using" in t for t in tx): return "PERMISSION"
                      if any("ALLOW" in t or "DENY" in t or "Don" in t for t in tx): return "PERMISSION"
                  if "Albums" in tx: return "MEDIA_PICKER"
                  if "Videos" in tx and "Photos" in tx: return "MEDIA_PICKER"
                  if any("Add (" in t for t in tx): return "MEDIA_SELECTED"
                  if "Add text" in tx: return "TEXT_MENU"
                  # 检查是否在字幕面板
                  panel_hits = tx & self.TARGET_PANELS
                  if len(panel_hits) >= 3: return "TEXT_PANEL"
                  # 编辑器（有Text等工具按钮）
                  editor_tools = {"Text","Sticker","Audio","Filters","Adjust"}
                  if len(tx & editor_tools) >= 2: return "EDITOR"
                  # 看是否有编辑器的 Text 按钮（可能只有少量工具可见）
                  if "Text" in tx and ("Sticker" in tx or "Audio" in tx): return "EDITOR"
                  # Edit 主页
                  if ("New video" in tx or "New project" in tx) and "Projects" in tx: return "EDIT_HOME"
                  # Templates 推荐页
                  if ("Search CapCut" in tx or "AutoCut" in tx) and "Templates" in tx: return "TEMPLATES_PAGE"
                  # 有底部导航栏
                  if "Edit" in tx and "Templates" in tx and "AI Lab" in tx: return "HAS_NAV"
                  # Got it / OK 引导
                  if "Got it" in tx: return "TUTORIAL"
                  if "OK" in tx and len(tx) < 5: return "TUTORIAL"
                  return "UNKNOWN"

              def act(self, state, elems):
                  tx = self.texts(elems)

                  if state == "SYSTEM_BOOT":
                      self.log("  等待系统启动...")
                      time.sleep(15)
                      self.adb("shell","am","start","-n",
                              "com.lemon.lvoverseas/com.vega.main.MainActivity")
                      time.sleep(10)

                  elif state == "TOS":
                      self.find_tap(elems,"Agree and continue",click_only=True)
                      time.sleep(8)

                  elif state == "ONBOARDING":
                      self.find_tap(elems,"Skip",click_only=True)
                      time.sleep(5)

                  elif state == "ANR":
                      self.find_tap(elems,"Wait",click_only=True)
                      time.sleep(5)

                  elif state == "SIGNIN_POPUP":
                      self.tap(1025,1382,"关闭❌登录弹窗")
                      time.sleep(5)

                  elif state == "PRO_POPUP":
                      self.tap(1025,1382,"关闭❌Pro弹窗")
                      time.sleep(5)

                  elif state == "PERMISSION":
                      if not self.find_tap(elems,"While using the app",click_only=True):
                          if not self.find_tap(elems,"Allow",click_only=True):
                              if not self.find_tap(elems,"ALLOW",click_only=True):
                                  self.find_tap(elems,"Don't allow",click_only=True)
                      time.sleep(5)

                  elif state == "TEMPLATES_PAGE":
                      self.find_tap(elems,"Edit",exact=True,click_only=True)
                      time.sleep(5)

                  elif state == "EDIT_HOME":
                      if not self.find_tap(elems,"New project"):
                          self.find_tap(elems,"New video")
                      time.sleep(8)

                  elif state == "HAS_NAV":
                      self.find_tap(elems,"Edit",exact=True,click_only=True)
                      time.sleep(5)

                  elif state == "MEDIA_PICKER":
                      self.log("  选择视频流程...")
                      self.tap(226,426,"勾选视频")
                      time.sleep(3)
                      self.tap(944,1931,"勾选HD")
                      time.sleep(2)
                      # 重新读取UI看Add按钮
                      elems2 = self.get_ui()
                      if not self.find_tap(elems2,"Add (1)",click_only=True):
                          if not self.find_tap(elems2,"Add",exact=True,click_only=True):
                              self.tap(946,2027,"Add按钮位置")
                      time.sleep(15)

                  elif state == "MEDIA_SELECTED":
                      self.find_tap(elems,"Add",exact=False,click_only=True)
                      time.sleep(15)

                  elif state == "EDITOR":
                      # 先处理可能的引导
                      if self.find_tap(elems,"Got it",click_only=True):
                          time.sleep(3)
                      elif self.find_tap(elems,"Text",exact=True):
                          time.sleep(5)

                  elif state == "TEXT_MENU":
                      self.find_tap(elems,"Add text")
                      time.sleep(5)
                      self.adb("shell","input","keyevent","111")  # Escape关键盘
                      time.sleep(3)

                  elif state == "TEXT_PANEL":
                      remaining = self.TARGET_PANELS - self.panels_visited
                      if not remaining:
                          return "DONE"
                      # 找一个存在于当前UI中的面板
                      for p in list(remaining):
                          if p in self.texts(elems):
                              self.find_tap(elems, p, exact=True)
                              self.panels_visited.add(p)
                              time.sleep(10)
                              # 检查 effectchannel
                              r = self.adb("shell","ls /data/data/com.lemon.lvoverseas/files/effect/effectchannel* 2>/dev/null")
                              self.log(f"  effectchannel: {r or '无'}")
                              break
                      else:
                          # 没找到未访问的面板，标记全部完成
                          for p in remaining:
                              self.panels_visited.add(p)

                  elif state == "TUTORIAL":
                      if not self.find_tap(elems,"Got it",click_only=True):
                          if not self.find_tap(elems,"OK",click_only=True):
                              self.find_tap(elems,"Skip",click_only=True)
                      time.sleep(3)

                  elif state == "UNKNOWN":
                      self.log("  未知状态，尝试恢复...")
                      # 尝试常见按钮
                      for btn in ["Got it","OK","Skip","Allow","Close","Cancel",
                                  "Not now","Later","Don't allow","Dismiss"]:
                          if self.find_tap(elems,btn,click_only=True):
                              time.sleep(3)
                              return None
                      # 检查App是否在运行
                      pid = self.adb("shell","pidof","com.lemon.lvoverseas")
                      if not pid:
                          self.log("  App未运行，重启...")
                          self.adb("shell","am","start","-n",
                                  "com.lemon.lvoverseas/com.vega.main.MainActivity")
                          time.sleep(15)
                      else:
                          time.sleep(5)

                  return None

              def extract(self):
                  self.log("\n========== 最终数据提取 ==========")
                  r = self.adb("shell","ls -la /data/data/com.lemon.lvoverseas/files/effect/")
                  self.log(f"effect目录:\n{r}")
                  with open("output/logs/final_effect_dir.txt","w") as f: f.write(r)

                  r = self.adb("shell","find /data/data/com.lemon.lvoverseas/files/effect/ -maxdepth 1 "
                              "\\( -name 'effectchannel*' -o -name 'effect_version*' \\) -exec ls -la {} \\;")
                  self.log(f"channels:\n{r}")
                  with open("output/logs/final_channels.txt","w") as f: f.write(r)

                  r = self.adb("shell","ls -la /data/data/com.lemon.lvoverseas/files/resources/db/rp.db 2>/dev/null")
                  self.log(f"rp.db: {r}")
                  with open("output/logs/final_rpdb.txt","w") as f: f.write(r)

                  # 提取 rp.db
                  subprocess.run(["adb","pull",
                                 "/data/data/com.lemon.lvoverseas/files/resources/db/rp.db",
                                 "output/data/rp_official.db"], capture_output=True)

                  # 提取 effectchannel
                  channels = self.adb("shell","find /data/data/com.lemon.lvoverseas/files/effect/ "
                                     "-maxdepth 1 \\( -name 'effectchannel*' -o -name 'effect_version*' \\)")
                  for f in channels.split('\n'):
                      f = f.strip().replace('\r','')
                      if f:
                          fname = os.path.basename(f)
                          self.log(f"  提取: {fname}")
                          subprocess.run(["adb","pull",f,f"output/data/{fname}"],capture_output=True)

                  # 日志
                  self.log("--- 提取 logcat ---")
                  logcat = self.adb("shell","logcat","-d")
                  with open("output/logs/full_logcat.txt","w") as f: f.write(logcat)

                  for tag, pattern in [("respool","respool"),("effect_api","effect.*panel|category/effects|get_panel_info"),
                                       ("shark","shark"),("network_errors","network.*fail|body is empty|fetch.*failed")]:
                      import re as re2
                      lines = [l for l in logcat.split('\n') if re2.search(pattern, l, re2.I)]
                      with open(f"output/logs/{tag}.txt","w") as f: f.write('\n'.join(lines[-80:]))
                      if lines: self.log(f"  {tag}: {len(lines)} 行")

                  # 分析 rp.db
                  if os.path.exists("output/data/rp_official.db"):
                      self.log("\n=== rp.db 分析 ===")
                      try:
                          db = sqlite3.connect("output/data/rp_official.db")
                          c = db.cursor()
                          c.execute("SELECT name, version FROM panel_info")
                          rows = c.fetchall()
                          self.log(f"面板: {rows}")
                          with open("output/logs/rpdb_panels.txt","w") as f:
                              for r in rows: f.write(f"{r[0]}\t{r[1]}\n")

                          c.execute("SELECT panel, COUNT(*) FROM panel_category GROUP BY panel")
                          rows = c.fetchall()
                          self.log(f"分类: {rows}")
                          with open("output/logs/rpdb_categories.txt","w") as f:
                              for r in rows: f.write(f"{r[0]}\t{r[1]}\n")

                          c.execute("SELECT COUNT(*) FROM effect")
                          total = c.fetchone()[0]
                          self.log(f"特效总数: {total}")
                          with open("output/logs/rpdb_effects.txt","w") as f:
                              f.write(f"{total}\n")
                          db.close()
                      except Exception as ex:
                          self.log(f"rp.db 分析失败: {ex}")

              def run(self):
                  self.log("========== 安装与初始化 ==========")
                  self.adb("install","-t","official.apk")
                  self.adb("root")
                  time.sleep(5)

                  for p in ["READ_EXTERNAL_STORAGE","WRITE_EXTERNAL_STORAGE","READ_MEDIA_VIDEO",
                           "READ_MEDIA_IMAGES","READ_MEDIA_AUDIO","CAMERA","RECORD_AUDIO","POST_NOTIFICATIONS"]:
                      self.adb("shell","pm","grant","com.lemon.lvoverseas",f"android.permission.{p}")

                  self.adb("push","lv_0_20260226171438.mp4","/sdcard/DCIM/test_video.mp4")
                  self.adb("shell","am","broadcast","-a",
                          "android.intent.action.MEDIA_SCANNER_SCAN_FILE",
                          "-d","file:///sdcard/DCIM/test_video.mp4")
                  time.sleep(5)

                  self.log("========== 启动 App ==========")
                  self.adb("shell","am","start","-n",
                          "com.lemon.lvoverseas/com.vega.main.MainActivity")
                  time.sleep(25)

                  self.log("========== 开始状态机导航 ==========")
                  prev_state = None
                  stuck_count = 0

                  for i in range(80):
                      elems = self.get_ui()
                      state = self.identify(elems)

                      self.log(f"\n--- 迭代 {i+1}/80 | 状态: {state} ---")
                      for e in elems:
                          if e['text'] or e['desc']:
                              lb = e['text'] or f"[{e['desc']}]"
                              self.log(f"  [{e['x']:>4},{e['y']:>4}] {'C' if e['clickable'] else ' '} \"{lb}\"")

                      self.snap(state.lower())

                      # 检测卡住
                      if state == prev_state:
                          stuck_count += 1
                          if stuck_count > 5:
                              self.log(f"  ⚠️ 在 {state} 卡了 {stuck_count} 次!")
                              if stuck_count > 10:
                                  self.log("  放弃当前状态，强制继续")
                                  stuck_count = 0
                                  if state == "TEXT_PANEL":
                                      for p in self.TARGET_PANELS: self.panels_visited.add(p)
                      else:
                          stuck_count = 0
                      prev_state = state

                      result = self.act(state, elems)
                      if result == "DONE":
                          self.log("\n🎉 所有面板已访问！")
                          break

                      time.sleep(2)

                  # 等待 API
                  self.log("\n========== 等待 API 完成 (120秒) ==========")
                  time.sleep(120)

                  self.extract()

                  self.log(f"\n========== 完成 ==========")
                  self.log(f"截图: {len(os.listdir('output/screenshots'))}")
                  self.log(f"日志: {len(os.listdir('output/logs'))}")
                  self.log(f"数据: {len(os.listdir('output/data'))}")
                  self.log(f"已访问面板: {self.panels_visited}")

          if __name__ == "__main__":
              Nav().run()
          NAVIGATOR_EOF
          chmod +x navigator.py
          echo "✅ 状态机导航脚本已生成"

      - name: 模拟器状态机导航
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096
          heap-size: 1024
          disk-size: 8192M
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -memory 4096
          disable-animations: true
          emulator-boot-timeout: 600
          script: python3 navigator.py

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-recon-v10
          path: output/
          retention-days: 7
